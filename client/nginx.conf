# nginx 反代（本地「真实发布」模拟，对齐 server/Caddyfile 的路由语义）。
# 单站点同源：静态 SPA + /api（剥前缀转 metaserver）+ /gw（控制面 WS）+ /ws（数据面 WS）。
# 内部服务名（metaserver/gateway/gameserver）由 docker compose 网络 DNS 解析。

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # REST：剥掉 /api 前缀转 metaserver（fastify 路由是 /auth/*、/save … 不含 /api）。
    # proxy_pass 带尾斜杠 → 用 /api/ 替换为 /，等价 Caddy 的 handle_path。
    location /api/ {
        proxy_pass http://metaserver:8080/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 控制面 WS：房间 / 匹配（保留 /gw 路径 + ?token= 查询）。
    location /gw {
        proxy_pass http://gateway:8082;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 数据面 WS：锁步对战（保留 /ws 路径 + ?ticket= 查询）。
    location /ws {
        proxy_pass http://gameserver:8081;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA：其余路径回退到 index.html（单页应用）。
    location / {
        try_files $uri $uri/ /index.html;
    }
}
