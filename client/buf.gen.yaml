# proto → TypeScript codegen template (client side, ts-proto).
# buf ships a cross-platform static compiler (no system protoc / no DLL dependency).
# The ts-proto plugin is invoked via the node argv array form to work around Windows .cmd/shebang exec issues.
# Run: npm run proto:gen (see scripts/gen-proto.mjs). Commit the generated output.
version: v2
plugins:
  - local: ["node", "node_modules/ts-proto/protoc-gen-ts_proto"]
    out: src/net/proto
    opt:
      # pure data messages: no gRPC / service implementation
      - outputServices=false
      - outputClientImpl=false
      # keep bundle small (mini-game): strip JSON encode/decode helpers
      - outputJsonMethods=false
      # seed is uint64 but clamped to 2^48 — use number to avoid the long polyfill
      - forceLong=number
      - esModuleInterop=true
      - useOptionals=messages
      - snakeToCamel=true
