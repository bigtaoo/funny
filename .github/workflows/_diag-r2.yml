name: _diag - R2 bucket check (temporary)

# Throwaway diagnostic: confirms the R2 service is enabled on the account and the
# `nivara-ota` bucket exists, without uploading/overwriting anything (read-only).
# Delete this file once the ota-publish 502 investigation is done.

on:
  workflow_dispatch:
  push:
    branches:
      - '21.07.2026'
    paths:
      - '.github/workflows/_diag-r2.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: List R2 buckets
        run: npx wrangler@3.90.0 r2 bucket list
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Show nivara-ota bucket info
        run: npx wrangler@3.90.0 r2 bucket info nivara-ota
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
