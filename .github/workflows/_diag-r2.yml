name: _diag - R2 bucket check (temporary)

# Throwaway diagnostic: writes a harmless test object (not a real OTA version) to confirm
# write access + public read through the ota.gamestao.com custom domain end-to-end.
# Delete this file once the ota-publish setup investigation is done.

on:
  push:
    branches:
      - '21.07.2026'
    paths:
      - '.github/workflows/_diag-r2.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Delete test object
        run: npx wrangler@3.90.0 r2 object delete nivara-ota/_diag-test.txt
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
