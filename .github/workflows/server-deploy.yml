name: server-deploy

# Auto-redeploy the 9 backend processes + Redis + Caddy (docker compose) to the Hetzner VPS (/root/funny).
# Trigger: push to main touching server-related files, or manual Run from the Actions page.
# Flow: SSH into VPS → git fetch + reset --hard origin/main → docker compose up -d --build.
# Images are built on the VPS itself (consistent with manual ops commands; 2-core + 2G swap handles it fine).
# .env is gitignored, so reset --hard never touches it. Deployment details / ops reference: design/product/deploy-cloudflare.md §8.
#
# Required repo secrets:
#   VPS_SSH_KEY        — Dedicated CI deploy private key (ed25519, nivara_ci_deploy, isolated from daily dev key).
#                        Public key has been added to VPS root's authorized_keys. Paste the full private key
#                        (including BEGIN/END lines) into the secret.
# Required repo variables:
#   SERVER_DEPLOY_ENABLED = true   — Enable switch (job is skipped if not set, to avoid red builds before setup is complete).
#   VPS_HOST              = 128.140.41.98   — VPS public IP (or api.gamestao.com; hostname works when proxied).
#   VPS_USER              = root            — Login user (defaults to root).
#   VPS_DEPLOY_PATH       = /root/funny     — Clone path on the VPS (defaults to /root/funny).
#
# Not using a third-party ssh-action (they swallow real errors and often expire at runtime); using the
# runner's built-in ssh instead so errors are visible — same philosophy as ops-deploy / client-deploy bare npx wrangler.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '!server/observability/**'   # observability stack uses grafana-deploy.yml; skip to avoid rebuilding the entire backend for it
      - '.github/workflows/server-deploy.yml'
  workflow_dispatch: {}

# Only one server deployment runs at a time; new run cancels the old one to prevent concurrent docker compose conflicts.
concurrency:
  group: server-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable SERVER_DEPLOY_ENABLED is not set to true.
    if: ${{ vars.SERVER_DEPLOY_ENABLED == 'true' }}
    steps:
      # Write the private key and pin the VPS host key into known_hosts via ssh-keyscan (prevents TOFU/MITM).
      - name: set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      # Pull new code on the VPS and redeploy. git fetch + reset --hard origin/main eliminates workspace drift;
      # .env (gitignored) is not affected. docker compose uses the cloud config + .env.
      - name: deploy on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER || 'root' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/root/funny' }}
        run: |
          # Delete potentially corrupted remote-tracking ref first (a fetch interrupted by cancel-in-progress
          # can leave refs/remotes/origin/main with an inconsistent old-value, causing the next fetch to error
          # with "incorrect old value provided"). Then fetch + reset to FETCH_HEAD without relying on the
          # tracking ref, fully avoiding that compare-and-swap pitfall.
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" \
            "set -e; \
             cd '${VPS_DEPLOY_PATH}'; \
             git update-ref -d refs/remotes/origin/main 2>/dev/null || true; \
             git fetch origin main; \
             git reset --hard FETCH_HEAD; \
             cd server; \
             docker compose -f docker-compose.cloud.yml --env-file .env up -d --build --remove-orphans; \
             # caddy's config is a bind mount (content-only changes to Caddyfile don't alter its
             # service definition), so \`up\` alone never recreates it — force a restart every deploy.
             docker compose -f docker-compose.cloud.yml restart caddy; \
             docker compose -f docker-compose.cloud.yml ps"
