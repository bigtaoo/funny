name: animator-deploy

# 骨骼动画编辑器 animator（Worker animator，静态资源）自动发布到 Cloudflare。
# 触发：push 到 main 且改动落在 animator 相关文件，或在 Actions 页手动 Run。
# 流程：npm ci → npm run build（webpack production，把 Supabase URL/anon key 烘进 bundle）→ wrangler deploy。
# 部署细节 / 工作区同步：design/tools/animator/WORKSPACE_SYNC.md §7、§8.1（实际是 Workers 静态资源构建，wrangler.jsonc assets-only）。
#
# 复用 ops/client 那套 repo secrets（同一 CF 账号，"Edit Cloudflare Workers" token 覆盖全账号 Worker）：
#   CLOUDFLARE_API_TOKEN   —— 权限至少 Workers Scripts:Edit（账号级，animator 同样适用，无需新建）
#   CLOUDFLARE_ACCOUNT_ID  —— 账号 ID（与 ops/client 同值）
# 构建注入（与 Cloudflare Build variables 同名，未设则空串、工作区 UI 静默禁用、离线编辑不受影响）：
#   NW_SUPABASE_URL        —— Supabase 项目 URL
#   NW_SUPABASE_ANON_KEY   —— Supabase anon key
# 启用开关：repo variable ANIMATOR_DEPLOY_ENABLED = true（未设则 job 跳过，避免配好前每次 push 报红）。

on:
  push:
    branches: [main]
    paths:
      - 'tools/animator/**'
      - 'wrangler.jsonc'
      - '.github/workflows/animator-deploy.yml'
  workflow_dispatch: {}

# 同时只跑一个 animator 部署，新的取消旧的，避免并发 deploy 打架。
concurrency:
  group: animator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # 未设 repo variable ANIMATOR_DEPLOY_ENABLED=true 时整个 job 跳过（避免配好前每次 push 报红）。
    if: ${{ vars.ANIMATOR_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/animator/package-lock.json

      - name: animator install
        working-directory: tools/animator
        run: npm ci

      # 产出 tools/animator/dist；构建期 DefinePlugin 把 Supabase 连接烘入 bundle（与本地/CF 构建一致）。
      - name: animator build
        working-directory: tools/animator
        env:
          NW_SUPABASE_URL: ${{ secrets.NW_SUPABASE_URL }}
          NW_SUPABASE_ANON_KEY: ${{ secrets.NW_SUPABASE_ANON_KEY }}
        run: npm run build

      # 从仓库根用默认 wrangler.jsonc（assets 指向 ./tools/animator/dist，SPA 回退，无 Worker 脚本）。
      # 直接用 npx wrangler 跑（不用 wrangler-action），报错原样可见。
      - name: deploy to Cloudflare
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.104.0 deploy
