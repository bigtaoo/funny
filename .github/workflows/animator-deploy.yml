name: animator-deploy

# Auto-publish the skeletal animation editor animator (Worker animator, static assets) to Cloudflare.
# Trigger: push to main touching animator-related files, or manual Run from the Actions page.
# Flow: npm ci → npm run build (webpack production, baking Supabase URL/anon key into the bundle) → wrangler deploy.
# Deployment details / workspace sync: design/tools/animator/WORKSPACE_SYNC.md §7, §8.1 (Workers static assets build, wrangler/animator.jsonc assets-only).
#
# Reuses the ops/client repo secrets (same CF account; "Edit Cloudflare Workers" token covers all account Workers):
#   CLOUDFLARE_API_TOKEN   — Requires at least Workers Scripts:Edit (account-level; also works for animator, no new token needed)
#   CLOUDFLARE_ACCOUNT_ID  — Account ID (same value as ops/client)
# Build-time injections (same names as Cloudflare Build variables; if unset, empty string — workspace UI silently disabled, offline editing unaffected):
#   NW_SUPABASE_URL        — Supabase project URL
#   NW_SUPABASE_ANON_KEY   — Supabase anon key
# Enable switch: repo variable ANIMATOR_DEPLOY_ENABLED = true (job skipped if not set, to avoid red builds before setup is complete).

on:
  push:
    branches: [main]
    paths:
      - 'tools/animator/**'
      - 'wrangler/animator.jsonc'
      - '.github/workflows/animator-deploy.yml'
  workflow_dispatch: {}

# Only one animator deployment runs at a time; new run cancels the old one to prevent concurrent deploy conflicts.
concurrency:
  group: animator-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable ANIMATOR_DEPLOY_ENABLED is not set to true (avoids red builds before setup is complete).
    if: ${{ vars.ANIMATOR_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/animator/package-lock.json

      - name: animator install
        working-directory: tools/animator
        run: npm ci

      # Outputs tools/animator/dist; DefinePlugin bakes the Supabase connection into the bundle at build time (consistent with local/CF builds).
      - name: animator build
        working-directory: tools/animator
        env:
          NW_SUPABASE_URL: ${{ secrets.NW_SUPABASE_URL }}
          NW_SUPABASE_ANON_KEY: ${{ secrets.NW_SUPABASE_ANON_KEY }}
        run: npm run build

      # Run from repo root with -c wrangler/animator.jsonc (assets point to ../tools/animator/dist, SPA fallback, no Worker script).
      # Uses npx wrangler directly (not wrangler-action) so errors are visible as-is.
      - name: deploy to Cloudflare
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.104.0 deploy -c wrangler/animator.jsonc
