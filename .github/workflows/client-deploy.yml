name: client-deploy

# Auto-publish the main game client (web bundle, Worker nivara-client) to Cloudflare, served at a.gamestao.com.
# Trigger: push to main touching client-related files, or manual Run from the Actions page.
# Flow: npm ci → npm run build:web (bakes production API/WS addresses into the bundle) → wrangler deploy.
# Deployment details / address baking variables: design/product/deploy-cloudflare.md §6.
#
# Reuses the ops repo secrets (same CF account e64b61f1...; "Edit Cloudflare Workers" token covers all account Workers):
#   CLOUDFLARE_API_TOKEN   — Requires at least Workers Scripts:Edit (account-level; also works for nivara-client, no new token needed)
#   CLOUDFLARE_ACCOUNT_ID  — Account ID (same value as ops)
# Enable switch: repo variable CLIENT_DEPLOY_ENABLED = true (job skipped if not set, to avoid red builds before setup is complete).

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - 'wrangler.client.jsonc'
      - '.github/workflows/client-deploy.yml'
  workflow_dispatch: {}

# Only one client deployment runs at a time; new run cancels the old one to prevent concurrent deploy conflicts.
concurrency:
  group: client-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable CLIENT_DEPLOY_ENABLED is not set to true (avoids red builds before setup is complete).
    if: ${{ vars.CLIENT_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: client install
        working-directory: client
        run: npm ci

      # Outputs client/dist; production addresses are baked to api.gamestao.com (consistent with manual deploy commands).
      - name: client build (web)
        working-directory: client
        env:
          NW_API_BASE: https://api.gamestao.com/api
          NW_GATEWAY_WS: wss://api.gamestao.com/gw
          NW_WORLD_BASE: https://api.gamestao.com
        run: npm run build:web

      # Run from repo root using -c to specify the client config (assets point to ./client/dist, no Worker script).
      # Uses npx wrangler directly (not wrangler-action) so errors are visible as-is.
      - name: deploy to Cloudflare
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.104.0 deploy -c wrangler.client.jsonc
