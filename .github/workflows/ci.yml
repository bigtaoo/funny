name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# 同一分支/PR 的旧跑批自动取消，省 runner。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 快路：类型检查 + 单测 + 构建，无需 Docker，几分钟内出结果。
  build-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # —— 服务端：十包 tsc -b（含确定性引擎 @nw/engine）——
      - name: server install
        working-directory: server
        run: npm ci
      - name: server typecheck (tsc -b)
        working-directory: server
        run: npx tsc -b shared engine metaserver gateway matchsvc gameserver commercial worldsvc admin analyticsvc

      # —— 客户端：单测 + web 构建 ——
      - name: client install
        working-directory: client
        run: npm ci
      - name: client unit tests
        working-directory: client
        run: npm test
      # UI 冒烟：headless PIXI adapter 在纯 Node 里构造真实场景，证明各场景能正常启动。
      # 无需 Docker / 浏览器 / 活栈，故放在快路。
      - name: client UI smoke tests
        working-directory: client
        run: npm run test:ui
      - name: client web build
        working-directory: client
        run: npm run build:web

  # 慢路：docker compose 起全栈（mongo + meta + commercial + gateway + matchsvc + game），
  # 在 runner 宿主机上以 Node 进程跑真实客户端编排核心（createAppCore）做全链路 E2E。
  e2e:
    name: full-link E2E (live stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # CI 用固定弱密钥（栈是 PR 级临时的、不暴露公网）。生产由 .env 注入强随机串。
      NW_JWT_SECRET: ci-jwt-secret
      NW_INTERNAL_KEY: ci-internal-key
      NW_ADMIN_JWT_SECRET: ci-admin-jwt-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: client install
        working-directory: client
        run: npm ci

      # 起全栈并等所有服务 healthy（--wait 配合 compose 里的 healthcheck）。不起 caddy。
      - name: bring up server stack
        working-directory: server
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml \
            up -d --build --wait \
            redis mongo metaserver commercial gateway matchsvc gameserver worldsvc analyticsvc

      # SLG worldsvc 部署冒烟（S8-0）：证明第七进程在 prod 镜像里起得来、公网 REST 第四面可达。
      - name: worldsvc health smoke
        run: curl -fsS http://localhost:18084/health

      # analyticsvc 部署冒烟（A9-1）：证明第九进程在 prod 镜像里起得来。
      - name: analyticsvc health smoke
        run: curl -fsS http://localhost:18085/health

      - name: run full-link E2E
        working-directory: client
        env:
          NW_API_BASE: http://localhost:18080
          NW_EXPECT_GATEWAY: ws://localhost:8086/gw
        run: npm run test:e2e

      # 容量冒烟：小规模舰队（20 客户端）跑真实栈，验证匹配在并发下成立。
      # 真正的容量探测在本地/专用环境调大 NW_LOAD_CLIENTS 进行。
      - name: run ranked load smoke (small fleet)
        working-directory: client
        env:
          NW_API_BASE: http://localhost:18080
          NW_LOAD_CLIENTS: '20'
        run: npm run test:load

      # 失败时倒出全栈日志便于排查（端口/握手/匹配队列）。
      - name: dump server logs on failure
        if: failure()
        working-directory: server
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml logs --no-color --tail=400

      - name: tear down server stack
        if: always()
        working-directory: server
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml down -v
