name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Previous runs for the same branch/PR are automatically cancelled to save runner minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast path: type-check + unit tests + build, no Docker needed, results within a few minutes.
  build-test:
    name: build + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      # —— Server: tsc -b across eleven packages (including deterministic engine @nw/engine) ——
      - name: server install
        working-directory: server
        run: npm ci
      # ADR-023 P1: metaserver REST codegen staleness check
      - name: server codegen check (metaserver openapi)
        working-directory: server/metaserver
        run: npm run gen:api:server:check
      # ADR-023 P2: worldsvc REST codegen staleness check
      - name: server codegen check (worldsvc openapi)
        working-directory: server/worldsvc
        run: npm run gen:api:world:check
      # auction task4: auctionsvc REST codegen staleness check (openapi-auction.yml, self-contained spec)
      - name: server codegen check (auctionsvc openapi)
        working-directory: server/auctionsvc
        run: npm run gen:api:auction:check
      # ADR-023 P3: gateway + gameserver proto codegen staleness check
      - name: server codegen check (proto gateway+gameserver)
        working-directory: server
        run: |
          npm run proto:gen --workspace=@nw/gateway
          npm run proto:gen --workspace=@nw/gameserver
          git diff --exit-code gateway/src/generated gameserver/src/generated
      - name: server typecheck (tsc -b)
        working-directory: server
        run: npx tsc -b shared engine metaserver gateway matchsvc gameserver commercial worldsvc auctionsvc admin analyticsvc

      # —— Client: type-check + unit tests + web build ——
      - name: client install
        working-directory: client
        run: npm ci
      # vitest (esbuild) and webpack don't type-check, and tsconfig.json's include is src-only,
      # so test/** blueprint/DTO drift stays latent. tsconfig.test.json pulls src + test/** into
      # one program so this step fails on that drift (see CC-1 card-instance migration).
      - name: client typecheck (src + tests)
        working-directory: client
        run: npm run typecheck
      - name: client unit tests
        working-directory: client
        run: npm test
      # UI smoke: headless PIXI adapter constructs real scenes in pure Node to prove each scene starts correctly.
      # No Docker / browser / live stack needed, so this lives in the fast path.
      - name: client UI smoke tests
        working-directory: client
        run: npm run test:ui
      - name: client web build
        working-directory: client
        run: npm run build:web

  # Slow path: docker compose brings up the full stack (mongo + meta + commercial + gateway + matchsvc + game),
  # then runs the real client orchestration core (createAppCore) as a Node process on the runner host for full end-to-end tests.
  e2e:
    name: full-link E2E (live stack)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # CI uses fixed weak keys (the stack is ephemeral and not exposed to the public internet). Production injects strong random strings via .env.
      NW_JWT_SECRET: ci-jwt-secret
      NW_INTERNAL_KEY: ci-internal-key
      NW_ADMIN_JWT_SECRET: ci-admin-jwt-secret
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: client install
        working-directory: client
        run: npm ci

      # Bring up the full stack and wait for all services to be healthy (--wait works with healthchecks in compose). Caddy is not started.
      - name: bring up server stack
        working-directory: server
        run: |
          docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml \
            up -d --build --wait \
            redis mongo metaserver commercial gateway matchsvc gameserver worldsvc analyticsvc

      # SLG worldsvc deployment smoke (S8-0): proves the 7th process starts in the prod image and the public REST 4th face is reachable.
      - name: worldsvc health smoke
        run: curl -fsS http://localhost:18084/health

      # analyticsvc deployment smoke (A9-1): proves the 9th process starts in the prod image.
      - name: analyticsvc health smoke
        run: curl -fsS http://localhost:18085/health

      - name: run full-link E2E
        working-directory: client
        env:
          NW_API_BASE: http://localhost:18080
          NW_EXPECT_GATEWAY: ws://localhost:8086/gw
        run: npm run test:e2e

      # Capacity smoke: small fleet (20 clients) against the live stack, verifying matchmaking holds under concurrency.
      # Real capacity probing is done locally / in a dedicated environment with a larger NW_LOAD_CLIENTS value.
      - name: run ranked load smoke (small fleet)
        working-directory: client
        env:
          NW_API_BASE: http://localhost:18080
          NW_LOAD_CLIENTS: '20'
        run: npm run test:load

      # Dump full stack logs on failure to aid diagnosis (ports / handshakes / matchmaking queue).
      - name: dump server logs on failure
        if: failure()
        working-directory: server
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml logs --no-color --tail=400

      - name: tear down server stack
        if: always()
        working-directory: server
        run: docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml down -v
