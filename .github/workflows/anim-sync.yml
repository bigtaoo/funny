name: anim-sync

# Sync .tao(.editor) files from the animation workspace (Supabase Storage) back to the repo and open a PR for maintainer review.
# One-way: cloud → repo, never deletes repo files. Design: design/tools/animator/WORKSPACE_SYNC.md §5
#
# Required repo secrets: NW_SUPABASE_URL, SUPABASE_SERVICE_KEY (service role key).
# Enable switch: repo variable ANIM_SYNC_ENABLED = true (entire job skipped if not set, to avoid daily cron red builds).

on:
  schedule:
    - cron: '0 3 * * *'      # daily at 03:00 UTC
  workflow_dispatch: {}        # can also be triggered manually

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable ANIM_SYNC_ENABLED is not set to true (avoids daily cron red builds before setup is complete).
    if: ${{ vars.ANIM_SYNC_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Pull animations from workspace
        id: pull
        run: node tools/animator/scripts/anim-sync.mjs
        env:
          NW_SUPABASE_URL: ${{ secrets.NW_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}

      - name: Open / update sync PR
        if: steps.pull.outputs.changed_count != '0'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: anim-sync/auto
          base: main
          title: 'chore(anim): sync animations from workspace'
          commit-message: 'chore(anim): sync animations from workspace'
          body: |
            Automated sync: pulled `.tao`/`.tao.editor` files from the animation workspace (Supabase) and wrote them back to the repo.

            - Mapping source: `art/units/manifest.json`
            - One-way (cloud → repo); once merged, the game build will use the new animations.
            - Number of changed files: see the run log (`anim-sync` step).

            Generated by `.github/workflows/anim-sync.yml`.
          delete-branch: false
