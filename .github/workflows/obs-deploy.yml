name: obs-deploy

# 观测栈（Loki + Alloy + Grafana + 可选 cloudflared）自动重部署到 Hetzner VPS（/root/funny）。
# 与主栈解耦：单独 compose、单独触发（改动落在 observability/ 才跑），不碰游戏后端容器。
# 触发：push 到 main 且改动落在 observability 相关文件，或在 Actions 页手动 Run。
# 流程：SSH 进 VPS → git reset --hard origin/main → docker compose -f observability/... up -d --force-recreate。
#   · 用预构建镜像，无需 --build（与主栈的本机构建不同）。
#   · --force-recreate：挂载的 alloy/loki/grafana 配置文件改了，容器定义没变，up 不会自动重启 →
#     强制重建才能让新配置生效（obs 容器无游戏流量，重建零影响）。
# 部署细节见 server/observability/README.md「Phase 2 部署」。
#
# 复用 server-deploy 那套 SSH secret/variable（同一 VPS、同一 CI deploy key）：
#   secret  VPS_SSH_KEY
#   vars    VPS_HOST / VPS_USER(缺省 root) / VPS_DEPLOY_PATH(缺省 /root/funny)
# 本工作流专属 repo variables：
#   OBS_DEPLOY_ENABLED = true   —— 启用开关（未设则 job 跳过；首次需先在 VPS 手动建好
#                                  observability/.env，见 README 后再开）。
#   OBS_TUNNEL_ENABLED = true   —— 可选；设了才带 `--profile tunnel` 起 cloudflared
#                                  （需 .env 里有有效 CF_TUNNEL_TOKEN）。未设则只起 loki/alloy/grafana。

on:
  push:
    branches: [main]
    paths:
      - 'server/observability/**'
      - '.github/workflows/obs-deploy.yml'
  workflow_dispatch: {}

# 同时只跑一个 obs 部署，新的取消旧的。
concurrency:
  group: obs-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.OBS_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: deploy obs stack on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER || 'root' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/root/funny' }}
          OBS_TUNNEL_ENABLED: ${{ vars.OBS_TUNNEL_ENABLED }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" \
            "set -e; \
             cd '${VPS_DEPLOY_PATH}'; \
             git fetch origin main; \
             git reset --hard origin/main; \
             cd server; \
             PROFILE=''; [ '${OBS_TUNNEL_ENABLED}' = 'true' ] && PROFILE='--profile tunnel'; \
             docker compose -f observability/docker-compose.obs.yml --env-file observability/.env \$PROFILE up -d --force-recreate; \
             docker compose -f observability/docker-compose.obs.yml \$PROFILE ps"
