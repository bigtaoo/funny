name: ops-deploy

# Auto-publish the ops admin frontend (Worker nivara-ops) to Cloudflare, served at ops.gamestao.com.
# Trigger: push to main touching ops-related files, or manual Run from the Actions page.
# Flow: npm ci → npm run build (bakes git short hash into the header version string at build time) → wrangler deploy.
# Deployment details / same-origin reverse proxy / CF Access: design/product/deploy-cloudflare.md §6.
#
# Required repo secrets:
#   CLOUDFLARE_API_TOKEN   — Create via CF "My Profile → API Tokens", requires at least Workers Scripts:Edit
#                            (includes Workers Routes / Workers KV / Account read; using the "Edit Cloudflare Workers" template is simplest)
#   CLOUDFLARE_ACCOUNT_ID  — Account ID (visible in the right sidebar of the CF dashboard; needed with multiple wrangler accounts)
# Enable switch: repo variable OPS_DEPLOY_ENABLED = true (job skipped if not set, to avoid red builds before setup is complete).
# wrangler secret (ADMIN_PROXY_SECRET) persists on the Worker; deploy does not clear it, so it does not need to be re-set each time.

on:
  push:
    branches: [main]
    paths:
      - 'tools/ops/**'
      - 'wrangler.ops.jsonc'
      - 'worker.ops.js'
      - '.github/workflows/ops-deploy.yml'
  workflow_dispatch: {}

# Only one ops deployment runs at a time; new run cancels the old one to prevent concurrent deploy conflicts.
concurrency:
  group: ops-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable OPS_DEPLOY_ENABLED is not set to true (avoids red builds before setup is complete).
    if: ${{ vars.OPS_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/ops/package-lock.json

      - name: ops install
        working-directory: tools/ops
        run: npm ci

      # Outputs tools/ops/dist; webpack runs git rev-parse at build time to bake the header version string.
      - name: ops build
        working-directory: tools/ops
        run: npm run build

      # Run from repo root using -c to specify the ops config (assets point to ./tools/ops/dist).
      # Not using cloudflare/wrangler-action (it swallows real errors and bundles a deprecated Node runtime);
      # using the runner's Node + npx wrangler directly so errors are visible. wrangler 4.x is required for assets.run_worker_first.
      - name: deploy to Cloudflare
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.104.0 deploy -c wrangler.ops.jsonc
