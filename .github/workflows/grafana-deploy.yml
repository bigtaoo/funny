name: grafana-deploy

# Auto-redeploy the observability stack (Loki + Alloy + Grafana + optional cloudflared) to the Hetzner VPS (/root/funny).
# Decoupled from the main stack: separate compose, separate trigger (only runs when observability/ changes), never touches game backend containers.
# Trigger: push to main touching observability-related files, or manual Run from the Actions page.
# Flow: SSH into VPS → git reset --hard origin/main → docker compose -f observability/... up -d --force-recreate.
#   · Uses pre-built images, no --build needed (unlike the main stack's on-VPS build).
#   · --force-recreate: if mounted alloy/loki/grafana config files changed but container definitions didn't,
#     `up` won't auto-restart → force-recreate is needed to apply the new config (obs containers have no game traffic, so recreating has zero impact).
# Deployment details: server/observability/README.md "Phase 2 deployment".
#
# Reuses server-deploy SSH secret/variables (same VPS, same CI deploy key):
#   secret  VPS_SSH_KEY
#   vars    VPS_HOST / VPS_USER (defaults to root) / VPS_DEPLOY_PATH (defaults to /root/funny)
# Repo variables specific to this workflow:
#   OBS_DEPLOY_ENABLED = true   — Enable switch (job skipped if not set; on first use, manually create
#                                 observability/.env on the VPS per the README before enabling).
#   OBS_TUNNEL_ENABLED = true   — Optional; when set, starts cloudflared with `--profile tunnel`
#                                 (requires a valid CF_TUNNEL_TOKEN in .env). If not set, only loki/alloy/grafana start.

on:
  push:
    branches: [main]
    paths:
      - 'server/observability/**'
      - '.github/workflows/grafana-deploy.yml'
  workflow_dispatch: {}

# Only one obs deployment runs at a time; new run cancels the old one.
concurrency:
  group: grafana-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ vars.OBS_DEPLOY_ENABLED == 'true' }}
    steps:
      - name: set up SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_HOST: ${{ vars.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: deploy obs stack on VPS
        env:
          VPS_HOST: ${{ vars.VPS_HOST }}
          VPS_USER: ${{ vars.VPS_USER || 'root' }}
          VPS_DEPLOY_PATH: ${{ vars.VPS_DEPLOY_PATH || '/root/funny' }}
          OBS_TUNNEL_ENABLED: ${{ vars.OBS_TUNNEL_ENABLED }}
        run: |
          ssh -i ~/.ssh/deploy_key "${VPS_USER}@${VPS_HOST}" \
            "set -e; \
             cd '${VPS_DEPLOY_PATH}'; \
             git fetch origin main; \
             git reset --hard origin/main; \
             cd server; \
             PROFILE=''; [ '${OBS_TUNNEL_ENABLED}' = 'true' ] && PROFILE='--profile tunnel'; \
             docker compose -f observability/docker-compose.obs.yml --env-file observability/.env \$PROFILE up -d --force-recreate; \
             docker compose -f observability/docker-compose.obs.yml \$PROFILE ps"
