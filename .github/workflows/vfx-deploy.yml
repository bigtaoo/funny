name: vfx-deploy

# Auto-publish the combat VFX editor vfx-editor (Worker nivara-vfx, pure static assets) to Cloudflare.
# Trigger: push to main touching vfx-related files, or manual Run from the Actions page.
# Flow: npm ci → npm run build (webpack production, outputs tools/vfx-editor/dist) → wrangler deploy.
# Deployment details: design/tools/vfx-editor/DESIGN.md.
#
# Reuses the ops/client/animator repo secrets (same CF account; "Edit Cloudflare Workers" token covers all account Workers):
#   CLOUDFLARE_API_TOKEN   — Requires at least Workers Scripts:Edit (account-level; also works for vfx, no new token needed)
#   CLOUDFLARE_ACCOUNT_ID  — Account ID (same value as ops/client/animator)
# The vfx editor is a pure frontend static site with no Supabase/backend dependencies; no variables need to be injected at build time.
# Enable switch: repo variable VFX_DEPLOY_ENABLED = true (job skipped if not set, to avoid red builds before setup is complete).

on:
  push:
    branches: [main]
    paths:
      - 'tools/vfx-editor/**'
      - 'wrangler/vfx.jsonc'
      - '.github/workflows/vfx-deploy.yml'
  workflow_dispatch: {}

# Only one vfx deployment runs at a time; new run cancels the old one to prevent concurrent deploy conflicts.
concurrency:
  group: vfx-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Skip the entire job if repo variable VFX_DEPLOY_ENABLED is not set to true (avoids red builds before setup is complete).
    if: ${{ vars.VFX_DEPLOY_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tools/vfx-editor/package-lock.json

      - name: vfx install
        working-directory: tools/vfx-editor
        run: npm ci

      # Outputs tools/vfx-editor/dist (webpack production).
      - name: vfx build
        working-directory: tools/vfx-editor
        run: npm run build

      # Run from repo root using -c to specify the vfx config (assets point to ./tools/vfx-editor/dist).
      # Uses npx wrangler directly (not wrangler-action) so errors are visible as-is.
      - name: deploy to Cloudflare
        working-directory: .
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx -y wrangler@4.104.0 deploy -c wrangler/vfx.jsonc
