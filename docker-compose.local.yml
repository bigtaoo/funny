# Local "production-like" full-stack: 9 server processes + main client + 3 tools + mongo + redis, all in Docker.
#
#   Start (rebuild from latest code):  docker compose -f docker-compose.local.yml up -d --build
#   Stop (keep data):                  docker compose -f docker-compose.local.yml down
#   Stop and wipe DB:                  docker compose -f docker-compose.local.yml down -v
#   Follow logs:                       docker compose -f docker-compose.local.yml logs -f nginx metaserver worldsvc
#
# Frontend URLs (host ports):
#   http://localhost:8088   Main game (nginx same-origin: SPA + /api REST + /gw control-plane WS + /ws data-plane WS
#                                    + /world,/family,/auction SLG REST + /analytics event ingestion)
#   http://localhost:9091   Animator editor (pure frontend tool)
#   http://localhost:9092   Level editor (pure frontend tool)
#   http://localhost:9093   Ops admin frontend (cross-origin to admin backend at http://localhost:18083)
#   http://localhost:18083  Admin backend (ops frontend only; not reachable by players)
#
# Nine server processes: metaserver / commercial / gateway / matchsvc / gameserver / worldsvc / admin / analyticsvc
#   (analyticsvc is not reachable by players; events arrive via nginx /analytics, queries via admin internal endpoint).
# worldsvc requires Redis (march scheduling / channels); mongo is a single-node replica set (transactions + change streams).
#
# Why not port 80: Windows reserves 80 (and 8080/8082/8083) in TCP excludedportrange (http.sys/WinNAT),
# binding reports EACCES, so the default is 8088. To change the port, update NW_HTTP_PORT and all three NW_PUBLIC_*
# variables (client addresses are baked in at build time — requires `up --build` to rebuild the nginx image);
# or just use ./local-up.ps1 -Port <n>.
#
# Code-change isolation: all processes run from images (source snapshotted at build time); editing local code
# does not affect running containers. After `down`, `up --build` rebuilds images from the latest code.

services:
  # MongoDB single-node replica set (transactions + change streams). Cluster-internal only, not exposed to the host.
  mongo:
    image: mongo:7
    container_name: nw-local-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }"
      interval: 10s
      timeout: 10s
      start_period: 5s
      retries: 10
    restart: unless-stopped

  # Redis: worldsvc march scheduling / channels (SLG_DESIGN). Cluster-internal only, not exposed to the host.
  redis:
    image: redis:7-alpine
    container_name: nw-local-redis
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped

  metaserver:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "metaserver/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_MONGO_DB: ${NW_MONGO_DB:-notebook_wars}
      NW_META_PORT: "8080"
      NW_META_HOST: 0.0.0.0
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      # Gateway address sent back to the client in the auth response (via nginx same-origin).
      NW_GATEWAY_PUBLIC_WS_URL: ${NW_PUBLIC_GW:-ws://localhost:8088/gw}
    depends_on:
      mongo: { condition: service_healthy }
      commercial: { condition: service_started }
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20
    restart: unless-stopped

  commercial:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "commercial/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_COMM_PORT: "8092"
      NW_COMM_HOST: 0.0.0.0
      NW_COMM_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_COMM_MONGO_DB: ${NW_COMM_MONGO_DB:-notebook_wars_commercial}
    depends_on:
      mongo: { condition: service_healthy }
    restart: unless-stopped

  gateway:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "gateway/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_GW_PORT: "8082"
      NW_GW_HOST: 0.0.0.0
      NW_GW_INTERNAL_PORT: "8090"
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      # S8-4c: sect channel fanout pub/sub (shares the same Redis instance as worldsvc).
      NW_GW_REDIS_URL: redis://redis:6379
    depends_on:
      - metaserver
      - matchsvc
      - redis
    restart: unless-stopped

  matchsvc:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "matchsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_MM_INTERNAL_PORT: "8091"
      NW_MM_HOST: 0.0.0.0
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      # Data-plane address baked into tickets (fallback before gameserver registers; via nginx same-origin).
      NW_GAME_PUBLIC_WS_URL: ${NW_PUBLIC_GAME:-ws://localhost:8088/ws}
    restart: unless-stopped

  gameserver:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "gameserver/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_GAME_PORT: "8081"
      NW_GAME_HOST: 0.0.0.0
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_GAME_PUBLIC_WS_URL: ${NW_PUBLIC_GAME:-ws://localhost:8088/ws}
    depends_on:
      - metaserver
      - matchsvc
    restart: unless-stopped

  # worldsvc: SLG world map, fourth public face (/world /family /auction). Requires Redis; proxied via nginx same-origin.
  worldsvc:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "worldsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_WORLD_PORT: "18084"
      NW_WORLD_HOST: 0.0.0.0
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_WORLD_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_WORLD_MONGO_DB: ${NW_WORLD_MONGO_DB:-notebook_wars_world}
      NW_WORLD_REDIS_URL: redis://redis:6379
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
      NW_META_INTERNAL_URL: http://metaserver:8080
    depends_on:
      mongo: { condition: service_healthy }
      redis: { condition: service_started }
      gateway: { condition: service_started }
      commercial: { condition: service_started }
    restart: unless-stopped

  # socialsvc: social fifth public face (/social/*). Family / friends / mail / channels; proxied via nginx same-origin.
  # Pushes real-time events to gateway /gw/push; publicId reverse-lookup via meta /internal. Separate DB: nw_social.
  socialsvc:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "socialsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_SOCIAL_PORT: "8085"
      NW_SOCIAL_HOST: 0.0.0.0
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_SOCIAL_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_SOCIAL_MONGO_DB: ${NW_SOCIAL_MONGO_DB:-nw_social}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_META_INTERNAL_URL: http://metaserver:8080
    depends_on:
      mongo: { condition: service_healthy }
      gateway: { condition: service_started }
    restart: unless-stopped

  # analyticsvc: event ingestion + internal queries. Player-facing only via nginx /analytics for event delivery.
  analyticsvc:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "analyticsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_ANALYTICS_PORT: "18085"
      NW_ANALYTICS_HOST: 0.0.0.0
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ANALYTICS_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ANALYTICS_MONGO_DB: ${NW_ANALYTICS_MONGO_DB:-notebook_wars_analytics}
    depends_on:
      mongo: { condition: service_healthy }
    restart: unless-stopped

  # admin: ops backend. The only backend service exposed to the host (ops frontend accesses it cross-origin at :18083).
  admin:
    build: { context: ./server, dockerfile: Dockerfile }
    image: nw-server:local
    command: ["node", "admin/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:-dev-jwt-secret-change-me}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:-dev-internal-key}
      NW_ADMIN_PORT: "18083"
      NW_ADMIN_HOST: 0.0.0.0
      NW_ADMIN_JWT_SECRET: ${NW_ADMIN_JWT_SECRET:-dev-insecure-admin-secret-change-me}
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ADMIN_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ADMIN_MONGO_DB: ${NW_ADMIN_MONGO_DB:-notebook_wars_admin}
      # Seed super-admin account on first start (local dev only; use a strong password or a different injection method in production).
      NW_ADMIN_SEED_USER: ${NW_ADMIN_SEED_USER:-admin}
      NW_ADMIN_SEED_PASS: ${NW_ADMIN_SEED_PASS:-admin123}
      NW_META_BASE_URL: http://metaserver:8080
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_ANALYTICS_BASE_URL: http://analyticsvc:18085
    ports:
      - "${NW_ADMIN_PORT:-18083}:18083"
    depends_on:
      mongo: { condition: service_healthy }
      analyticsvc: { condition: service_started }
    restart: unless-stopped

  # nginx = client image (static SPA + reverse proxy). The only game-facing service exposed to the host.
  # Build context must be the repo root (context: .) so the webpack @nw/engine alias can resolve server/engine/src.
  nginx:
    build:
      context: .
      dockerfile: client/Dockerfile
      args:
        NW_API_BASE: ${NW_PUBLIC_API:-http://localhost:8088/api}
        NW_GATEWAY_WS: ${NW_PUBLIC_GW:-ws://localhost:8088/gw}
    image: nw-client:local
    container_name: nw-local-nginx
    ports:
      - "${NW_HTTP_PORT:-8088}:80"
    depends_on:
      - metaserver
      - gateway
      - gameserver
      - worldsvc
      - socialsvc
      - analyticsvc
    restart: unless-stopped

  # ── Tool frontends (pure static files, each in their own nginx container; ports match the dev convention 9091/9092/9093) ──
  animator:
    build: { context: ./tools/animator, dockerfile: Dockerfile }
    image: nw-animator:local
    container_name: nw-local-animator
    ports:
      - "${NW_ANIMATOR_PORT:-9091}:80"
    restart: unless-stopped

  # level-editor: build context is the repo root so the webpack @game alias can resolve client/src/game.
  level-editor:
    build: { context: ., dockerfile: tools/level-editor/Dockerfile }
    image: nw-level-editor:local
    container_name: nw-local-level-editor
    ports:
      - "${NW_LEVEL_EDITOR_PORT:-9092}:80"
    restart: unless-stopped

  # ops: ops admin frontend; browser makes cross-origin calls to the admin backend (default http://localhost:18083).
  ops:
    build: { context: ./tools/ops, dockerfile: Dockerfile }
    image: nw-ops:local
    container_name: nw-local-ops
    ports:
      - "${NW_OPS_PORT:-9093}:80"
    depends_on:
      - admin
    restart: unless-stopped

volumes:
  mongo-data:
