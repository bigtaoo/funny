<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook Wars — 关卡编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --ok: #a6e3a1;
      --danger: #f38ba8;
      --warn: #f9e2af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      height: 46px;
      flex: 0 0 auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
    }
    .toolbar .title { font-weight: 600; color: var(--accent); margin-right: 16px; }
    .toolbar .spacer { flex: 1; }

    button {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }

    .main {
      flex: 1 1 auto;
      display: flex;
      min-height: 0;
    }
    .pane {
      flex: 1 1 50%;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane + .pane { border-left: 1px solid var(--border); }
    .pane-head {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    textarea {
      flex: 1 1 auto;
      background: #11111b;
      color: var(--text);
      border: none;
      padding: 12px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      outline: none;
      tab-size: 2;
    }

    .status {
      flex: 0 0 auto;
      height: 30px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
      gap: 8px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .status .badge {
      font-family: monospace;
      background: var(--surface2);
      border-radius: 4px;
      padding: 1px 6px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">关卡编辑器 <span style="color:var(--text-dim);font-weight:400">P-B scaffold</span></span>
    <button id="btn-sample">载入示例 (ch1_lv1)</button>
    <button id="btn-import">导入 .json…</button>
    <span class="spacer"></span>
    <button id="btn-validate">校验 →</button>
    <button id="btn-export" class="primary">导出 .json</button>
  </div>

  <div class="main">
    <div class="pane">
      <div class="pane-head">输入 (原始 JSON)</div>
      <textarea id="input" spellcheck="false" placeholder="粘贴或载入关卡 JSON…"></textarea>
    </div>
    <div class="pane">
      <div class="pane-head">校验输出 (parseLevelDefinition 归一化结果)</div>
      <textarea id="output" spellcheck="false" readonly placeholder="点「校验 →」运行游戏侧 parseLevelDefinition"></textarea>
    </div>
  </div>

  <div class="status" id="status">就绪 — 共享游戏侧 schema (@game/campaign/levelSchema)</div>
</body>
</html>
