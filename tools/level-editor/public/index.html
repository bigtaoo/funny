<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook Wars — 关卡编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --ok: #a6e3a1;
      --danger: #f38ba8;
      --warn: #f9e2af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      height: 46px; flex: 0 0 auto;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; padding: 0 12px;
    }
    .toolbar .title { font-weight: 600; color: var(--accent); margin-right: 16px; }
    .toolbar .spacer { flex: 1; }

    button {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }
    button.danger { background: var(--danger); color: #11111b; border-color: var(--danger); }
    button.tool.active { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }

    .main { flex: 1 1 auto; display: flex; min-height: 0; }

    /* Drag handles between columns / panes */
    .vsplit { flex: 0 0 6px; cursor: col-resize; background: var(--border); align-self: stretch; }
    .hsplit { flex: 0 0 6px; cursor: row-resize; background: var(--border); }
    .vsplit:hover, .hsplit:hover { background: var(--accent); }

    .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .pane-head {
      flex: 0 0 auto; padding: 8px 12px; font-size: 12px; color: var(--text-dim);
      background: var(--surface); border-bottom: 1px solid var(--border);
    }

    /* Left column: board */
    .col-board { flex: 0 0 360px; width: 360px; border-right: 1px solid var(--border); overflow: auto; }
    .board-tools {
      flex: 0 0 auto; display: flex; gap: 6px; padding: 8px 12px;
      background: var(--surface); border-bottom: 1px solid var(--border);
    }
    .board-tools button.tool { padding: 4px 10px; font-size: 12px; }
    .board-mount { flex: 0 0 auto; padding: 12px; display: flex; justify-content: center; }
    .board-mount canvas { background: #11111b; border-radius: 4px; }
    .legend {
      flex: 0 0 auto; padding: 8px 12px; background: var(--surface);
      border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim);
      display: flex; flex-wrap: wrap; gap: 4px 14px;
    }
    .legend i { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: -1px; margin-right: 4px; }

    /* Center column: timeline (top) + json (bottom) */
    .col-center { flex: 1 1 auto; }
    .timeline-mount { flex: 1 1 auto; overflow: auto; background: #11111b; }
    .json-wrap { flex: 0 0 auto; height: 180px; display: flex; flex-direction: column; border-top: 1px solid var(--border); }
    textarea {
      flex: 1 1 auto; background: #11111b; color: var(--text); border: none; padding: 10px;
      font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; line-height: 1.5;
      resize: none; outline: none; tab-size: 2;
    }
    .json-bar {
      flex: 0 0 auto; display: flex; gap: 8px; align-items: center;
      padding: 6px 12px; background: var(--surface); border-top: 1px solid var(--border);
    }
    .json-bar .hint { color: var(--text-dim); font-size: 11px; }

    /* Right column: inspector */
    .col-insp { flex: 0 0 260px; border-left: 1px solid var(--border); overflow-y: auto; }
    .insp-tabs { display: flex; flex: 0 0 auto; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
    .insp-tab { flex: 1; border: none; border-radius: 0; background: transparent; padding: 9px; color: var(--text-dim); }
    .insp-tab:hover { color: var(--text); }
    .insp-tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); font-weight: 600; }
    .insp-body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .form-section { font-weight: 600; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; padding-top: 8px; border-top: 1px solid var(--border); }
    .col-insp select[multiple] { height: auto; font-size: 12px; }
    .insp-title { font-weight: 600; color: var(--accent); }
    .insp-field { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--text-dim); }
    .insp-field span { font-size: 11px; }
    .insp-field input[type=number], .insp-field select {
      background: #11111b; color: var(--text); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 7px; font-size: 13px; width: 100%;
    }
    .insp-field input[type=checkbox] { width: 16px; height: 16px; }
    .hint { color: var(--text-dim); font-size: 11px; line-height: 1.5; }

    .status {
      flex: 0 0 auto; height: 30px; background: var(--surface);
      border-top: 1px solid var(--border); display: flex; align-items: center;
      padding: 0 12px; font-size: 12px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">关卡编辑器 <span style="color:var(--text-dim);font-weight:400">P-D 波次时间线</span></span>
    <button id="btn-sample">载入示例 (ch1_lv1)</button>
    <button id="btn-import">导入 .json…</button>
    <span class="spacer"></span>
    <button id="btn-export" class="primary">导出 .json</button>
  </div>

  <div class="main">
    <!-- Left: board -->
    <div class="pane col-board" id="col-board">
      <div class="pane-head">棋盘 — 顶=敌方 / 底=己方；点列号开关车道；变道/护送工具下点空格加点·拖节点·右键删</div>
      <div class="board-tools">
        <span style="color:var(--text-dim);align-self:center">画笔:</span>
        <button class="tool" data-tool="noBuild">不可建造</button>
        <button class="tool" data-tool="blocked">障碍</button>
        <button class="tool" data-tool="erase">擦除</button>
        <button class="tool" data-tool="wp" title="选中波次后：点空格加变道点，拖动节点改位置，右键删除">变道</button>
        <button class="tool" data-tool="escort" title="点护送起点选中后：点空格加路径点（须向敌方推进），拖动改位置，右键删除">护送</button>
      </div>
      <div class="board-mount" id="board-mount"></div>
      <div class="legend">
        <span><i style="background:#3a3420"></i>基地列</span>
        <span><i style="background:#1e2c3a"></i>己方建造</span>
        <span><i style="background:#243a4e"></i>己方出兵</span>
        <span><i style="background:#4e2430"></i>敌方出兵</span>
        <span><i style="background:#3a1e26"></i>敌方建造</span>
        <span><i style="background:#f9e2af"></i>不可建造</span>
        <span><i style="background:#6c7086"></i>障碍</span>
        <span><i style="background:#f38ba8"></i>变道路径</span>
        <span><i style="background:#a6e3a1"></i>护送路径</span>
      </div>
    </div>

    <div class="vsplit" id="split-board"></div>

    <!-- Center: timeline + json -->
    <div class="pane col-center">
      <div class="pane-head">波次时间线 — 拖动块改时间/车道；右键删除；滚轮平移，Ctrl+滚轮缩放</div>
      <div class="timeline-mount" id="timeline-mount"></div>
      <div class="hsplit" id="split-json"></div>
      <div class="json-wrap" id="json-wrap">
        <textarea id="json" spellcheck="false"></textarea>
        <div class="json-bar">
          <button id="btn-apply">应用 JSON →</button>
          <span class="hint">实时反映编辑；手改后「应用」经游戏侧校验回写。</span>
        </div>
      </div>
    </div>

    <div class="vsplit" id="split-insp"></div>

    <!-- Right: tabbed inspector (level form / wave inspector) -->
    <div class="pane col-insp" id="col-insp">
      <div class="insp-tabs">
        <button class="insp-tab active" data-tab="level">关卡</button>
        <button class="insp-tab" data-tab="wave">波次</button>
      </div>
      <div class="insp-body" id="level-form"></div>
      <div class="insp-body" id="inspector" style="display:none"></div>
    </div>
  </div>

  <div class="status" id="status">就绪</div>
</body>
</html>
