<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook Wars — 关卡编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --ok: #a6e3a1;
      --danger: #f38ba8;
      --warn: #f9e2af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      height: 46px;
      flex: 0 0 auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 12px;
    }
    .toolbar .title { font-weight: 600; color: var(--accent); margin-right: 16px; }
    .toolbar .spacer { flex: 1; }

    button {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button.primary { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }
    button.tool.active { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }

    .main { flex: 1 1 auto; display: flex; min-height: 0; }
    .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .pane.board { flex: 0 0 auto; border-right: 1px solid var(--border); }
    .pane.json { flex: 1 1 auto; }
    .pane-head {
      flex: 0 0 auto;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .board-tools {
      flex: 0 0 auto;
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .board-tools button.tool { padding: 4px 10px; font-size: 12px; }
    .board-mount {
      flex: 1 1 auto;
      overflow: auto;
      padding: 12px;
      display: flex;
      justify-content: center;
    }
    .board-mount canvas { background: #11111b; border-radius: 4px; }

    .legend {
      flex: 0 0 auto;
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      flex-wrap: wrap;
      gap: 4px 14px;
    }
    .legend i { display: inline-block; width: 11px; height: 11px; border-radius: 2px; vertical-align: -1px; margin-right: 4px; }

    textarea {
      flex: 1 1 auto;
      background: #11111b;
      color: var(--text);
      border: none;
      padding: 12px;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      font-size: 12px;
      line-height: 1.5;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    .json-bar {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 8px 12px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .json-bar .hint { color: var(--text-dim); font-size: 11px; }

    .status {
      flex: 0 0 auto;
      height: 30px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 12px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">关卡编辑器 <span style="color:var(--text-dim);font-weight:400">P-C 棋盘</span></span>
    <button id="btn-sample">载入示例 (ch1_lv1)</button>
    <button id="btn-import">导入 .json…</button>
    <span class="spacer"></span>
    <button id="btn-export" class="primary">导出 .json</button>
  </div>

  <div class="main">
    <div class="pane board">
      <div class="pane-head">棋盘 — 顶=敌方 (Top) / 底=己方 (Bottom)；点列号开关车道</div>
      <div class="board-tools">
        <span style="color:var(--text-dim);align-self:center">画笔:</span>
        <button class="tool" data-tool="noBuild">不可建造</button>
        <button class="tool" data-tool="blocked">障碍 (不可通行)</button>
        <button class="tool" data-tool="erase">擦除</button>
      </div>
      <div class="board-mount" id="board-mount"></div>
      <div class="legend">
        <span><i style="background:#3a3420"></i>基地列</span>
        <span><i style="background:#1e2c3a"></i>己方建造行</span>
        <span><i style="background:#243a4e"></i>己方出兵行</span>
        <span><i style="background:#4e2430"></i>敌方出兵行</span>
        <span><i style="background:#3a1e26"></i>敌方建造行</span>
        <span><i style="background:#f9e2af"></i>不可建造</span>
        <span><i style="background:#6c7086"></i>障碍</span>
      </div>
    </div>

    <div class="pane json">
      <div class="pane-head">关卡 JSON（实时反映编辑；可手改后「应用」）</div>
      <textarea id="json" spellcheck="false"></textarea>
      <div class="json-bar">
        <button id="btn-apply">应用 JSON →</button>
        <span class="hint">编辑右侧 JSON 后点「应用」回写到棋盘；棋盘操作会刷新此处文本。</span>
      </div>
    </div>
  </div>

  <div class="status" id="status">就绪</div>
</body>
</html>
