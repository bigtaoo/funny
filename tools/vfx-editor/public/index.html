<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notebook Wars — 特效编辑器</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --ok: #a6e3a1;
      --danger: #f38ba8;
      --warn: #f9e2af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .toolbar {
      height: 46px; flex: 0 0 auto;
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px; padding: 0 12px;
    }
    .toolbar .title { font-weight: 600; color: var(--accent); margin-right: 16px; }
    .toolbar .spacer { flex: 1; }
    .toolbar .autosave { color: var(--text-dim); font-size: 11px; margin-right: 8px; }

    button {
      background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 6px 12px; font-size: 13px; cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    button:disabled { opacity: 0.4; cursor: default; }
    button.primary { background: var(--accent); color: #11111b; border-color: var(--accent); font-weight: 600; }
    button.danger { background: var(--danger); color: #11111b; border-color: var(--danger); }
    button.sm { padding: 3px 8px; font-size: 11px; }

    .main { flex: 1 1 auto; display: flex; min-height: 0; }

    .vsplit { flex: 0 0 6px; cursor: col-resize; background: var(--border); align-self: stretch; }
    .hsplit { flex: 0 0 6px; cursor: row-resize; background: var(--border); }
    .vsplit:hover, .hsplit:hover { background: var(--accent); }

    .pane { display: flex; flex-direction: column; min-width: 0; min-height: 0; }
    .pane-head {
      flex: 0 0 auto; padding: 8px 12px; font-size: 12px; color: var(--text-dim);
      background: var(--surface); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
    }
    .pane-head .ph-title { font-weight: 600; color: var(--accent); }
    .pane-head .spacer { flex: 1; }

    /* Left column: effect library (top) + layers (bottom) */
    .col-left { flex: 0 0 240px; width: 240px; border-right: 1px solid var(--border); }
    .effect-list { flex: 0 0 200px; overflow-y: auto; }
    .layer-wrap { flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column; border-top: 1px solid var(--border); }

    .list { display: flex; flex-direction: column; }
    .list-row {
      display: flex; align-items: center; gap: 6px; padding: 6px 10px;
      border-bottom: 1px solid var(--border); cursor: pointer;
    }
    .list-row:hover { background: var(--surface2); }
    .list-row.active { background: var(--surface2); border-left: 3px solid var(--accent); padding-left: 7px; }
    .list-row .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .list-row .meta { color: var(--text-dim); font-size: 11px; }
    .list-actions { display: flex; gap: 6px; padding: 8px 10px; flex-wrap: wrap; }

    /* Center column: preview (top) + timeline + json (bottom) */
    .col-center { flex: 1 1 auto; }
    .preview-mount { flex: 1 1 auto; overflow: hidden; background: #0e0e18; display: flex; align-items: center; justify-content: center; }
    .preview-mount canvas { display: block; }

    .timeline {
      flex: 0 0 auto; display: flex; align-items: center; gap: 10px;
      padding: 8px 12px; background: var(--surface); border-top: 1px solid var(--border);
    }
    .timeline input[type=range] { flex: 1; }
    .timeline .tval { color: var(--text-dim); font-size: 11px; min-width: 88px; }
    .timeline label { color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 4px; }
    .timeline input[type=number] {
      background: #11111b; color: var(--text); border: 1px solid var(--border);
      border-radius: 5px; padding: 4px 6px; font-size: 12px; width: 64px;
    }

    .json-wrap { flex: 0 0 auto; height: 150px; display: flex; flex-direction: column; border-top: 1px solid var(--border); }
    textarea {
      flex: 1 1 auto; background: #11111b; color: var(--text); border: none; padding: 10px;
      font-family: 'Cascadia Code', 'Consolas', monospace; font-size: 12px; line-height: 1.5;
      resize: none; outline: none; tab-size: 2;
    }
    .json-bar {
      flex: 0 0 auto; display: flex; gap: 8px; align-items: center;
      padding: 6px 12px; background: var(--surface); border-top: 1px solid var(--border);
    }
    .json-bar .hint { color: var(--text-dim); font-size: 11px; }

    /* Right column: effect props + color palette + params + metrics */
    .col-right { flex: 0 0 300px; border-left: 1px solid var(--border); overflow-y: auto; }
    .section { padding: 10px 12px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
    .section-title { font-weight: 600; color: var(--accent); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }

    .field { display: flex; flex-direction: column; gap: 3px; font-size: 12px; color: var(--text-dim); }
    .field span { font-size: 11px; }
    .field input[type=text], .field input[type=number], .field select {
      background: #11111b; color: var(--text); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 7px; font-size: 13px; width: 100%;
    }
    .row2 { display: flex; gap: 8px; }
    .row2 > * { flex: 1; }
    .inline { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }

    .swatches { display: flex; flex-wrap: wrap; gap: 6px; }
    .swatch {
      width: 28px; height: 28px; border-radius: 6px; border: 2px solid var(--border);
      cursor: pointer; position: relative;
    }
    .swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--accent); }
    .swatch span { position: absolute; bottom: -14px; left: 0; right: 0; text-align: center; font-size: 9px; color: var(--text-dim); white-space: nowrap; }

    /* Params */
    .param { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
    .param-head { display: flex; align-items: center; gap: 6px; }
    .param-head .pname { flex: 1; font-weight: 600; font-size: 12px; color: var(--text); }
    .param-head select { width: auto; background: #11111b; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 2px 4px; font-size: 11px; }
    .kf-row { display: flex; gap: 4px; align-items: center; }
    .kf-row input { width: 100%; background: #11111b; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 3px 5px; font-size: 11px; }
    .num { width: 100%; background: #11111b; color: var(--text); border: 1px solid var(--border); border-radius: 4px; padding: 4px 6px; font-size: 12px; }

    .metric-row { display: flex; justify-content: space-between; font-size: 12px; }
    .metric-row .v { color: var(--text); }
    .metric-row.over .v { color: var(--warn); font-weight: 600; }
    .warn-box { background: rgba(249,226,175,0.1); border: 1px solid var(--warn); border-radius: 6px; padding: 8px; font-size: 11px; color: var(--warn); line-height: 1.5; }

    .empty { color: var(--text-dim); font-size: 12px; padding: 4px 0; }

    .status {
      flex: 0 0 auto; height: 30px; background: var(--surface);
      border-top: 1px solid var(--border); display: flex; align-items: center;
      padding: 0 12px; font-size: 12px;
    }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">特效编辑器 <span style="color:var(--text-dim);font-weight:400">VFX · 墨线矢量</span></span>
    <button id="btn-new">新建</button>
    <button id="btn-import">导入 .json…</button>
    <span class="spacer"></span>
    <span class="autosave" id="autosave">—</span>
    <button id="btn-undo" title="撤销 (Ctrl+Z)">↶ 撤销</button>
    <button id="btn-redo" title="重做 (Ctrl+Shift+Z)">↷ 重做</button>
    <button id="btn-export" class="primary">导出 .json</button>
  </div>

  <div class="main">
    <!-- Left: effect library + layers -->
    <div class="pane col-left" id="col-left">
      <div class="pane-head"><span class="ph-title">特效库</span></div>
      <div class="effect-list list" id="effect-list"></div>
      <div class="layer-wrap">
        <div class="pane-head"><span class="ph-title">图层</span><span class="spacer"></span>
          <select id="layer-add-type" class="sm" style="background:#11111b;color:var(--text);border:1px solid var(--border);border-radius:4px;padding:3px"></select>
          <button id="btn-add-layer" class="sm">+ 加层</button>
        </div>
        <div class="list" id="layer-list" style="overflow-y:auto"></div>
      </div>
    </div>

    <div class="vsplit" id="split-left"></div>

    <!-- Center: preview + timeline + json -->
    <div class="pane col-center">
      <div class="pane-head"><span class="ph-title">预览</span><span class="spacer"></span>
        <label class="inline"><input type="checkbox" id="chk-ref"> 参考单位</label>
        <button id="btn-reseed" class="sm" title="重掷随机种子（仅预览观感）">🎲 重掷</button>
      </div>
      <div class="preview-mount" id="preview-mount"></div>
      <div class="timeline">
        <button id="btn-play" class="sm" style="min-width:64px">⏸ 暂停</button>
        <input type="range" id="scrub" min="0" max="1000" value="0">
        <span class="tval" id="tval">t=0.00</span>
        <label>时长(s)<input type="number" id="duration" step="0.05" min="0.05"></label>
        <label class="inline"><input type="checkbox" id="chk-loop"> loop</label>
      </div>
      <div class="hsplit" id="split-json"></div>
      <div class="json-wrap" id="json-wrap">
        <textarea id="json" spellcheck="false"></textarea>
        <div class="json-bar">
          <button id="btn-apply">应用 JSON →</button>
          <span class="hint">实时反映编辑；手改后「应用」经游戏侧 parseEffectDef 校验回写（points 等可在此直接编辑）。</span>
        </div>
      </div>
    </div>

    <div class="vsplit" id="split-right"></div>

    <!-- Right: effect props + palette + params + metrics -->
    <div class="pane col-right" id="col-right">
      <div class="section">
        <div class="section-title">特效属性</div>
        <label class="field"><span>id</span><input type="text" id="eff-id"></label>
        <label class="field"><span>defaultColor (0xRRGGBB)</span><input type="text" id="eff-color"></label>
      </div>
      <div class="section">
        <div class="section-title">预览颜色盘（运行时由调用方传入，此处仅验证各阵营色）</div>
        <div class="swatches" id="swatches"></div>
      </div>
      <div class="section" id="param-section">
        <div class="section-title">参数 — <span id="param-layer-label">未选图层</span></div>
        <div id="param-list" style="display:flex;flex-direction:column;gap:8px"></div>
        <div class="row2" id="param-add-wrap" style="display:none">
          <select id="param-add-name" class="num"></select>
          <button id="btn-add-param" class="sm">+ 参数</button>
        </div>
      </div>
      <div class="section">
        <div class="section-title">性能预算（软约束 · 超限警告不阻断）</div>
        <div id="metrics"></div>
        <div id="metric-warnings"></div>
      </div>
    </div>
  </div>

  <div class="status" id="status">就绪</div>
</body>
</html>
