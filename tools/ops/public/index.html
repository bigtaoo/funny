<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notebook Wars — Admin Panel</title>
    <style>
      :root {
        --bg: #f7f6f1;
        --panel: #fffdf7;
        --ink: #2b2b2b;
        --muted: #7a7a72;
        --line: #d8d4c8;
        --blue: #2f5fcf;
        --red: #c0392b;
        --green: #2e8b57;
        --amber: #c9920a;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-monospace, "Cascadia Code", Consolas, monospace;
        background: var(--bg);
        color: var(--ink);
        font-size: 13px;
      }
      header {
        display: flex;
        align-items: center;
        gap: 16px;
        padding: 10px 18px;
        background: var(--panel);
        border-bottom: 2px solid var(--line);
      }
      header .brand { font-weight: 700; font-size: 15px; }
      header .who { margin-left: auto; color: var(--muted); }
      header .build { margin-left: 12px; color: var(--muted); font-size: 12px; opacity: .7; font-family: monospace; cursor: default; }
      header button { margin-left: 12px; }
      nav {
        display: flex;
        gap: 4px;
        padding: 0 12px;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        flex-wrap: wrap;
      }
      nav a {
        padding: 8px 14px;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        user-select: none;
      }
      nav a.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
      main { padding: 18px; max-width: 1100px; margin: 0 auto; }
      h2 { margin: 0 0 14px; font-size: 16px; }
      .card { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; padding: 14px; margin-bottom: 14px; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 4px; padding: 14px; }
      .stat .v { font-size: 26px; font-weight: 700; color: var(--blue); }
      .stat .k { color: var(--muted); margin-top: 4px; }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 7px 8px; border-bottom: 1px solid var(--line); vertical-align: top; }
      th { color: var(--muted); font-weight: 600; }
      input, select, textarea {
        font-family: inherit; font-size: 13px; padding: 6px 8px;
        border: 1px solid var(--line); border-radius: 3px; background: #fff; color: var(--ink);
      }
      textarea { width: 100%; min-height: 64px; }
      label { display: block; margin: 8px 0 3px; color: var(--muted); }
      button {
        font-family: inherit; font-size: 13px; padding: 6px 12px; cursor: pointer;
        border: 1px solid var(--blue); background: var(--blue); color: #fff; border-radius: 3px;
      }
      button.ghost { background: #fff; color: var(--blue); }
      button.danger { background: var(--red); border-color: var(--red); }
      button.warn { background: var(--amber); border-color: var(--amber); }
      button:disabled { opacity: 0.45; cursor: not-allowed; }
      .pill { display: inline-block; padding: 1px 8px; border-radius: 10px; font-size: 11px; border: 1px solid var(--line); }
      .pill.pending { color: var(--amber); border-color: var(--amber); }
      .pill.approved { color: var(--blue); border-color: var(--blue); }
      .pill.executed { color: var(--green); border-color: var(--green); }
      .pill.rejected, .pill.failed { color: var(--red); border-color: var(--red); }
      .pill.cancelled { color: var(--muted); }
      .err { color: var(--red); margin: 8px 0; min-height: 16px; }
      .ok { color: var(--green); }
      .muted { color: var(--muted); }
      .login-wrap { max-width: 340px; margin: 80px auto; }
      .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
      .right { margin-left: auto; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
