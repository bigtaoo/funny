<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Stickman Animation Editor</title><style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --danger: #f38ba8;
      --warn: #f9e2af;
      --selected: #74c7ec;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ── Toolbar ── */
    .toolbar {
      height: 42px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar .logo { font-weight: 700; font-size: 13px; color: var(--accent); margin-right: 8px; }
    .toolbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 2px; }
    .toolbar label { color: var(--text-dim); }

    /* ── Main ── */
    .main { display: flex; flex: 1; overflow: hidden; min-height: 0; }

    /* ── Left Panel ── */
    .left-panel {
      width: 180px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-header {
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    #anim-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    .anim-item {
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
    }
    .anim-item:hover { background: var(--surface2); color: var(--text); }
    .anim-item.active { background: #1e3a5f; color: var(--selected); font-weight: 600; }
    .anim-item .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .left-actions {
      padding: 6px;
      display: flex;
      gap: 4px;
      border-top: 1px solid var(--border);
    }
    .playback-section { border-top: 1px solid var(--border); padding: 8px; }
    .playback-row { display: flex; align-items: center; gap: 4px; margin-bottom: 6px; }
    #time-display {
      font-family: monospace;
      font-size: 11px;
      color: var(--warn);
      text-align: center;
      margin-top: 4px;
    }

    /* ── Canvas ── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e8e4db;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }
    #canvas-wrap canvas { display: block; }
    #canvas-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ── Right Panel ── */
    .right-panel {
      width: 210px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    /* ── Atlas Panel ── */
    #atlas-panel {
      width: 190px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .prop-input {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 12px;
      font-family: monospace;
    }
    #bone-info-area { padding: 8px; }
    .bone-name { font-size: 13px; font-weight: 600; color: var(--selected); margin-bottom: 8px; }
    .prop-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; gap: 6px; }
    .prop-label { color: var(--text-dim); }
    .prop-value { font-family: monospace; color: var(--accent); font-size: 12px; }
    .hint-text { color: var(--text-dim); font-size: 11px; padding: 8px; text-align: center; line-height: 1.6; }
    .view-options { border-top: 1px solid var(--border); padding-top: 4px; margin-top: 4px; }
    .checkbox-row { display: flex; align-items: center; gap: 6px; padding: 4px 8px; color: var(--text-dim); }
    .checkbox-row:hover { color: var(--text); }

    /* ── Timeline ── */
    .timeline {
      height: 285px;  /* RULER_H(20) + TIMELINE_BONES(10) × ROW_H(26) = 280px + 5px breathing room */
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      padding: 4px 10px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .timeline-body { display: flex; flex: 1; overflow: hidden; }
    #tl-labels {
      width: 115px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .tl-label-spacer { height: 20px; border-bottom: 1px solid var(--border); }
    .tl-label-row {
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid #2a2a40;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      gap: 5px;
    }
    .tl-label-row:hover { background: var(--surface2); color: var(--text); }
    .tl-label-row.active { color: var(--selected); }
    .tl-label-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    #tl-canvas-wrap { flex: 1; position: relative; overflow: hidden; }
    #timeline-canvas { display: block; width: 100%; height: 100%; cursor: pointer; }

    /* ── Bottom Bar ── */
    .bottom-bar {
      height: 36px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    #status-text { color: var(--text-dim); font-size: 11px; margin-left: auto; }

    /* ── Shared Components ── */
    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    button:hover { background: var(--border); }
    button:active { transform: scale(0.97); }
    button.primary { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: #2a4e7f; }
    button.danger { background: #3f1e2e; border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: #5a2a3f; }
    button.sm { padding: 3px 7px; font-size: 11px; }
    button.icon { padding: 4px 6px; }

    input[type=number], input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 12px;
      width: 60px;
      font-family: monospace;
    }
    input[type=range] { width: 100%; accent-color: var(--accent); }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 12px;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }</style></head><body><div class="toolbar"><span class="logo">✏️ Stickman Anim Editor</span><div class="sep"></div><button class="primary" id="btn-play">▶ Play</button> <button id="btn-stop">⏹ Stop</button><div class="sep"></div><label>Speed</label> <select id="sel-speed"><option value="0.25">0.25×</option><option value="0.5">0.5×</option><option value="1" selected="selected">1×</option><option value="2">2×</option></select><div class="sep"></div><label>Loop</label> <input type="checkbox" id="chk-loop" checked="checked"><div class="sep"></div><button id="btn-add-kf" class="primary sm">＋ Keyframe</button> <button id="btn-del-kf" class="danger sm">✕ Del KF</button><div class="sep"></div><label>Duration</label> <input type="number" id="inp-duration" value="0.5" min="0.1" max="10" step="0.05" style="width:65px"> <span style="color:var(--text-dim)">s</span></div><div class="main"><div class="left-panel"><div class="panel-header">Animations</div><div id="anim-list"></div><div class="left-actions"><button class="sm" id="btn-new-anim" style="flex:1">＋ New</button> <button class="sm danger" id="btn-del-anim">🗑</button> <button class="sm" id="btn-ren-anim">✎</button></div><div class="playback-section"><div class="playback-row"><button class="sm icon" id="btn-prev-kf">⏮</button> <button class="sm icon" id="btn-next-kf">⏭</button> <button class="sm" id="btn-play2" style="flex:1">▶</button></div><div id="time-display">0.000s / 0.500s</div></div></div><div id="canvas-wrap"><span id="canvas-hint">Click bone · Drag to rotate · Right-drag to pan · Tab = toggle mode</span></div><div class="right-panel"><div class="panel-header">Bone Properties</div><div id="bone-info-area"><div class="hint-text">Click a bone<br>on the canvas<br>to select it</div></div><div class="view-options"><div class="panel-header">View</div><label class="checkbox-row"><input type="checkbox" id="chk-joints" checked="checked"> Show joints</label> <label class="checkbox-row"><input type="checkbox" id="chk-overlay" checked="checked"> Skeleton overlay</label> <label class="checkbox-row"><input type="checkbox" id="chk-pivots"> Show pivots</label> <label class="checkbox-row"><input type="checkbox" id="chk-onion"> Onion skin</label> <label class="checkbox-row"><input type="checkbox" id="chk-guide"> Guide lines</label><div class="prop-row" style="padding:4px 8px"><span class="prop-label">Background</span> <input type="color" id="inp-bg-color" value="#F5F0E8" style="width:36px;height:22px;padding:1px;border:1px solid var(--border);border-radius:3px;background:none;cursor:pointer"></div></div><div><div class="panel-header">Attachment Points</div><div id="attachment-panel"></div></div></div><div id="atlas-panel"><div class="panel-header">Atlas</div></div></div><div class="timeline"><div class="timeline-header"><span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)">Timeline</span></div><div class="timeline-body"><div id="tl-labels"><div class="tl-label-spacer"></div></div><div id="tl-canvas-wrap"><canvas id="timeline-canvas"></canvas></div></div></div><div class="bottom-bar"><button id="btn-export">⬇ Export JSON</button> <button id="btn-import">⬆ Import JSON</button> <button id="btn-reset-pose">⟳ Reset Pose</button> <button id="btn-presets">📋 Preset…</button> <span id="status-text">Ready</span></div><input type="file" id="file-input" accept=".json" style="display:none"><script defer="defer" src="bundle.cace4ed37cb31325fadd.js"></script></body></html>
