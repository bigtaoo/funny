<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stickman Animation Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1a1a2e;
      --surface: #242436;
      --surface2: #2e2e46;
      --border: #3a3a58;
      --text: #cdd6f4;
      --text-dim: #6e6e8a;
      --accent: #89b4fa;
      --accent2: #a6e3a1;
      --danger: #f38ba8;
      --warn: #f9e2af;
      --selected: #74c7ec;
      --kf-color: #f9e2af;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      user-select: none;
    }

    /* ─── Toolbar ─── */
    .toolbar {
      height: 42px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    .toolbar .logo {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
      margin-right: 8px;
      white-space: nowrap;
    }
    .toolbar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }
    .toolbar label { color: var(--text-dim); }

    /* ─── Main area ─── */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* ─── Left Panel ─── */
    .left-panel {
      width: 180px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }
    .panel-header {
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .anim-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px;
    }
    .anim-item {
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      font-size: 12px;
    }
    .anim-item:hover { background: var(--surface2); color: var(--text); }
    .anim-item.active { background: #1e3a5f; color: var(--selected); font-weight: 600; }
    .anim-item .anim-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-dim); }
    .anim-item.active .anim-dot { background: var(--selected); }
    .left-actions {
      padding: 6px;
      display: flex;
      gap: 4px;
      border-top: 1px solid var(--border);
    }

    /* Playback */
    .playback-section {
      border-top: 1px solid var(--border);
      padding: 8px;
    }
    .playback-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 6px;
    }
    .speed-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .speed-row label { color: var(--text-dim); }
    .time-display {
      font-family: monospace;
      font-size: 11px;
      color: var(--warn);
      text-align: center;
      margin-top: 4px;
    }

    /* ─── Canvas Area ─── */
    #canvas-wrap {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #e8e4db;
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }
    #canvas-wrap canvas { display: block; }
    .canvas-hint {
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.45);
      color: #fff;
      font-size: 11px;
      padding: 3px 10px;
      border-radius: 10px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* ─── Right Panel ─── */
    .right-panel {
      width: 195px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .bone-info {
      padding: 8px;
    }
    .bone-name {
      font-size: 13px;
      font-weight: 600;
      color: var(--selected);
      margin-bottom: 8px;
    }
    .prop-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
      gap: 6px;
    }
    .prop-label { color: var(--text-dim); flex-shrink: 0; }
    .prop-value {
      font-family: monospace;
      color: var(--accent);
      font-size: 12px;
    }
    input[type=range] {
      width: 100%;
      accent-color: var(--accent);
    }
    .hint-text {
      color: var(--text-dim);
      font-size: 11px;
      padding: 8px;
      text-align: center;
      line-height: 1.5;
    }

    /* ─── Timeline ─── */
    .timeline {
      height: 190px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .timeline-header {
      display: flex;
      align-items: center;
      padding: 4px 10px;
      gap: 8px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }
    .timeline-header label { color: var(--text-dim); }
    .timeline-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    .tl-labels {
      width: 110px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    .tl-label-spacer { height: 20px; border-bottom: 1px solid var(--border); }
    .tl-label-row {
      height: 26px;
      display: flex;
      align-items: center;
      padding: 0 8px;
      border-bottom: 1px solid #2a2a40;
      font-size: 11px;
      color: var(--text-dim);
      cursor: pointer;
      gap: 4px;
    }
    .tl-label-row:hover { background: var(--surface2); color: var(--text); }
    .tl-label-row.active { color: var(--selected); }
    .tl-label-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    .tl-canvas-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }
    #timeline-canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ─── Bottom Bar ─── */
    .bottom-bar {
      height: 36px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      flex-shrink: 0;
    }
    .status-text { color: var(--text-dim); font-size: 11px; margin-left: auto; }

    /* ─── Buttons ─── */
    button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      white-space: nowrap;
    }
    button:hover { background: var(--border); }
    button:active { transform: scale(0.97); }
    button.primary { background: #1e3a5f; border-color: var(--accent); color: var(--accent); }
    button.primary:hover { background: #2a4e7f; }
    button.danger { background: #3f1e2e; border-color: var(--danger); color: var(--danger); }
    button.danger:hover { background: #5a2a3f; }
    button.sm { padding: 3px 7px; font-size: 11px; }
    button.icon { padding: 4px 6px; }

    input[type=number], input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 12px;
      width: 60px;
      font-family: monospace;
    }
    input[type=number]:focus, input[type=text]:focus {
      outline: 1px solid var(--accent);
    }
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 3px 6px;
      border-radius: 3px;
      font-size: 12px;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      color: var(--text-dim);
    }
    .checkbox-row:hover { color: var(--text); }
    .view-options { border-top: 1px solid var(--border); padding-top: 4px; margin-top: 4px; }

    .scrollbar-thin { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<!-- ═══ TOOLBAR ═══ -->
<div class="toolbar">
  <span class="logo">✏️ Stickman Anim Editor</span>
  <div class="sep"></div>
  <button class="primary" id="btn-play">▶ Play</button>
  <button id="btn-stop">⏹ Stop</button>
  <div class="sep"></div>
  <label>Speed</label>
  <select id="sel-speed">
    <option value="0.25">0.25×</option>
    <option value="0.5">0.5×</option>
    <option value="1" selected>1×</option>
    <option value="2">2×</option>
  </select>
  <div class="sep"></div>
  <label>Loop</label>
  <input type="checkbox" id="chk-loop" checked>
  <div class="sep"></div>
  <button id="btn-add-kf" class="primary sm">＋ Add Keyframe</button>
  <button id="btn-del-kf" class="danger sm">✕ Del Keyframe</button>
  <div class="sep"></div>
  <label>Duration</label>
  <input type="number" id="inp-duration" value="0.5" min="0.1" max="10" step="0.05" style="width:70px">
  <span style="color:var(--text-dim)">s</span>
</div>

<!-- ═══ MAIN AREA ═══ -->
<div class="main">

  <!-- Left Panel -->
  <div class="left-panel">
    <div class="panel-header">Animations</div>
    <div class="anim-list scrollbar-thin" id="anim-list"></div>
    <div class="left-actions">
      <button class="sm" id="btn-new-anim" style="flex:1">＋ New</button>
      <button class="sm danger" id="btn-del-anim">🗑</button>
      <button class="sm" id="btn-ren-anim">✎</button>
    </div>
    <div class="playback-section">
      <div class="playback-row">
        <button class="sm icon" id="btn-prev-kf" title="Prev keyframe">⏮</button>
        <button class="sm icon" id="btn-next-kf" title="Next keyframe">⏭</button>
        <button class="sm" id="btn-play2" style="flex:1">▶</button>
      </div>
      <div class="time-display" id="time-display">0.000s / 0.500s</div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-wrap">
    <div class="canvas-hint" id="canvas-hint">Click bone to select · Drag to rotate · Right-drag to pan</div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel scrollbar-thin">
    <div class="panel-header">Bone Properties</div>
    <div id="bone-info-area">
      <div class="hint-text">Click a bone<br>on the canvas<br>to select it</div>
    </div>
    <div class="view-options">
      <div class="panel-header">View</div>
      <label class="checkbox-row"><input type="checkbox" id="chk-joints" checked> Show joints</label>
      <label class="checkbox-row"><input type="checkbox" id="chk-onion"> Onion skin</label>
      <label class="checkbox-row"><input type="checkbox" id="chk-guide"> Guide lines</label>
    </div>
  </div>
</div>

<!-- ═══ TIMELINE ═══ -->
<div class="timeline">
  <div class="timeline-header">
    <span style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim)">Timeline</span>
  </div>
  <div class="timeline-body">
    <div class="tl-labels" id="tl-labels">
      <div class="tl-label-spacer"></div>
    </div>
    <div class="tl-canvas-wrap">
      <canvas id="timeline-canvas"></canvas>
    </div>
  </div>
</div>

<!-- ═══ BOTTOM BAR ═══ -->
<div class="bottom-bar">
  <button id="btn-export">⬇ Export JSON</button>
  <button id="btn-import">⬆ Import JSON</button>
  <button id="btn-reset-pose">⟳ Reset Pose</button>
  <button id="btn-presets">📋 Load Preset</button>
  <span class="status-text" id="status-text">Ready</span>
</div>

<!-- Hidden file input -->
<input type="file" id="file-input" accept=".json" style="display:none">

<script src="https://cdn.jsdelivr.net/npm/pixi.js@7/dist/pixi.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════
// SKELETON DEFINITION
// rwa = rest world angle (degrees, 0=right, positive=clockwise)
// ═══════════════════════════════════════════════════════

const HEAD_R = 24;

const BONE_DEFS = [
  { id: 'root',         parent: null,           len: 0,        rwa: 0,   outerW: 0,  innerW: 0,  label: 'Root'       },
  { id: 'spine',        parent: 'root',          len: 68,       rwa: -90, outerW: 22, innerW: 12, label: 'Spine'      },
  { id: 'head',         parent: 'spine',         len: HEAD_R,   rwa: -90, isHead: true,           label: 'Head'       },
  { id: 'r_upper_arm',  parent: 'spine',         len: 38,       rwa: 82,  outerW: 18, innerW: 10, label: 'R. Upper Arm' },
  { id: 'r_lower_arm',  parent: 'r_upper_arm',   len: 30,       rwa: 98,  outerW: 14, innerW: 7,  label: 'R. Lower Arm' },
  { id: 'l_upper_arm',  parent: 'spine',         len: 36,       rwa: 98,  outerW: 16, innerW: 9,  label: 'L. Upper Arm' },
  { id: 'l_lower_arm',  parent: 'l_upper_arm',   len: 28,       rwa: 112, outerW: 12, innerW: 6,  label: 'L. Lower Arm' },
  { id: 'r_upper_leg',  parent: 'root',          len: 50,       rwa: 82,  outerW: 20, innerW: 11, label: 'R. Upper Leg' },
  { id: 'r_lower_leg',  parent: 'r_upper_leg',   len: 44,       rwa: 92,  outerW: 16, innerW: 8,  label: 'R. Lower Leg' },
  { id: 'l_upper_leg',  parent: 'root',          len: 50,       rwa: 98,  outerW: 18, innerW: 10, label: 'L. Upper Leg' },
  { id: 'l_lower_leg',  parent: 'l_upper_leg',   len: 44,       rwa: 88,  outerW: 14, innerW: 7,  label: 'L. Lower Leg' },
];

// Build map
const BONE_MAP = {};
BONE_DEFS.forEach(b => BONE_MAP[b.id] = b);

// Compute rest local angle for each bone
BONE_DEFS.forEach(b => {
  b.rla = b.parent ? b.rwa - BONE_MAP[b.parent].rwa : b.rwa;
});

// Draw order: back to front (for side-view depth)
const DRAW_ORDER = [
  'l_upper_leg', 'l_lower_leg',
  'l_upper_arm', 'l_lower_arm',
  'spine',
  'head',
  'r_upper_arm', 'r_lower_arm',
  'r_upper_leg', 'r_lower_leg',
];

const SELECTABLE = BONE_DEFS.filter(b => b.id !== 'root').map(b => b.id);

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════

const state = {
  animations: {},       // { name: AnimationData }
  currentAnim: '',
  currentTime: 0,
  isPlaying: false,
  playSpeed: 1,
  looping: true,
  selectedBone: null,
  selectedKfTime: null,
  rootX: 0, rootY: 0,  // set after canvas init
  showJoints: true,
  showOnion: false,
  showGuide: false,
  // dragging
  isDragging: false,
  dragType: null,       // 'bone' | 'pan'
  dragBoneId: null,
  dragStartAngle: 0,
  dragBoneDelta0: 0,
  dragPanX: 0, dragPanY: 0,
  panOffsetX: 0, panOffsetY: 0,
};

// AnimationData shape:
// { duration, loop, keyframes: [{time, bones: {boneId: delta}}] }

// Current deltas (live editing or interpolated from keyframes)
const currentDeltas = {};
BONE_DEFS.forEach(b => currentDeltas[b.id] = 0);

// ═══════════════════════════════════════════════════════
// FK COMPUTATION
// ═══════════════════════════════════════════════════════

function computeFK(rootX, rootY, deltas) {
  const wp = {};
  wp['root'] = { sx: rootX, sy: rootY, ex: rootX, ey: rootY, wa: 0 };

  for (const bone of BONE_DEFS) {
    if (bone.id === 'root') continue;
    const p = wp[bone.parent];
    const delta = (deltas && deltas[bone.id] != null) ? deltas[bone.id] : 0;
    const wa = p.wa + bone.rla + delta;
    const waRad = wa * Math.PI / 180;
    const sx = p.ex, sy = p.ey;
    const ex = sx + Math.cos(waRad) * bone.len;
    const ey = sy + Math.sin(waRad) * bone.len;
    wp[bone.id] = { sx, sy, ex, ey, wa };
  }
  return wp;
}

// ═══════════════════════════════════════════════════════
// PIXI SETUP
// ═══════════════════════════════════════════════════════

const canvasWrap = document.getElementById('canvas-wrap');

function getCanvasSize() {
  return { w: canvasWrap.clientWidth, h: canvasWrap.clientHeight };
}

let { w: CW, h: CH } = getCanvasSize();

const app = new PIXI.Application({
  width: CW,
  height: CH,
  backgroundColor: 0xF5F0E8,
  antialias: true,
  resolution: window.devicePixelRatio || 1,
  autoDensity: true,
});
canvasWrap.appendChild(app.view);
app.view.style.width = '100%';
app.view.style.height = '100%';

state.rootX = CW / 2 + state.panOffsetX;
state.rootY = CH / 2 + 30 + state.panOffsetY;

// Grid layer
const gridGfx = new PIXI.Graphics();
app.stage.addChild(gridGfx);

// Onion skin layer
const onionGfx = new PIXI.Graphics();
onionGfx.alpha = 0.2;
app.stage.addChild(onionGfx);

// Main character layer
const charGfx = new PIXI.Graphics();
app.stage.addChild(charGfx);

// Selection overlay
const selGfx = new PIXI.Graphics();
app.stage.addChild(selGfx);

function drawGrid() {
  gridGfx.clear();
  const size = getCanvasSize();
  const CELL = 48;
  gridGfx.lineStyle({ width: 1, color: 0xC8D8E8, alpha: 0.5 });
  for (let x = 0; x < size.w; x += CELL) {
    gridGfx.moveTo(x, 0); gridGfx.lineTo(x, size.h);
  }
  for (let y = 0; y < size.h; y += CELL) {
    gridGfx.moveTo(0, y); gridGfx.lineTo(size.w, y);
  }
}

// ═══════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════

function drawBone(g, bone, wp, alpha = 1) {
  if (bone.id === 'root') return;
  const pos = wp[bone.id];
  if (!pos) return;

  if (bone.isHead) {
    // Draw circle centered at endPos
    const cx = pos.ex, cy = pos.ey;
    // outer circle
    g.lineStyle({ width: 4, color: 0x222222, alpha, cap: PIXI.LINE_CAP.ROUND });
    g.beginFill(0xFFFFFF, alpha);
    g.drawCircle(cx, cy, HEAD_R);
    g.endFill();
    // Eye dot (facing right = toward right)
    g.lineStyle(0);
    g.beginFill(0x222222, alpha);
    g.drawCircle(cx + HEAD_R * 0.4, cy - HEAD_R * 0.1, 3);
    g.endFill();
    return;
  }

  const sx = pos.sx, sy = pos.sy, ex = pos.ex, ey = pos.ey;
  const ow = bone.outerW || 4, iw = bone.innerW || 2;

  // Outer stroke
  g.lineStyle({ width: ow, color: 0x222222, alpha, cap: PIXI.LINE_CAP.ROUND, join: PIXI.LINE_JOIN.ROUND });
  g.moveTo(sx, sy); g.lineTo(ex, ey);

  // Inner white
  g.lineStyle({ width: iw, color: 0xFFFFFF, alpha, cap: PIXI.LINE_CAP.ROUND, join: PIXI.LINE_JOIN.ROUND });
  g.moveTo(sx, sy); g.lineTo(ex, ey);
}

function drawJoint(g, x, y, r = 7, alpha = 1, color = 0x222222) {
  g.lineStyle({ width: 2.5, color, alpha });
  g.beginFill(0xFFFFFF, alpha);
  g.drawCircle(x, y, r);
  g.endFill();
}

function drawCharacter(g, wp, deltas, opts = {}) {
  const { alpha = 1, selectedBone = null } = opts;

  for (const boneId of DRAW_ORDER) {
    const bone = BONE_MAP[boneId];
    drawBone(g, bone, wp, alpha);
  }

  // Joints
  if (state.showJoints || opts.forceJoints) {
    const drawnJoints = new Set();
    for (const bone of BONE_DEFS) {
      if (bone.id === 'root' || bone.isHead) continue;
      const pos = wp[bone.id];
      if (!pos) continue;
      const key = `${Math.round(pos.sx)},${Math.round(pos.sy)}`;
      if (!drawnJoints.has(key)) {
        drawJoint(g, pos.sx, pos.sy, 6, alpha);
        drawnJoints.add(key);
      }
      // Leaf endpoint
      const isLeaf = !BONE_DEFS.some(b => b.parent === bone.id);
      if (isLeaf) {
        const ekey = `${Math.round(pos.ex)},${Math.round(pos.ey)}`;
        if (!drawnJoints.has(ekey)) {
          drawJoint(g, pos.ex, pos.ey, 5, alpha);
          drawnJoints.add(ekey);
        }
      }
    }
  }

  // Selection highlight
  if (selectedBone && wp[selectedBone]) {
    const bone = BONE_MAP[selectedBone];
    const pos = wp[selectedBone];
    if (bone.isHead) {
      g.lineStyle({ width: 3, color: 0x74c7ec, alpha: 0.9 });
      g.beginFill(0, 0);
      g.drawCircle(pos.ex, pos.ey, HEAD_R + 5);
      g.endFill();
    } else {
      g.lineStyle({ width: bone.outerW + 6, color: 0x74c7ec, alpha: 0.4, cap: PIXI.LINE_CAP.ROUND });
      g.moveTo(pos.sx, pos.sy); g.lineTo(pos.ex, pos.ey);
    }
  }
}

function renderScene() {
  const rootX = state.rootX, rootY = state.rootY;
  const wp = computeFK(rootX, rootY, currentDeltas);

  charGfx.clear();
  drawCharacter(charGfx, wp, currentDeltas, { selectedBone: state.selectedBone });

  // Selection indicator
  selGfx.clear();
  if (state.selectedBone && wp[state.selectedBone]) {
    const bone = BONE_MAP[state.selectedBone];
    const pos = wp[state.selectedBone];
    if (!bone.isHead) {
      // Draw rotation handle arc
      const angle = pos.wa * Math.PI / 180;
      const hx = pos.sx + Math.cos(angle - 0.5) * 55;
      const hy = pos.sy + Math.sin(angle - 0.5) * 55;
      selGfx.lineStyle({ width: 1.5, color: 0x74c7ec, alpha: 0.6 });
      selGfx.beginFill(0x74c7ec, 0.15);
      selGfx.drawCircle(pos.sx, pos.sy, 8);
      selGfx.endFill();
    }
  }

  // Onion skin
  onionGfx.clear();
  if (state.showOnion && state.currentAnim) {
    const anim = state.animations[state.currentAnim];
    if (anim && anim.keyframes.length > 0) {
      // Draw prev and next keyframes faintly
      const prevKf = getPrevKeyframe();
      const nextKf = getNextKeyframe();
      [prevKf, nextKf].forEach(kf => {
        if (!kf) return;
        const kfDeltas = {};
        BONE_DEFS.forEach(b => kfDeltas[b.id] = kf.bones[b.id] || 0);
        const kwp = computeFK(rootX, rootY, kfDeltas);
        drawCharacter(onionGfx, kwp, kfDeltas, { alpha: 0.25 });
      });
    }
  }

  // Guide lines
  if (state.showGuide) {
    selGfx.lineStyle({ width: 1, color: 0x89b4fa, alpha: 0.3 });
    selGfx.moveTo(rootX, rootY - 200); selGfx.lineTo(rootX, rootY + 50);
  }

  updateBoneInfoPanel(wp);
}

// ═══════════════════════════════════════════════════════
// HIT DETECTION
// ═══════════════════════════════════════════════════════

function distToSegment(px, py, ax, ay, bx, by) {
  const dx = bx - ax, dy = by - ay;
  const len2 = dx * dx + dy * dy;
  if (len2 < 0.0001) return Math.hypot(px - ax, py - ay);
  const t = Math.max(0, Math.min(1, ((px - ax) * dx + (py - ay) * dy) / len2));
  return Math.hypot(px - (ax + t * dx), py - (ay + t * dy));
}

function findBoneAt(mx, my) {
  const rootX = state.rootX, rootY = state.rootY;
  const wp = computeFK(rootX, rootY, currentDeltas);
  let bestId = null, bestDist = 18;

  for (const boneId of SELECTABLE) {
    const bone = BONE_MAP[boneId];
    const pos = wp[boneId];
    if (!pos) continue;

    let d;
    if (bone.isHead) {
      d = Math.hypot(mx - pos.ex, my - pos.ey) - HEAD_R;
      d = Math.max(0, d);
    } else {
      d = distToSegment(mx, my, pos.sx, pos.sy, pos.ex, pos.ey);
    }
    if (d < bestDist) { bestDist = d; bestId = boneId; }
  }
  return bestId;
}

function getBoneStartAndParentAngle(boneId) {
  const wp = computeFK(state.rootX, state.rootY, currentDeltas);
  const pos = wp[boneId];
  const bone = BONE_MAP[boneId];
  const parentAngle = bone.parent ? wp[bone.parent].wa : 0;
  return { startX: pos.sx, startY: pos.sy, parentAngle };
}

// ═══════════════════════════════════════════════════════
// MOUSE INTERACTION
// ═══════════════════════════════════════════════════════

function getMousePos(e) {
  const rect = app.view.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  return {
    x: (e.clientX - rect.left) * scaleX,
    y: (e.clientY - rect.top) * scaleY,
  };
}

app.view.addEventListener('mousedown', e => {
  const { x, y } = getMousePos(e);

  if (e.button === 2) {
    // Right click: pan
    state.isDragging = true;
    state.dragType = 'pan';
    state.dragPanX = x - state.panOffsetX;
    state.dragPanY = y - state.panOffsetY;
    return;
  }

  // Left click: find bone
  const boneId = findBoneAt(x, y);
  if (boneId) {
    state.selectedBone = boneId;
    state.isDragging = true;
    state.dragType = 'bone';
    state.dragBoneId = boneId;

    const { startX, startY, parentAngle } = getBoneStartAndParentAngle(boneId);
    const bone = BONE_MAP[boneId];
    state.dragStartAngle = Math.atan2(y - startY, x - startX) * 180 / Math.PI;
    state.dragBoneDelta0 = currentDeltas[boneId] || 0;
    state._dragParentAngle = parentAngle;
    state._dragBoneStartX = startX;
    state._dragBoneStartY = startY;

    updateBoneInfoPanelDirect();
  } else {
    state.selectedBone = null;
  }
  renderScene();
});

app.view.addEventListener('mousemove', e => {
  if (!state.isDragging) return;
  const { x, y } = getMousePos(e);

  if (state.dragType === 'pan') {
    state.panOffsetX = x - state.dragPanX;
    state.panOffsetY = y - state.dragPanY;
    state.rootX = CW / 2 + state.panOffsetX;
    state.rootY = CH / 2 + 30 + state.panOffsetY;
    renderScene();
    return;
  }

  if (state.dragType === 'bone') {
    const boneId = state.dragBoneId;
    const bone = BONE_MAP[boneId];
    const sx = state._dragBoneStartX, sy = state._dragBoneStartY;
    const parentAngle = state._dragParentAngle;

    // New world angle from drag
    const newWorldAngle = Math.atan2(y - sy, x - sx) * 180 / Math.PI;
    // Delta = newWorldAngle - parentWorldAngle - restLocalAngle
    const newDelta = newWorldAngle - parentAngle - bone.rla;
    currentDeltas[boneId] = newDelta;

    updateBoneInfoPanelDirect();
    renderScene();
  }
});

const endDrag = () => {
  state.isDragging = false;
  state.dragType = null;
};
app.view.addEventListener('mouseup', endDrag);
app.view.addEventListener('mouseleave', endDrag);
app.view.addEventListener('contextmenu', e => e.preventDefault());

// ═══════════════════════════════════════════════════════
// ANIMATION DATA
// ═══════════════════════════════════════════════════════

function getCurrentAnim() {
  return state.animations[state.currentAnim];
}

function getDuration() {
  const anim = getCurrentAnim();
  return anim ? anim.duration : parseFloat(document.getElementById('inp-duration').value) || 0.5;
}

function setCurrentDeltas(deltas) {
  BONE_DEFS.forEach(b => {
    currentDeltas[b.id] = (deltas && deltas[b.id] != null) ? deltas[b.id] : 0;
  });
}

function capturePose() {
  const d = {};
  BONE_DEFS.forEach(b => {
    if (Math.abs(currentDeltas[b.id]) > 0.01) d[b.id] = currentDeltas[b.id];
  });
  return d;
}

function lerp(a, b, t) { return a + (b - a) * t; }

function interpolateDeltas(kf1, kf2, t) {
  if (!kf2) return Object.assign({}, kf1.bones);
  const dt = kf2.time - kf1.time;
  const f = dt < 0.0001 ? 1 : (t - kf1.time) / dt;
  const result = {};
  const allBones = new Set([...Object.keys(kf1.bones), ...Object.keys(kf2.bones)]);
  allBones.forEach(id => {
    const a = kf1.bones[id] || 0;
    const b = kf2.bones[id] || 0;
    result[id] = lerp(a, b, f);
  });
  return result;
}

function sampleAnimation(anim, time) {
  if (!anim || anim.keyframes.length === 0) return null;
  const kfs = anim.keyframes;
  if (kfs.length === 1) return Object.assign({}, kfs[0].bones);

  let kf1 = kfs[0], kf2 = null;
  for (let i = 0; i < kfs.length; i++) {
    if (kfs[i].time <= time) kf1 = kfs[i];
    if (kfs[i].time > time && !kf2) kf2 = kfs[i];
  }
  return interpolateDeltas(kf1, kf2, time);
}

function getPrevKeyframe() {
  const anim = getCurrentAnim();
  if (!anim) return null;
  let best = null;
  for (const kf of anim.keyframes) {
    if (kf.time < state.currentTime - 0.001) {
      if (!best || kf.time > best.time) best = kf;
    }
  }
  return best;
}

function getNextKeyframe() {
  const anim = getCurrentAnim();
  if (!anim) return null;
  let best = null;
  for (const kf of anim.keyframes) {
    if (kf.time > state.currentTime + 0.001) {
      if (!best || kf.time < best.time) best = kf;
    }
  }
  return best;
}

// ═══════════════════════════════════════════════════════
// KEYFRAME MANAGEMENT
// ═══════════════════════════════════════════════════════

function addKeyframeAtCurrentTime() {
  if (!state.currentAnim) { setStatus('No animation selected'); return; }
  const anim = getCurrentAnim();
  const t = Math.round(state.currentTime * 1000) / 1000;
  const bones = capturePose();

  // Check if keyframe at this time exists
  const existing = anim.keyframes.find(k => Math.abs(k.time - t) < 0.001);
  if (existing) {
    Object.assign(existing.bones, bones);
    setStatus(`Updated keyframe @ ${t.toFixed(3)}s`);
  } else {
    anim.keyframes.push({ time: t, bones });
    anim.keyframes.sort((a, b) => a.time - b.time);
    setStatus(`Added keyframe @ ${t.toFixed(3)}s`);
  }
  state.selectedKfTime = t;
  renderTimeline();
}

function deleteKeyframeAtCurrentTime() {
  if (!state.currentAnim) return;
  const anim = getCurrentAnim();
  const t = state.selectedKfTime != null ? state.selectedKfTime : state.currentTime;
  const idx = anim.keyframes.findIndex(k => Math.abs(k.time - t) < 0.001);
  if (idx >= 0) {
    anim.keyframes.splice(idx, 1);
    setStatus(`Deleted keyframe @ ${t.toFixed(3)}s`);
    renderTimeline();
  } else {
    setStatus('No keyframe at current time');
  }
}

// ═══════════════════════════════════════════════════════
// PLAYBACK
// ═══════════════════════════════════════════════════════

let lastTime = null;

function playbackTick(ts) {
  if (!state.isPlaying) return;

  if (lastTime !== null) {
    const dt = (ts - lastTime) / 1000 * state.playSpeed;
    state.currentTime += dt;
    const dur = getDuration();
    if (state.currentTime >= dur) {
      if (state.looping) {
        state.currentTime = state.currentTime % dur;
      } else {
        state.currentTime = dur;
        state.isPlaying = false;
        document.getElementById('btn-play').textContent = '▶ Play';
        document.getElementById('btn-play2').textContent = '▶';
      }
    }
    applyAnimationAtTime(state.currentTime);
  }
  lastTime = ts;
  updateTimeDisplay();
  renderScene();
  renderTimeline();
  if (state.isPlaying) requestAnimationFrame(playbackTick);
}

function applyAnimationAtTime(t) {
  const anim = getCurrentAnim();
  if (!anim || anim.keyframes.length === 0) return;
  const deltas = sampleAnimation(anim, t);
  if (deltas) setCurrentDeltas(deltas);
}

function startPlay() {
  if (!state.currentAnim) { setStatus('Select an animation first'); return; }
  state.isPlaying = true;
  lastTime = null;
  document.getElementById('btn-play').textContent = '⏸ Pause';
  document.getElementById('btn-play2').textContent = '⏸';
  requestAnimationFrame(playbackTick);
}

function pausePlay() {
  state.isPlaying = false;
  lastTime = null;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play2').textContent = '▶';
}

function stopPlay() {
  state.isPlaying = false;
  lastTime = null;
  state.currentTime = 0;
  document.getElementById('btn-play').textContent = '▶ Play';
  document.getElementById('btn-play2').textContent = '▶';
  applyAnimationAtTime(0);
  updateTimeDisplay();
  renderScene();
  renderTimeline();
}

function updateTimeDisplay() {
  const dur = getDuration();
  document.getElementById('time-display').textContent =
    `${state.currentTime.toFixed(3)}s / ${dur.toFixed(3)}s`;
}

// ═══════════════════════════════════════════════════════
// ANIMATION LIST UI
// ═══════════════════════════════════════════════════════

function renderAnimList() {
  const container = document.getElementById('anim-list');
  container.innerHTML = '';
  Object.keys(state.animations).forEach(name => {
    const item = document.createElement('div');
    item.className = 'anim-item' + (name === state.currentAnim ? ' active' : '');
    item.innerHTML = `<div class="anim-dot"></div>${name}`;
    item.addEventListener('click', () => selectAnimation(name));
    container.appendChild(item);
  });
}

function selectAnimation(name) {
  if (state.isPlaying) pausePlay();
  state.currentAnim = name;
  state.currentTime = 0;
  state.selectedKfTime = null;
  const anim = getCurrentAnim();
  if (anim) {
    document.getElementById('inp-duration').value = anim.duration;
    document.getElementById('chk-loop').checked = anim.loop;
    applyAnimationAtTime(0);
  }
  renderAnimList();
  renderTimeline();
  renderScene();
  updateTimeDisplay();
  setStatus(`Animation: ${name}`);
}

function createAnimation(name) {
  if (!name) return;
  if (state.animations[name]) { setStatus(`'${name}' already exists`); return; }
  state.animations[name] = {
    duration: 0.5,
    loop: true,
    keyframes: [],
  };
  selectAnimation(name);
  renderAnimList();
}

function deleteCurrentAnimation() {
  if (!state.currentAnim) return;
  if (!confirm(`Delete animation '${state.currentAnim}'?`)) return;
  delete state.animations[state.currentAnim];
  state.currentAnim = Object.keys(state.animations)[0] || '';
  if (state.currentAnim) selectAnimation(state.currentAnim);
  else { renderAnimList(); renderTimeline(); }
}

function renameCurrentAnimation() {
  if (!state.currentAnim) return;
  const newName = prompt('New name:', state.currentAnim);
  if (!newName || newName === state.currentAnim) return;
  state.animations[newName] = state.animations[state.currentAnim];
  delete state.animations[state.currentAnim];
  state.currentAnim = newName;
  renderAnimList();
  setStatus(`Renamed to '${newName}'`);
}

// ═══════════════════════════════════════════════════════
// TIMELINE RENDERING
// ═══════════════════════════════════════════════════════

const tlCanvas = document.getElementById('timeline-canvas');
const tlCtx = tlCanvas.getContext('2d');
const tlLabels = document.getElementById('tl-labels');

const VISIBLE_BONES = ['spine', 'r_upper_arm', 'r_lower_arm', 'l_upper_arm', 'l_lower_arm',
  'r_upper_leg', 'r_lower_leg', 'l_upper_leg', 'l_lower_leg'];
const ROW_H = 26;
const RULER_H = 20;

function renderTimeline() {
  const W = tlCanvas.parentElement.clientWidth;
  const H = tlCanvas.parentElement.clientHeight;
  tlCanvas.width = W;
  tlCanvas.height = H;

  const ctx = tlCtx;
  ctx.clearRect(0, 0, W, H);

  const dur = getDuration();
  const anim = getCurrentAnim();

  // Background
  ctx.fillStyle = '#1a1a2e';
  ctx.fillRect(0, 0, W, H);

  // Ruler
  ctx.fillStyle = '#2e2e46';
  ctx.fillRect(0, 0, W, RULER_H);
  ctx.strokeStyle = '#3a3a58';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, RULER_H); ctx.lineTo(W, RULER_H); ctx.stroke();

  // Ruler ticks
  const ticks = 10;
  for (let i = 0; i <= ticks; i++) {
    const x = (i / ticks) * W;
    const t = (i / ticks) * dur;
    ctx.strokeStyle = '#6e6e8a';
    ctx.beginPath(); ctx.moveTo(x, RULER_H - 8); ctx.lineTo(x, RULER_H); ctx.stroke();
    ctx.fillStyle = '#89899a';
    ctx.font = '9px monospace';
    ctx.fillText(t.toFixed(2), x + 2, 13);
  }

  // Bone rows
  VISIBLE_BONES.forEach((boneId, ri) => {
    const y = RULER_H + ri * ROW_H;
    // Row bg
    ctx.fillStyle = ri % 2 === 0 ? '#1e1e30' : '#1a1a2e';
    ctx.fillRect(0, y, W, ROW_H);
    // Row bottom border
    ctx.strokeStyle = '#2a2a40';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, y + ROW_H); ctx.lineTo(W, y + ROW_H); ctx.stroke();

    // Keyframe diamonds
    if (anim) {
      anim.keyframes.forEach(kf => {
        if (kf.bones[boneId] != null && Math.abs(kf.bones[boneId]) > 0.001) {
          const kx = (kf.time / dur) * W;
          const ky = y + ROW_H / 2;
          const selected = state.selectedKfTime != null && Math.abs(kf.time - state.selectedKfTime) < 0.001;
          ctx.fillStyle = selected ? '#74c7ec' : '#f9e2af';
          ctx.strokeStyle = '#000';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(kx, ky - 6); ctx.lineTo(kx + 5, ky); ctx.lineTo(kx, ky + 6);
          ctx.lineTo(kx - 5, ky); ctx.closePath();
          ctx.fill(); ctx.stroke();
        }
      });
    }
  });

  // Playhead
  const ph = (state.currentTime / Math.max(dur, 0.001)) * W;
  ctx.strokeStyle = '#f38ba8';
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(ph, 0); ctx.lineTo(ph, H); ctx.stroke();
  ctx.fillStyle = '#f38ba8';
  ctx.fillRect(ph - 4, 0, 8, RULER_H);

  // Update labels
  tlLabels.innerHTML = '<div class="tl-label-spacer"></div>';
  VISIBLE_BONES.forEach((boneId, ri) => {
    const bone = BONE_MAP[boneId];
    const hasKf = anim && anim.keyframes.some(kf => kf.bones[boneId] != null && Math.abs(kf.bones[boneId]) > 0.001);
    const row = document.createElement('div');
    row.className = 'tl-label-row' + (boneId === state.selectedBone ? ' active' : '');
    row.innerHTML = `<div class="tl-label-dot" style="opacity:${hasKf ? 1 : 0.3}"></div>${bone.label}`;
    row.addEventListener('click', () => {
      state.selectedBone = boneId;
      updateBoneInfoPanelDirect();
      renderScene();
      renderTimeline();
    });
    tlLabels.appendChild(row);
  });
}

// Timeline click to scrub
tlCanvas.addEventListener('mousedown', e => {
  const rect = tlCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const dur = getDuration();
  const W = tlCanvas.width;

  // Ruler area: set playhead
  if (y < RULER_H || y > RULER_H + VISIBLE_BONES.length * ROW_H) {
    const t = Math.max(0, Math.min(dur, (x / W) * dur));
    state.currentTime = t;
    if (!state.isPlaying) {
      applyAnimationAtTime(t);
      renderScene();
    }
    state.selectedKfTime = null;
    renderTimeline();
    updateTimeDisplay();
    return;
  }

  // Bone row: click a keyframe or set time
  const ri = Math.floor((y - RULER_H) / ROW_H);
  if (ri >= 0 && ri < VISIBLE_BONES.length) {
    const boneId = VISIBLE_BONES[ri];
    state.selectedBone = boneId;

    // Check if we clicked a keyframe diamond
    const anim = getCurrentAnim();
    if (anim) {
      const t = (x / W) * dur;
      const hitKf = anim.keyframes.find(kf =>
        kf.bones[boneId] != null &&
        Math.abs(kf.bones[boneId]) > 0.001 &&
        Math.abs((kf.time / dur) * W - x) < 8
      );
      if (hitKf) {
        state.currentTime = hitKf.time;
        state.selectedKfTime = hitKf.time;
        if (!state.isPlaying) {
          setCurrentDeltas(hitKf.bones);
          renderScene();
        }
      } else {
        state.currentTime = Math.max(0, Math.min(dur, t));
        state.selectedKfTime = null;
        if (!state.isPlaying) applyAnimationAtTime(state.currentTime);
      }
    }

    updateBoneInfoPanelDirect();
    updateTimeDisplay();
    renderTimeline();
    renderScene();
  }
});

// Timeline scrub drag
let tlScrubbing = false;
tlCanvas.addEventListener('mousedown', e => { tlScrubbing = true; });
tlCanvas.addEventListener('mouseup', () => { tlScrubbing = false; });
tlCanvas.addEventListener('mousemove', e => {
  if (!tlScrubbing || state.isPlaying) return;
  const rect = tlCanvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const dur = getDuration();
  const t = Math.max(0, Math.min(dur, (x / tlCanvas.width) * dur));
  state.currentTime = t;
  applyAnimationAtTime(t);
  updateTimeDisplay();
  renderScene();
  renderTimeline();
});

// ═══════════════════════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════════════════════

function exportJSON() {
  const data = { version: 1, animations: {} };
  Object.entries(state.animations).forEach(([name, anim]) => {
    data.animations[name] = {
      duration: anim.duration,
      loop: anim.loop,
      keyframes: anim.keyframes.map(kf => ({
        time: kf.time,
        bones: Object.assign({}, kf.bones),
      })),
    };
  });
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'stickman-animations.json';
  a.click();
  URL.revokeObjectURL(url);
  setStatus('Exported animations JSON');
}

function importJSON(data) {
  try {
    const parsed = typeof data === 'string' ? JSON.parse(data) : data;
    if (!parsed.animations) throw new Error('Invalid format');
    Object.entries(parsed.animations).forEach(([name, anim]) => {
      state.animations[name] = {
        duration: anim.duration || 0.5,
        loop: anim.loop !== false,
        keyframes: (anim.keyframes || []).map(kf => ({
          time: kf.time,
          bones: Object.assign({}, kf.bones),
        })),
      };
    });
    const firstName = Object.keys(state.animations)[0];
    if (firstName) selectAnimation(firstName);
    renderAnimList();
    setStatus('Imported successfully');
  } catch (err) {
    setStatus('Import error: ' + err.message);
  }
}

function loadPreset(name) {
  if (!PRESETS[name]) return;
  state.animations[name] = JSON.parse(JSON.stringify(PRESETS[name]));
  selectAnimation(name);
  renderAnimList();
  setStatus(`Loaded preset: ${name}`);
}

// ═══════════════════════════════════════════════════════
// RESIZE HANDLING
// ═══════════════════════════════════════════════════════

function onResize() {
  const { w, h } = getCanvasSize();
  CW = w; CH = h;
  app.renderer.resize(w, h);
  state.rootX = w / 2 + state.panOffsetX;
  state.rootY = h / 2 + 30 + state.panOffsetY;
  drawGrid();
  renderScene();
  renderTimeline();
}
const ro = new ResizeObserver(onResize);
ro.observe(canvasWrap);

// ═══════════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════════

function setStatus(msg) {
  document.getElementById('status-text').textContent = msg;
  setTimeout(() => {
    document.getElementById('status-text').textContent = 'Ready';
  }, 3000);
}

// ═══════════════════════════════════════════════════════
// EVENT WIRING
// ═══════════════════════════════════════════════════════

document.getElementById('btn-play').addEventListener('click', () => {
  if (state.isPlaying) pausePlay(); else startPlay();
});
document.getElementById('btn-play2').addEventListener('click', () => {
  if (state.isPlaying) pausePlay(); else startPlay();
});
document.getElementById('btn-stop').addEventListener('click', stopPlay);

document.getElementById('btn-new-anim').addEventListener('click', () => {
  const name = prompt('Animation name:', 'new_anim');
  if (name) createAnimation(name);
});
document.getElementById('btn-del-anim').addEventListener('click', deleteCurrentAnimation);
document.getElementById('btn-ren-anim').addEventListener('click', renameCurrentAnimation);

document.getElementById('btn-add-kf').addEventListener('click', addKeyframeAtCurrentTime);
document.getElementById('btn-del-kf').addEventListener('click', deleteKeyframeAtCurrentTime);

document.getElementById('btn-prev-kf').addEventListener('click', () => {
  const kf = getPrevKeyframe();
  if (kf) { state.currentTime = kf.time; applyAnimationAtTime(kf.time); state.selectedKfTime = kf.time; updateTimeDisplay(); renderScene(); renderTimeline(); }
});
document.getElementById('btn-next-kf').addEventListener('click', () => {
  const kf = getNextKeyframe();
  if (kf) { state.currentTime = kf.time; applyAnimationAtTime(kf.time); state.selectedKfTime = kf.time; updateTimeDisplay(); renderScene(); renderTimeline(); }
});

document.getElementById('sel-speed').addEventListener('change', e => {
  state.playSpeed = parseFloat(e.target.value);
});
document.getElementById('chk-loop').addEventListener('change', e => {
  state.looping = e.target.checked;
  if (state.currentAnim) getCurrentAnim().loop = e.target.checked;
});
document.getElementById('inp-duration').addEventListener('change', e => {
  const d = parseFloat(e.target.value) || 0.5;
  if (state.currentAnim) getCurrentAnim().duration = d;
  updateTimeDisplay();
  renderTimeline();
});

document.getElementById('chk-joints').addEventListener('change', e => { state.showJoints = e.target.checked; renderScene(); });
document.getElementById('chk-onion').addEventListener('change', e => { state.showOnion = e.target.checked; renderScene(); });
document.getElementById('chk-guide').addEventListener('change', e => { state.showGuide = e.target.checked; renderScene(); });

document.getElementById('btn-export').addEventListener('click', exportJSON);
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('file-input').addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => importJSON(ev.target.result);
  reader.readAsText(file);
  e.target.value = '';
});

document.getElementById('btn-reset-pose').addEventListener('click', () => {
  BONE_DEFS.forEach(b => currentDeltas[b.id] = 0);
  renderScene();
  setStatus('Reset to rest pose');
});

document.getElementById('btn-presets').addEventListener('click', () => {
  const names = Object.keys(PRESETS).join(', ');
  const name = prompt(`Load preset (${names}):`, 'walk');
  if (name) loadPreset(name.trim());
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); if (state.isPlaying) pausePlay(); else startPlay(); }
  if (e.code === 'KeyS' && !e.ctrlKey) { stopPlay(); }
  if (e.code === 'KeyK') addKeyframeAtCurrentTime();
  if (e.code === 'Delete') deleteKeyframeAtCurrentTime();
  if (e.code === 'ArrowLeft') {
    state.currentTime = Math.max(0, state.currentTime - 0.05);
    applyAnimationAtTime(state.currentTime);
    updateTimeDisplay(); renderScene(); renderTimeline();
  }
  if (e.code === 'ArrowRight') {
    state.currentTime = Math.min(getDuration(), state.currentTime + 0.05);
    applyAnimationAtTime(state.currentTime);
    updateTimeDisplay(); renderScene(); renderTimeline();
  }
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════

function init() {
  // Load all presets as starting animations
  ['idle', 'walk', 'attack', 'hurt', 'death', 'spawn'].forEach(name => {
    state.animations[name] = JSON.parse(JSON.stringify(PRESETS[name]));
  });

  drawGrid();
  renderAnimList();
  selectAnimation('walk');
  setStatus('Ready — click a bone to select, drag to rotate');
}

init();
