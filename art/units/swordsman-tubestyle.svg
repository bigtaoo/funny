<line x1="340" y1="20" x2="340" y2="345" stroke="#9FBDCE" stroke-width="0.9" stroke-dasharray="6,4" opacity="0.6" fill="none"/>
<circle cx="160" cy="40" r="7" fill="#3B6FCC" opacity="0.9"/>
<circle cx="520" cy="40" r="7" fill="#CC3B2A" opacity="0.9"/>
