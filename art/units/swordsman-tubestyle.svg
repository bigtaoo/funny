<text x="160" y="333" text-anchor="middle" fill="#1C1C1C" font-family="sans-serif" font-size="15" font-weight="500">己方单位</text>
<text x="160" y="352" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="12">面朝右，向上推进</text>
<text x="520" y="333" text-anchor="middle" fill="#1C1C1C" font-family="sans-serif" font-size="15" font-weight="500">敌方单位（镜像）</text>
