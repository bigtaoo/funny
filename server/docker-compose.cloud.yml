# Cloud deployment variant (externally-managed Mongo, e.g. MongoDB Atlas M0): VPS runs only 10 Node processes + redis + caddy,
# Mongo is hosted in the cloud; no local mongo container.
#
# Only differences from docker-compose.prod.yml:
#   · Removes the mongo service + all depends_on mongo (DB is in the cloud, no local mongo container).
#   · All NW_*_MONGO_URI are injected from .env (NW_MONGO_URI, pointing to the Atlas mongodb+srv:// string).
#     7 DB-connecting processes (meta/commercial/world/auction/social/admin/analytics) share the same Atlas cluster with different DB names.
#
# Start the full stack with one command:
#   docker compose -f docker-compose.cloud.yml --env-file .env up -d --build
#
# ⚠ Atlas M0 connection limit is 500: Mongo driver defaults to maxPoolSize=100 per process; 7 processes would hit the limit.
#   Append &maxPoolSize=10 to NW_MONGO_URI (see .env.example notes), 7×10=70 well below the limit.
#
# Endpoints same as prod: https://{NW_DOMAIN}/api (REST), wss://.../gw (control-plane), wss://.../ws (data-plane),
#             https://.../world (SLG REST), https://.../auction (auction house, independent service auctionsvc, auction task5),
#             https://.../social (social fifth public face, including clan).

services:
  redis:
    image: redis:7-alpine
    container_name: nw-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  metaserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "metaserver/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI (Atlas mongodb+srv://...) in .env}
      NW_MONGO_DB: ${NW_MONGO_DB:-notebook_wars}
      NW_META_PORT: "8080"
      NW_META_HOST: 0.0.0.0
      NW_WX_APPID: ${NW_WX_APPID:-}
      NW_WX_SECRET: ${NW_WX_SECRET:-}
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      # Feature flag delivery + client log targeted collection (FEATURE_FLAGS_DESIGN §9).
      # ⚠ Critical gotcha (same as matchsvc): missing NW_ADMIN_INTERNAL_URL → flag polling disabled → /bootstrap always returns empty map → targeted collection never works.
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      # Loki push URL: obs stack is a separate compose/separate network; metaserver cannot resolve loki by default (see observability/README.md network gotcha).
      # Leave empty = silently drop (no player impact); to enable targeted collection, fill with a host-reachable address or connect metaserver to the obs network.
      # loki is connected to the main stack network (server_default) via observability/docker-compose.obs.yml (alias nw-loki), reachable by container name.
      # Safe if obs is down: fails to resolve → silently drops. Can override via .env.
      NW_LOKI_PUSH_URL: ${NW_LOKI_PUSH_URL:-http://nw-loki:3100/loki/api/v1/push}
    depends_on:
      commercial:
        condition: service_started
    restart: unless-stopped

  commercial:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "commercial/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_COMM_PORT: "8092"
      NW_COMM_HOST: 0.0.0.0
      # Reuses the same Atlas cluster with a different DB name (to migrate to a separate instance, just point this line to the new string).
      NW_COMM_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_COMM_MONGO_DB: ${NW_COMM_MONGO_DB:-notebook_wars_commercial}
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gateway/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GW_PORT: "8082"
      NW_GW_HOST: 0.0.0.0
      NW_GW_INTERNAL_PORT: "8090"
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      NW_GW_REDIS_URL: ${NW_GW_REDIS_URL:-redis://redis:6379}
    depends_on:
      - metaserver
      - matchsvc
      - redis
    restart: unless-stopped

  matchsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "matchsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MM_INTERNAL_PORT: "8091"
      NW_MM_HOST: 0.0.0.0
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
      # Feature flag polling source (if not configured = disabled → match_bot_fallback and other flags always default to false, never take effect).
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      NW_MM_BOT_FALLBACK_MS: ${NW_MM_BOT_FALLBACK_MS:-30000}
    restart: unless-stopped

  gameserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gameserver/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GAME_PORT: "8081"
      NW_GAME_HOST: 0.0.0.0
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
    depends_on:
      - metaserver
      - matchsvc
    restart: unless-stopped

  worldsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "worldsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_WORLD_PORT: "18084"
      NW_WORLD_HOST: 0.0.0.0
      NW_WORLD_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_WORLD_MONGO_DB: ${NW_WORLD_MONGO_DB:-notebook_wars_world}
      NW_WORLD_REDIS_URL: ${NW_WORLD_REDIS_URL:-redis://redis:6379}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      # Auction coin trading + world-chat 50-coin fee (nationChannelService) both go through commercial; missing this
      # → commercial.available=false → both silently skip coin deduction instead of erroring.
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
    depends_on:
      redis:
        condition: service_healthy
      commercial:
        condition: service_started
    restart: unless-stopped

  # auctionsvc: auction house, decoupled from worldId (auction task5, AUCTION_DESIGN §9). Caddy /auction → this process.
  auctionsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "auctionsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_AUCTION_PORT: "18086"
      NW_AUCTION_HOST: 0.0.0.0
      NW_AUCTION_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_AUCTION_MONGO_DB: ${NW_AUCTION_MONGO_DB:-notebook_wars_auction}
      NW_META_INTERNAL_URL: http://metaserver:8080
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
    depends_on:
      commercial:
        condition: service_started
    restart: unless-stopped

  # socialsvc: social fifth public face (/social/*, including clan). Caddy /social → this process; missing it causes all social routes to 502.
  socialsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "socialsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_SOCIAL_PORT: "8085"
      NW_SOCIAL_HOST: 0.0.0.0
      NW_SOCIAL_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_SOCIAL_MONGO_DB: ${NW_SOCIAL_MONGO_DB:-nw_social}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_META_INTERNAL_URL: http://metaserver:8080
    depends_on:
      - gateway
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "admin/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ADMIN_JWT_SECRET: ${NW_ADMIN_JWT_SECRET:?set NW_ADMIN_JWT_SECRET in .env}
      NW_ADMIN_PORT: "8083"
      NW_ADMIN_HOST: 0.0.0.0
      NW_ADMIN_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_ADMIN_MONGO_DB: ${NW_ADMIN_MONGO_DB:-notebook_wars_admin}
      NW_ADMIN_SEED_USER: ${NW_ADMIN_SEED_USER:-}
      NW_ADMIN_SEED_PASS: ${NW_ADMIN_SEED_PASS:-}
      NW_META_BASE_URL: http://metaserver:8080
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_AUCTION_INTERNAL_URL: http://auctionsvc:18086
    restart: unless-stopped

  analyticsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "analyticsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ANALYTICS_PORT: "18085"
      NW_ANALYTICS_HOST: 0.0.0.0
      NW_ANALYTICS_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_ANALYTICS_MONGO_DB: ${NW_ANALYTICS_MONGO_DB:-notebook_wars_analytics}
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: nw-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      NW_DOMAIN: ${NW_DOMAIN:-:80}
      # Shared secret header for ops Worker reverse proxy to admin (/ops/* route verification; empty = that route returns 403 for all).
      NW_OPS_PROXY_SECRET: ${NW_OPS_PROXY_SECRET:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metaserver
      - gateway
      - gameserver
      - worldsvc
      - auctionsvc
      - socialsvc
      - admin
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
