# 云部署版（外接托管 Mongo，如 MongoDB Atlas M0）：VPS 上只跑 9 个 Node 进程 + redis + caddy，
# Mongo 托管到云上，本机不再起 mongo 容器。
#
# 与 docker-compose.prod.yml 的唯一区别：
#   · 删除 mongo 服务 + 所有 depends_on mongo（库在云上，本机无 mongo 容器）。
#   · 所有 NW_*_MONGO_URI 改为从 .env 注入（NW_MONGO_URI，指向 Atlas 的 mongodb+srv:// 串）。
#     6 个连库进程（meta/commercial/world/social/admin/analytics）共用同一 Atlas 集群、不同库名。
#
# 一条命令起全栈：
#   docker compose -f docker-compose.cloud.yml --env-file .env up -d --build
#
# ⚠ Atlas M0 连接数上限 500：Mongo 驱动每进程默认 maxPoolSize=100，6 个连库进程会顶满。
#   在 NW_MONGO_URI 末尾加 &maxPoolSize=10（见 .env.example 说明），6×10=60 远低于上限。
#
# 出口同 prod：https://{NW_DOMAIN}/api（REST）、wss://.../gw（控制面）、wss://.../ws（数据面）、
#             https://.../world|/auction（SLG REST）、https://.../social（社交第五公网面，含家族）。

services:
  redis:
    image: redis:7-alpine
    container_name: nw-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  metaserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "metaserver/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI (Atlas mongodb+srv://...) in .env}
      NW_MONGO_DB: ${NW_MONGO_DB:-notebook_wars}
      NW_META_PORT: "8080"
      NW_META_HOST: 0.0.0.0
      NW_WX_APPID: ${NW_WX_APPID:-}
      NW_WX_SECRET: ${NW_WX_SECRET:-}
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      # 功能开关下发 + 客户端日志定向采集（FEATURE_FLAGS_DESIGN §9）。
      # ⚠ 必坑（同 matchsvc）：缺 NW_ADMIN_INTERNAL_URL → flag 轮询禁用 → /bootstrap 恒空 map → 定向采集永不生效。
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      # Loki push 地址：obs 栈是独立 compose/独立网络，metaserver 默认解析不到 loki（见 observability/README.md 网络坑）。
      # 留空 = 静默丢弃（不影响玩家）；要启用定向采集需填宿主可达地址或让 metaserver 接入 obs 网络。
      # loki 经 observability/docker-compose.obs.yml 接入本主栈网络（别名 nw-loki），容器名直达。
      # obs 停了也无妨：解析不到 → 静默丢弃。可用 .env 覆盖。
      NW_LOKI_PUSH_URL: ${NW_LOKI_PUSH_URL:-http://nw-loki:3100/loki/api/v1/push}
    depends_on:
      commercial:
        condition: service_started
    restart: unless-stopped

  commercial:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "commercial/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_COMM_PORT: "8092"
      NW_COMM_HOST: 0.0.0.0
      # 复用同一 Atlas 集群，不同库名（涨了整库迁独立实例，把下面这行单独指向新串即可）。
      NW_COMM_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_COMM_MONGO_DB: ${NW_COMM_MONGO_DB:-notebook_wars_commercial}
    restart: unless-stopped

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gateway/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GW_PORT: "8082"
      NW_GW_HOST: 0.0.0.0
      NW_GW_INTERNAL_PORT: "8090"
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      NW_GW_REDIS_URL: ${NW_GW_REDIS_URL:-redis://redis:6379}
    depends_on:
      - metaserver
      - matchsvc
      - redis
    restart: unless-stopped

  matchsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "matchsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MM_INTERNAL_PORT: "8091"
      NW_MM_HOST: 0.0.0.0
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
      # feature flag 轮询源（不配=禁用→match_bot_fallback 等开关恒为默认 false，永不生效）。
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      NW_MM_BOT_FALLBACK_MS: ${NW_MM_BOT_FALLBACK_MS:-30000}
    restart: unless-stopped

  gameserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gameserver/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GAME_PORT: "8081"
      NW_GAME_HOST: 0.0.0.0
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
    depends_on:
      - metaserver
      - matchsvc
    restart: unless-stopped

  worldsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "worldsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_WORLD_PORT: "18084"
      NW_WORLD_HOST: 0.0.0.0
      NW_WORLD_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_WORLD_MONGO_DB: ${NW_WORLD_MONGO_DB:-notebook_wars_world}
      NW_WORLD_REDIS_URL: ${NW_WORLD_REDIS_URL:-redis://redis:6379}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # socialsvc：社交第五公网面（/social/*，含家族）。Caddy /social → 此进程；缺它则 social 全链路 502。
  socialsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "socialsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_SOCIAL_PORT: "8085"
      NW_SOCIAL_HOST: 0.0.0.0
      NW_SOCIAL_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_SOCIAL_MONGO_DB: ${NW_SOCIAL_MONGO_DB:-nw_social}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_META_INTERNAL_URL: http://metaserver:8080
    depends_on:
      - gateway
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "admin/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ADMIN_JWT_SECRET: ${NW_ADMIN_JWT_SECRET:?set NW_ADMIN_JWT_SECRET in .env}
      NW_ADMIN_PORT: "8083"
      NW_ADMIN_HOST: 0.0.0.0
      NW_ADMIN_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_ADMIN_MONGO_DB: ${NW_ADMIN_MONGO_DB:-notebook_wars_admin}
      NW_ADMIN_SEED_USER: ${NW_ADMIN_SEED_USER:-}
      NW_ADMIN_SEED_PASS: ${NW_ADMIN_SEED_PASS:-}
      NW_META_BASE_URL: http://metaserver:8080
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
    restart: unless-stopped

  analyticsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "analyticsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ANALYTICS_PORT: "18085"
      NW_ANALYTICS_HOST: 0.0.0.0
      NW_ANALYTICS_MONGO_URI: ${NW_MONGO_URI:?set NW_MONGO_URI in .env}
      NW_ANALYTICS_MONGO_DB: ${NW_ANALYTICS_MONGO_DB:-notebook_wars_analytics}
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: nw-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      NW_DOMAIN: ${NW_DOMAIN:-:80}
      # ops Worker 反代 admin 用的共享密钥头（/ops/* 路由校验；空=该路由全 403）。
      NW_OPS_PROXY_SECRET: ${NW_OPS_PROXY_SECRET:-}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metaserver
      - gateway
      - gameserver
      - worldsvc
      - socialsvc
      - admin
    restart: unless-stopped

volumes:
  redis-data:
  caddy-data:
  caddy-config:
