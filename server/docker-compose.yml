# 本地开发依赖（MongoDB 单节点副本集）。
# 单节点副本集（非单机 mongod）是文档要求：解锁跨集合事务 + change streams（META_DESIGN §6.3）。
# healthcheck 首次启动时自动 rs.initiate()，幂等（已初始化则跳过）。
#
#   docker compose up -d            # 起 mongo
#   docker compose ps               # 看健康状态（healthy 后即可连）
#   docker compose down             # 停（保留数据卷）
#   docker compose down -v          # 停并清空数据
#
# 连接串（与 NW_MONGO_URI 默认值一致）：mongodb://127.0.0.1:27017/?replicaSet=rs0

services:
  mongo:
    image: mongo:7
    container_name: nw-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    # 不挂命名卷：部分 Docker Desktop(Windows) 对命名卷报 invalid volume specification。
    # 本地开发 DB 数据放容器可写层即可——`stop`/`start` 保留，`down` 清除。
    # 需跨 `down` 持久化时，自行加 `volumes: [mongo-data:/data/db]` + 顶层 volumes。
    healthcheck:
      # rs.status() 成功即已初始化；否则 initiate（成员 host 用 localhost，供宿主机直连）。
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }"
      interval: 10s
      timeout: 10s
      start_period: 5s
      retries: 10
