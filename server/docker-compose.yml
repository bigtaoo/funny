# Local development dependency (MongoDB single-node replica set).
# Single-node replica set (not a standalone mongod) is required by the design: unlocks cross-collection transactions + change streams (META_DESIGN §6.3).
# healthcheck auto-runs rs.initiate() on first start, idempotent (skips if already initialized).
#
#   docker compose up -d            # start mongo
#   docker compose ps               # check health status (connectable once healthy)
#   docker compose down             # stop (keeps data volume)
#   docker compose down -v          # stop and wipe data
#
# Connection string (matches NW_MONGO_URI default): mongodb://127.0.0.1:27017/?replicaSet=rs0

services:
  redis:
    image: redis:7-alpine
    container_name: nw-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    # Local dev data stored in container writable layer, cleared on `down` (same strategy as mongo dev).
    # To persist across `down`, add volumes: [redis-data:/data] + top-level volumes manually.

  mongo:
    image: mongo:7
    container_name: nw-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    # No named volume: some Docker Desktop (Windows) versions report invalid volume specification for named volumes.
    # Local dev DB data in container writable layer is fine — `stop`/`start` retains it, `down` clears it.
    # To persist across `down`, add `volumes: [mongo-data:/data/db]` + top-level volumes manually.
    healthcheck:
      # rs.status() succeeds if already initialized; otherwise initiate (member host uses localhost for host-machine direct connection).
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'localhost:27017'}]}) }"
      interval: 10s
      timeout: 10s
      start_period: 5s
      retries: 10
