# 观测栈（Phase 2）：Loki(存储) + Alloy(采集) + Grafana(查询) + cloudflared(对外隧道)。
# 与主栈（docker-compose.cloud.yml）解耦，独立起停，互不影响。
#
# 采集方式：Alloy 经 docker socket 直接抓**所有容器 stdout**（loki.source.docker），
#   用正则把可读单行 `15:57 INFO [gateway] msg ...` 解出 svc/level 标签 → 无需给业务进程
#   设 NW_LOG_DIR、无需挂日志卷、无需改主栈。docker logs 仍是人类可读格式（SSH 上排查照旧）。
#
# 起停（在 server/ 目录下执行）：
#   docker compose -f observability/docker-compose.obs.yml --env-file observability/.env up -d
#   docker compose -f observability/docker-compose.obs.yml down
#
# 前置：见 observability/README.md 「Phase 2 部署」——daemon.json 限日志体积 + CF 隧道/Access 配置。

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: nw-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    mem_limit: 512m
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.7.5
    container_name: nw-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: nw-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set GF_ADMIN_PASSWORD in observability/.env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # 整站经 cloudflared 隧道对外，Grafana 知道自己跑在该域名下（生成正确的链接/重定向）。
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-https://grafana.gamestao.com}
      # 数据源/仪表盘由 provisioning 目录声明，开箱即用（无需手点）。
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    # SSH 兜底：仅绑本机回环，方便 `ssh -L 3000:localhost:3000` 直连；公网由 cloudflared 走。
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - loki
    mem_limit: 256m
    restart: unless-stopped

  # 出站隧道（同 ops 的「走 Cloudflare」选择，但用 Tunnel 而非 Worker 反代——更适合整站 Web 应用）。
  # 令牌式（remote-managed）隧道：hostname→service 映射在 CF Zero Trust 控制台配（grafana.gamestao.com
  # → http://grafana:3000）；本容器只需令牌。CF Access 罩该域名当登录墙（第一层），Grafana 账号是第二层。
  #
  # 放在 profile "tunnel" 下：默认 `up -d` 只起 loki/alloy/grafana（无需 token，可先 SSH 隧道看日志）；
  # 拿到 CF token 回填 .env 后再 `--profile tunnel up -d` 把隧道带起来。
  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    container_name: nw-cloudflared
    profiles: ["tunnel"]
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      # 空令牌时 cloudflared 会自行报错退出（仅当 --profile tunnel 启用本服务时才会触发）。
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - grafana
    mem_limit: 128m
    restart: unless-stopped

volumes:
  loki-data:
  grafana-data:
  alloy-data:
