# Observability stack (Phase 2): Loki (storage) + Alloy (collection) + Grafana (querying) + cloudflared (outbound tunnel).
# Decoupled from the main stack (docker-compose.cloud.yml), starts and stops independently, no mutual impact.
#
# Collection method: Alloy captures **all container stdout** via docker socket (loki.source.docker),
#   regex-parses the readable single-line `15:57 INFO [gateway] msg ...` to extract svc/level labels → no need to set
#   NW_LOG_DIR on business processes, no log volume mounts, no changes to the main stack. `docker logs` remains human-readable (SSH debugging still works).
#
# Start/stop (run from server/ directory):
#   docker compose -f observability/docker-compose.obs.yml --env-file observability/.env up -d
#   docker compose -f observability/docker-compose.obs.yml down
#
# Prerequisites: see observability/README.md "Phase 2 deployment" — daemon.json log size limits + CF tunnel/Access configuration.

# Limit log volume for the observability stack itself (50m per file, keep last 5, delete oldest ≈ 250m/container),
# so obs containers don't fill the disk even if host daemon.json hasn't been configured yet. Business container limits go via daemon.json (global).
x-logging: &obs-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "5"

services:
  loki:
    image: grafana/loki:3.4.2
    container_name: nw-loki
    command: ["-config.file=/etc/loki/config.yml"]
    volumes:
      - ./loki/config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    # Attached to both obs's own network + main stack network (server_default), so main stack metaserver can push logs directly using nw-loki:3100.
    # Coupling direction: obs depends on the main stack (main stack must start first to create server_default), never the other way —
    # it's acceptable for obs to fail to start if the main stack is stopped; it's NOT acceptable to affect the main stack.
    networks:
      default: {}
      mainstack:
        aliases: [nw-loki]
    logging: *obs-logging
    mem_limit: 512m
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.7.5
    container_name: nw-alloy
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      - loki
    logging: *obs-logging
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.5.2
    container_name: nw-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_ADMIN_PASSWORD:?set GF_ADMIN_PASSWORD in observability/.env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      # Whole site served via cloudflared tunnel; Grafana needs to know its domain to generate correct links/redirects.
      GF_SERVER_ROOT_URL: ${GF_ROOT_URL:-https://grafana.gamestao.com}
      # Data sources and dashboards declared via provisioning directory, works out of the box (no manual clicks needed).
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    # SSH fallback: bind to loopback only, easy to access via `ssh -L 3000:localhost:3000`; public access goes through cloudflared.
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - loki
    logging: *obs-logging
    mem_limit: 256m
    restart: unless-stopped

  # Outbound tunnel (same "go through Cloudflare" choice as ops, but using Tunnel instead of Worker reverse proxy — better suited for full-site web apps).
  # Token-based (remote-managed) tunnel: hostname→service mapping is configured in CF Zero Trust console (grafana.gamestao.com
  # → http://grafana:3000); this container only needs the token. CF Access guards the domain as the login gate (first layer), Grafana account is second layer.
  #
  # Under profile "tunnel": default `up -d` only starts loki/alloy/grafana (no token needed, can SSH-tunnel to view logs first);
  # fill CF token in .env then `--profile tunnel up -d` to bring the tunnel up.
  cloudflared:
    image: cloudflare/cloudflared:2025.2.1
    container_name: nw-cloudflared
    profiles: ["tunnel"]
    command: ["tunnel", "--no-autoupdate", "run"]
    environment:
      # Empty token causes cloudflared to error and exit on its own (only triggered when --profile tunnel enables this service).
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN:-}
    depends_on:
      - grafana
    logging: *obs-logging
    mem_limit: 128m
    restart: unless-stopped

networks:
  # obs own default network (observability_default): loki/alloy/grafana/cloudflared communicate here.
  default: {}
  # Main stack network (server_default from docker-compose.prod/cloud), external — main stack must be running first.
  # loki attaches to it so metaserver can push logs via nw-loki:3100 (see README network gotcha).
  mainstack:
    external: true
    name: server_default

volumes:
  loki-data:
  grafana-data:
  alloy-data:
