# Out-of-the-box Loki datasource (Grafana auto-registers on startup — no need to click Add data source).
apiVersion: 1

datasources:
  - name: Loki
    type: loki
    uid: loki                    # stable uid so dashboard JSON can reference it by name
    access: proxy
    url: http://loki:3100
    isDefault: true
    jsonData:
      maxLines: 1000
