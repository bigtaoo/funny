# Auto-loads dashboard JSON from /var/lib/grafana/dashboards (mounted from observability/grafana/dashboards).
apiVersion: 1

providers:
  - name: nw
    orgId: 1
    folder: Notebook Wars
    type: file
    disableDeletion: false
    editable: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
