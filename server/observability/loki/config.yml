# Loki 单进程（single binary）+ 本地文件存储。够单台 VPS 的日志量；要扩再拆组件。
# 保留 14 天（compactor 负责删过期块）。
auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096
  log_level: warn

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  retention_period: 336h          # 14 天
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  reject_old_samples: false       # docker 重启回灌历史时不丢

compactor:
  working_directory: /loki/compactor
  retention_enabled: true
  delete_request_store: filesystem

# 单实例无需 analytics 上报。
analytics:
  reporting_enabled: false
