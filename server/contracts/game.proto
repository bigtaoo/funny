syntax = "proto3";

// game.proto —— Real PlayerCommand structure (M12).
// Client-to-client only: the client encodes into transport.proto SideCmd.commands (bytes);
// the server forwards them opaquely without decoding and never depends on this file.
// Fields correspond to PlayerCommand in client/src/game; changing command structure requires no server rebuild.

package nw.game;

// Play a card: play a card from a hand slot into an attack column
message PlayCard {
  uint32 hand_index = 1;
  uint32 col        = 2;
  uint32 row        = 3; // used only for meteor spells (target row); ignored for units/buildings/speedup
}

// Upgrade the base
message UpgradeBase {}

// Spend 10 ink to immediately refresh the full hand (redraws all slots; timers are randomly staggered, same as on initial deploy)
message RefreshHand {}

message PlayerCommand {
  oneof cmd {
    PlayCard    play_card    = 1;
    UpgradeBase upgrade_base = 2;
    RefreshHand refresh_hand = 3;
  }
}

// The set of commands submitted by one side within a single tick (encoded into SideCmd.commands)
message PlayerCommands {
  repeated PlayerCommand commands = 1;
}
