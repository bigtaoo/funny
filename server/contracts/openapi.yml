openapi: 3.0.3
info:
  title: Notebook Wars metaserver REST API
  version: 0.1.0
  description: >
    REST 契约单一来源（design-first，M15）。metaserver 用 fastify-openapi-glue
    按 operationId 装配路由 + 校验；客户端用 openapi-typescript + openapi-fetch
    生成 typed fetch。统一响应包络 ApiResp<T>。详见 SERVER_API.md。

servers:
  - url: /api

tags:
  - name: auth
    description: 匿名账号（S0-4 / S0-7）
  - name: save
    description: 云存档（save-service，S0-7）
  - name: shop
    description: 商店直购（economy-service，S2-2）
  - name: gacha
    description: 盲盒（economy-service，S2-3）
  - name: ads
    description: 广告奖励（economy-service，S2-4）
  - name: iap
    description: 充值验单（iap-service，S4-1）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    Rarity:
      type: string
      enum: [common, rare, epic, legendary]

    LevelRecord:
      type: object
      properties:
        timeMs: { type: integer }
        leaked: { type: integer }
      additionalProperties: true

    SaveData:
      type: object
      required:
        - version
        - accountId
        - rev
        - updatedAt
        - wallet
        - inventory
        - gacha
        - pvp
        - progress
        - materials
        - pveUpgrades
        - equipped
        - flags
      properties:
        version: { type: integer }
        accountId: { type: string }
        rev: { type: integer }
        updatedAt: { type: integer }
        wallet:
          type: object
          required: [coins]
          properties:
            coins: { type: integer, minimum: 0 }
        inventory:
          type: object
          required: [skins, items]
          properties:
            skins:
              type: array
              items: { type: string }
            items:
              type: object
              additionalProperties: { type: integer }
        gacha:
          type: object
          required: [pity]
          properties:
            pity:
              type: object
              additionalProperties: { type: integer }
        # 已发货消费订单（commercial orderId）；发货幂等账本（S5-5）。legacy 档可缺，故非 required。
        deliveredOrders:
          type: array
          items: { type: string }
        pvp:
          type: object
          required: [elo, rank, wins, losses, streak]
          properties:
            elo: { type: integer }
            rank: { type: string }
            wins: { type: integer }
            losses: { type: integer }
            streak: { type: integer }
        progress:
          type: object
          required: [cleared, stars, best]
          properties:
            cleared:
              type: array
              items: { type: string }
            stars:
              type: object
              additionalProperties: { type: integer, minimum: 1, maximum: 3 }
            best:
              type: object
              additionalProperties: { $ref: '#/components/schemas/LevelRecord' }
        materials:
          type: object
          additionalProperties: { type: integer }
        pveUpgrades:
          type: object
          additionalProperties: { type: integer }
        equipped:
          type: object
          additionalProperties: { type: string }
        flags:
          type: object
          additionalProperties: { type: boolean }

    # —— 客户端同步段（PUT /save 仅接受这些字段，§2.2）——
    SyncPatch:
      type: object
      properties:
        progress: { $ref: '#/components/schemas/SaveData/properties/progress' }
        materials: { $ref: '#/components/schemas/SaveData/properties/materials' }
        pveUpgrades: { $ref: '#/components/schemas/SaveData/properties/pveUpgrades' }
        equipped: { $ref: '#/components/schemas/SaveData/properties/equipped' }
        flags: { $ref: '#/components/schemas/SaveData/properties/flags' }

    AuthResult:
      type: object
      required: [token, accountId, isNew, isAnonymous]
      properties:
        token: { type: string }
        accountId: { type: string }
        isNew: { type: boolean }
        # 仅挂 device、无可恢复凭证（password/oauth/wx）→ true。联机/商店/充值要求 false（SA-1）。
        isAnonymous: { type: boolean }
        # 注册时填的展示名（可选）；客户端用于个人资料显示。未设置则缺省。
        displayName: { type: string }
        # gateway 公开控制面 WS 地址（房间/匹配）。客户端只硬编码 meta 地址，
        # gateway 地址由本回包下发、game 地址由 match_found 下发。未配置则缺省。
        gatewayUrl: { type: string }

    ShopItem:
      type: object
      required: [id, cost, kind]
      properties:
        id: { type: string }
        cost: { type: integer }
        kind: { type: string }
        grants: { type: string }

    GachaPool:
      type: object
      required: [id, costSingle, entries]
      properties:
        id: { type: string }
        costSingle: { type: integer }
        costTen: { type: integer }
        pityThreshold: { type: integer }
        dupePolicy: { type: string, enum: [shards, coins] }
        entries:
          type: array
          items:
            type: object
            required: [itemId, weight, rarity]
            properties:
              itemId: { type: string }
              weight: { type: integer }
              rarity: { $ref: '#/components/schemas/Rarity' }

    GachaResult:
      type: object
      required: [itemId, rarity, duplicate]
      properties:
        itemId: { type: string }
        rarity: { $ref: '#/components/schemas/Rarity' }
        duplicate: { type: boolean }
        converted:
          type: object
          properties:
            kind: { type: string, enum: [shards, coins] }
            amount: { type: integer }

  responses:
    ErrorResp:
      description: 失败包络
      content:
        application/json:
          schema:
            type: object
            required: [ok, error]
            properties:
              ok: { type: boolean, enum: [false] }
              error: { $ref: '#/components/schemas/Error' }

paths:
  /auth/wx:
    post:
      operationId: authWx
      tags: [auth]
      summary: 微信匿名登录（code 换 openid）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }

  /auth/device:
    post:
      operationId: authDevice
      tags: [auth]
      summary: 设备 UUID 匿名登录（Web / CrazyGames）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId]
              properties:
                deviceId: { type: string, minLength: 8 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: 密码注册（邮箱/用户名 + 密码，新建账号）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId: { type: string, minLength: 3, maxLength: 64 }
                # 密码强度由 handler 校验，返回专属 WEAK_PASSWORD（schema 不设 minLength 以免被通用校验抢先）。
                password: { type: string }
                displayName: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: 密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId: { type: string }
                password: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /auth/password/change:
    post:
      operationId: authPasswordChange
      tags: [auth]
      summary: 改密（需登录；校验旧密码）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                # 强度由 handler 校验（WEAK_PASSWORD）。
                newPassword: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, enum: [true] }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /profile/rename:
    post:
      operationId: profileRename
      tags: [profile]
      summary: 改展示名（消耗金币；扣币成功后写名并回推存档）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string, minLength: 1, maxLength: 24 }
      responses:
        '200':
          description: 成功，回推权威存档 + 新展示名
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, displayName]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      displayName: { type: string }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }
        '503': { $ref: '#/components/responses/ErrorResp' }

  /save:
    get:
      operationId: getSave
      tags: [save]
      summary: 拉取当前账号存档
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      # 账号展示名（可选）；token 续登时客户端据此恢复个人资料。
                      displayName: { type: string }
                      # gateway 公开 WS 地址（可选）；token 续登无 auth 回包，从这里取。
                      gatewayUrl: { type: string }
        '401': { $ref: '#/components/responses/ErrorResp' }
    put:
      operationId: putSave
      tags: [save]
      summary: 推送客户端同步段（乐观锁 If-Match rev）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: If-Match
          in: header
          required: true
          schema: { type: string }
          description: 客户端持有的 rev
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [save]
              properties:
                save: { $ref: '#/components/schemas/SyncPatch' }
      responses:
        '200':
          description: 成功，回推规范化存档
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
        '409':
          description: REV_CONFLICT，带当前云端值
          content:
            application/json:
              schema:
                type: object
                required: [ok, error]
                properties:
                  ok: { type: boolean, enum: [false] }
                  error: { $ref: '#/components/schemas/Error' }
                  save: { $ref: '#/components/schemas/SaveData' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /shop/items:
    get:
      operationId: getShopItems
      tags: [shop]
      summary: 商品列表
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: '#/components/schemas/ShopItem' }

  /shop/buy:
    post:
      operationId: shopBuy
      tags: [shop]
      summary: 直购（扣币→发货→回推）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [itemId]
              properties:
                itemId: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted: { type: string }
        '402': { $ref: '#/components/responses/ErrorResp' }

  /gacha/pools:
    get:
      operationId: getGachaPools
      tags: [gacha]
      summary: 盲盒池列表
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [pools]
                    properties:
                      pools:
                        type: array
                        items: { $ref: '#/components/schemas/GachaPool' }

  /gacha/draw:
    post:
      operationId: gachaDraw
      tags: [gacha]
      summary: 抽卡（单抽/十连，原子，逐抽落库）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [poolId, count]
              properties:
                poolId: { type: string }
                count: { type: integer, enum: [1, 10] }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, results]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      results:
                        type: array
                        items: { $ref: '#/components/schemas/GachaResult' }
        '402': { $ref: '#/components/responses/ErrorResp' }

  /ads/reward:
    post:
      operationId: adsReward
      tags: [ads]
      summary: 广告奖励校验（每日 cap）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [adToken]
              properties:
                adToken: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted: { type: integer }
        '429': { $ref: '#/components/responses/ErrorResp' }

  /iap/verify:
    post:
      operationId: iapVerify
      tags: [iap]
      summary: 充值验单（票据幂等）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [platform, receipt]
              properties:
                platform: { type: string }
                receipt: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted: { type: integer }
        '400': { $ref: '#/components/responses/ErrorResp' }
