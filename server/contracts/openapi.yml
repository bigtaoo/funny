openapi: 3.0.3
info:
  title: Notebook Wars metaserver REST API
  version: 0.1.0
  description: |
    Single source of truth for the REST contract (design-first, M15). The metaserver uses fastify-openapi-glue to wire routes + validation by operationId; the client uses openapi-typescript + openapi-fetch to generate typed fetch. Unified response envelope ApiResp<T>. See SERVER_API.md.
servers:
  - url: /api
tags:
  - name: auth
    description: Anonymous accounts (S0-4 / S0-7)
  - name: save
    description: Cloud save (save-service, S0-7)
  - name: shop
    description: Shop direct purchase (economy-service, S2-2)
  - name: gacha
    description: Gacha (economy-service, S2-3)
  - name: ads
    description: Ad rewards (economy-service, S2-4)
  - name: iap
    description: IAP receipt verification (iap-service, S4-1)
  - name: friends
    description: Friends (S6-1, SOCIAL_DESIGN §5.1)
  - name: chat
    description: Private chat (S6-2, SOCIAL_DESIGN §5.2)
  - name: mail
    description: Mail (S6-3, SOCIAL_DESIGN §5.3)
  - name: ranked
    description: Ranked leaderboard (S11, SEASON_DESIGN §5)
  - name: battlepass
    description: Battle pass (S11, SEASON_DESIGN §9)
  - name: events
    description: Limited-time events (B6, ADR-014)
  - name: config
    description: Public bootstrap config / feature flag delivery + targeted client log collection (FEATURE_FLAGS_DESIGN §9)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    Rarity:
      type: string
      enum:
        - common
        - rare
        - epic
        - legendary
    LevelRecord:
      type: object
      properties:
        timeMs:
          type: integer
        leaked:
          type: integer
      additionalProperties: true
    SaveData:
      type: object
      required:
        - version
        - accountId
        - rev
        - updatedAt
        - wallet
        - inventory
        - gacha
        - pvp
        - progress
        - materials
        - pveUpgrades
        - equipped
        - flags
      properties:
        version:
          type: integer
        accountId:
          type: string
        rev:
          type: integer
        updatedAt:
          type: integer
        wallet:
          type: object
          required:
            - coins
          properties:
            coins:
              type: integer
              minimum: 0
        inventory:
          type: object
          required:
            - skins
            - items
          properties:
            skins:
              type: array
              items:
                type: string
            items:
              type: object
              additionalProperties:
                type: integer
        gacha:
          type: object
          required:
            - pity
          properties:
            pity:
              type: object
              additionalProperties:
                type: integer
        monetization:
          type: object
          required:
            - fatePoints
            - subscriptionExpiry
            - starterUsed
          properties:
            fatePoints:
              type: integer
              minimum: 0
              description: Fate Points balance (§7)
            subscriptionExpiry:
              type: integer
              description: monthly card end timestamp (ms); 0 = none (§5)
            subscriptionLastClaimDay:
              type: string
              description: UTC day (YYYY-MM-DD) of the last daily-coin claim; absent = never claimed (§5)
            starterUsed:
              type: array
              items:
                type: string
              description: one-off product ids already purchased (§6)
            starterGrowthEligible:
              type: boolean
              description: still inside the growth pack first-N-days account-age window; absent = eligible (legacy saves) (§6)
            firstPurchaseUsed:
              type: boolean
              description: true once the first-purchase 2× bonus has been claimed; absent = not yet used (legacy saves) — gates the first-purchase-double shop badge
        deliveredOrders:
          type: array
          items:
            type: string
        pvp:
          type: object
          required:
            - elo
            - rank
            - wins
            - losses
            - streak
          properties:
            elo:
              type: integer
            rank:
              type: string
            wins:
              type: integer
            losses:
              type: integer
            streak:
              type: integer
            seasonNo:
              type: integer
              description: Current season number
            seasonPeakElo:
              type: integer
              description: Peak ELO for current season
            seasonPeakRank:
              type: string
              description: Peak rank for current season
            reachedRanks:
              type: array
              items:
                type: string
              description: All-time first-reached rank list (lifetime ledger)
        stamina:
          type: object
          required:
            - current
            - regenAt
          properties:
            current:
              type: integer
              minimum: 0
              maximum: 120
              description: Current stamina
            regenAt:
              type: integer
              description: Timestamp (ms) when the next 1 stamina regenerates; 0 when full
        titles:
          type: array
          items:
            type: string
          description: Set of owned title ids (awarded by season settlement / achievement / admin; order reflects acquisition order)
        battlePass:
          $ref: '#/components/schemas/BattlePassData'
        progress:
          type: object
          required:
            - cleared
            - stars
            - best
          properties:
            cleared:
              type: array
              items:
                type: string
            stars:
              type: object
              additionalProperties:
                type: integer
                minimum: 1
                maximum: 3
            best:
              type: object
              additionalProperties:
                $ref: '#/components/schemas/LevelRecord'
        materials:
          type: object
          additionalProperties:
            type: integer
        pveUpgrades:
          type: object
          additionalProperties:
            type: integer
        cardInventory:
          type: object
          additionalProperties:
            type: integer
            minimum: 0
          description: Unit card inventory `${unitId}:${level}`→count; kept for save compatibility; retired after CC cleanup
        cardInv:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CardInstance'
          description: Card instance inventory (instanceId→CardInstance); max 150 entries
        cardMailOverflowCount:
          type: integer
          minimum: 0
        equipMailOverflowCount:
          type: integer
          minimum: 0
        equipped:
          type: object
          additionalProperties:
            type: string
        flags:
          type: object
          additionalProperties:
            type: boolean
        stats:
          type: object
          additionalProperties:
            type: integer
          description: Lifetime cumulative stats (StatKey→value), monotonically increasing, server-authoritative
        achievements:
          type: object
          additionalProperties:
            type: object
            required:
              - claimedTiers
            properties:
              claimedTiers:
                type: array
                items:
                  type: integer
                  minimum: 1
                  maximum: 3
          description: achId→set of already-claimed tier numbers, idempotent to prevent double-claiming
        equipmentInv:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/EquipmentInstance'
        retention:
          type: object
          properties:
            checkin:
              type: object
              required:
                - monthKey
                - claimedDays
              properties:
                monthKey:
                  type: string
                claimedDays:
                  type: array
                  items:
                    type: integer
                lastClaimedDayKey:
                  type: string
            daily:
              type: object
              required:
                - dayKey
                - completedTasks
                - taskPoints
                - rewardClaimed
              properties:
                dayKey:
                  type: string
                completedTasks:
                  type: object
                  additionalProperties:
                    type: integer
                taskPoints:
                  type: integer
                rewardClaimed:
                  type: boolean
    Achievement:
      type: object
      required:
        - id
        - statKey
        - category
        - tiers
      properties:
        id:
          type: string
        statKey:
          type: string
        category:
          type: string
          enum:
            - pve
            - pvp
            - collection
            - progression
        titleId:
          type: string
        hidden:
          type: boolean
        tiers:
          type: array
          items:
            type: object
            required:
              - threshold
              - coins
            properties:
              threshold:
                type: integer
              coins:
                type: integer
    EquipmentInstance:
      type: object
      required:
        - id
        - defId
        - rarity
        - level
        - affixes
      properties:
        id:
          type: string
        defId:
          type: string
        rarity:
          type: string
          enum:
            - common
            - fine
            - rare
            - epic
        level:
          type: integer
          minimum: 0
          maximum: 9
        affixes:
          type: array
          items:
            type: object
            required:
              - id
              - value
            properties:
              id:
                type: string
              value:
                type: number
        locked:
          type: boolean
    CardInstance:
      type: object
      required:
        - id
        - defId
        - level
        - gear
        - locked
      properties:
        id:
          type: string
          description: Unique instance id (e.g. 'card_a1b2c3')
        defId:
          type: string
          description: Card definition id (references CARD_DEFS)
        level:
          type: integer
          minimum: 1
          maximum: 9
        gear:
          type: object
          additionalProperties:
            type: string
          description: Per-slot equipped equipment instance ids (slot→equipmentInstanceId)
        locked:
          type: boolean
          description: Locked cards cannot be used as fusion material
    SyncPatch:
      type: object
      properties:
        equipped:
          $ref: '#/components/schemas/SaveData/properties/equipped'
        flags:
          $ref: '#/components/schemas/SaveData/properties/flags'
    AuthResult:
      type: object
      required:
        - token
        - accountId
        - isNew
        - isAnonymous
      properties:
        token:
          type: string
        accountId:
          type: string
        isNew:
          type: boolean
        isAnonymous:
          type: boolean
        displayName:
          type: string
        publicId:
          type: string
        gatewayUrl:
          type: string
    MatchHistoryEntry:
      type: object
      required:
        - roomId
        - mode
        - result
        - ts
      properties:
        roomId:
          type: string
        mode:
          type: string
          description: friendly | ranked
        result:
          type: string
          enum:
            - win
            - loss
            - unknown
        opponentName:
          type: string
          description: Snapshot of the opponent's display name at archival time
        opponentPublicId:
          type: string
          description: Opponent's 9-digit public id
        eloDelta:
          type: integer
          description: ELO change for this ranked match (signed); absent for friendly
        ts:
          type: integer
          description: Archival timestamp (epoch ms)
    MatchReplay:
      type: object
      required:
        - engineVersion
        - mode
        - seed
        - endFrame
        - frames
      description: Server-persisted match replay (non-empty frame log). Commands are game.proto opaque bytes (base64); the client decodes and plays back.
      properties:
        engineVersion:
          type: integer
          description: Always 0 on the server side (logic-agnostic); clients validate against their own ENGINE_VERSION at replay time
        mode:
          type: string
        seed:
          type: string
          description: uint64 decimal string
        endFrame:
          type: integer
        frames:
          type: array
          items:
            type: object
            required:
              - frame
              - cmds
            properties:
              frame:
                type: integer
              cmds:
                type: array
                items:
                  type: object
                  required:
                    - side
                    - commands
                  properties:
                    side:
                      type: integer
                    commands:
                      type: string
                      description: PlayerCommands opaque bytes（base64）
        meta:
          type: object
          properties:
            recordedAt:
              type: integer
            winner:
              type: integer
        decks:
          type: object
          description: Deck loadouts the match was built with (PVP_LOADOUT_DESIGN §6.2); omitted for matches with no loadout gating
          required:
            - top
            - bottom
          properties:
            top:
              type: array
              items:
                type: string
            bottom:
              type: array
              items:
                type: string
    ShopItem:
      type: object
      required:
        - id
        - cost
        - kind
      properties:
        id:
          type: string
        cost:
          type: integer
        kind:
          type: string
        grants:
          type: string
    GachaPool:
      type: object
      required:
        - id
        - costSingle
        - entries
      properties:
        id:
          type: string
        costSingle:
          type: integer
        costTen:
          type: integer
        pityThreshold:
          type: integer
        dupePolicy:
          type: string
          enum:
            - shards
            - coins
        limited:
          type: boolean
          description: true = time-boxed limited pool
        name:
          type: string
          description: limited pool banner title
        featuredLegendary:
          type: string
          description: banner legendary itemId (off-banner legendary → Fate Point)
        endAt:
          type: integer
          format: int64
          description: limited pool close timestamp (ms)
        entries:
          type: array
          items:
            type: object
            required:
              - itemId
              - weight
              - rarity
              - probability
            properties:
              itemId:
                type: string
              weight:
                type: integer
              rarity:
                $ref: '#/components/schemas/Rarity'
              probability:
                type: number
                description: Draw probability 0-1 (Apple 3.1.1 probability disclosure)
    GachaResult:
      type: object
      required:
        - itemId
        - rarity
        - duplicate
      properties:
        itemId:
          type: string
        rarity:
          $ref: '#/components/schemas/Rarity'
        duplicate:
          type: boolean
        converted:
          type: object
          properties:
            kind:
              type: string
              enum:
                - shards
                - coins
            amount:
              type: integer
    ProfileView:
      type: object
      required:
        - publicId
        - displayName
      properties:
        publicId:
          type: string
        displayName:
          type: string
        rank:
          type: string
        equippedTitle:
          type: string
          description: Currently equipped title id (empty string = no title)
    FriendView:
      type: object
      required:
        - publicId
        - displayName
        - online
      properties:
        publicId:
          type: string
        displayName:
          type: string
        online:
          type: boolean
        rank:
          type: string
        alias:
          type: string
          description: owner's private alias
    FriendRequestView:
      type: object
      required:
        - requestId
        - fromPublicId
        - fromName
        - toPublicId
        - createdAt
      properties:
        requestId:
          type: string
        fromPublicId:
          type: string
        fromName:
          type: string
        toPublicId:
          type: string
        message:
          type: string
        createdAt:
          type: integer
    SocialBadges:
      type: object
      required:
        - friendRequests
        - chat
        - mail
        - total
      properties:
        friendRequests:
          type: integer
        chat:
          type: integer
        mail:
          type: integer
        total:
          type: integer
    ConversationView:
      type: object
      required:
        - convId
        - peer
        - lastTs
        - unread
      properties:
        convId:
          type: string
        peer:
          $ref: '#/components/schemas/ProfileView'
        lastBody:
          type: string
        lastFrom:
          type: string
        lastTs:
          type: integer
        unread:
          type: integer
    ChatMessageView:
      type: object
      required:
        - messageId
        - convId
        - fromPublicId
        - body
        - kind
        - ts
      properties:
        messageId:
          type: string
        convId:
          type: string
        fromPublicId:
          type: string
        body:
          type: string
        kind:
          type: string
          enum:
            - text
            - system
        ts:
          type: integer
    MailAttachmentView:
      type: object
      required:
        - kind
      properties:
        kind:
          type: string
          enum:
            - coins
            - item
            - skin
            - material
            - equipment
            - card
        id:
          type: string
        count:
          type: integer
        instance:
          description: Present only for kind=equipment|card — the traded instance snapshot
          oneOf:
            - $ref: '#/components/schemas/EquipmentInstance'
            - $ref: '#/components/schemas/CardInstance'
    MailView:
      type: object
      required:
        - mailId
        - from
        - subject
        - body
        - createdAt
        - expireAt
        - read
        - claimed
      properties:
        mailId:
          type: string
        from:
          type: string
          description: '''system'' or sender publicId'
        fromName:
          type: string
        subject:
          type: string
        body:
          type: string
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/MailAttachmentView'
        createdAt:
          type: integer
        expireAt:
          type: integer
        read:
          type: boolean
        claimed:
          type: boolean
    AnalyticsEventConfig:
      type: object
      properties:
        enabled:
          type: boolean
        sample:
          type: number
    BattlePassData:
      type: object
      required:
        - seasonNo
        - xp
        - level
        - hasPass
        - claimedFree
        - claimedPaid
      properties:
        seasonNo:
          type: integer
        xp:
          type: integer
        level:
          type: integer
          minimum: 0
          maximum: 30
        hasPass:
          type: boolean
        claimedFree:
          type: array
          items:
            type: integer
        claimedPaid:
          type: array
          items:
            type: integer
    AnalyticsConfig:
      type: object
      properties:
        enabled:
          type: boolean
        defaultSample:
          type: number
        events:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AnalyticsEventConfig'
    AnalyticsEvent:
      type: object
      required:
        - event
        - ts
      properties:
        event:
          type: string
        ts:
          type: number
          description: Client unix ms
        props:
          type: object
          additionalProperties: true
    AnalyticsEventBatch:
      type: object
      required:
        - events
      properties:
        session_id:
          type: string
        device_id:
          type: string
        platform:
          type: string
          enum:
            - web
            - wechat
            - crazygames
        os:
          type: string
        game_version:
          type: string
        locale:
          type: string
        ua:
          type: string
        screen_w:
          type: integer
        screen_h:
          type: integer
        dpr:
          type: number
        events:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/AnalyticsEvent'
  responses:
    ErrorResp:
      description: Error envelope
      content:
        application/json:
          schema:
            type: object
            required:
              - ok
              - error
            properties:
              ok:
                type: boolean
                enum:
                  - false
              error:
                $ref: '#/components/schemas/Error'
paths:
  /auth/wx:
    post:
      operationId: authWx
      tags:
        - auth
      summary: WeChat anonymous login (exchange code for openid)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: '#/components/schemas/AuthResult'
  /auth/device:
    post:
      operationId: authDevice
      tags:
        - auth
      summary: Device UUID anonymous login (Web / CrazyGames)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - deviceId
              properties:
                deviceId:
                  type: string
                  minLength: 8
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: '#/components/schemas/AuthResult'
  /auth/register:
    post:
      operationId: authRegister
      tags:
        - auth
      summary: Password registration (email/username + password, creates a new account)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
                - password
              properties:
                loginId:
                  type: string
                  minLength: 3
                  maxLength: 64
                password:
                  type: string
                displayName:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/ErrorResp'
        '409':
          $ref: '#/components/responses/ErrorResp'
  /auth/login:
    post:
      operationId: authLogin
      tags:
        - auth
      summary: Password login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - loginId
                - password
              properties:
                loginId:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: '#/components/schemas/AuthResult'
        '401':
          $ref: '#/components/responses/ErrorResp'
  /auth/oauth:
    post:
      operationId: authOAuth
      tags:
        - auth
      summary: OAuth third-party login (authorization code flow, initially supports google)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - provider
                - code
                - redirectUri
              properties:
                provider:
                  type: string
                  enum:
                    - google
                code:
                  type: string
                redirectUri:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    $ref: '#/components/schemas/AuthResult'
        '400':
          $ref: '#/components/responses/ErrorResp'
  /auth/bind:
    post:
      operationId: authBind
      tags:
        - auth
      summary: Bind credentials to the current account (upgrade anonymous to registered / bind multiple credentials)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - method
              properties:
                method:
                  type: string
                  enum:
                    - oauth
                    - password
                provider:
                  type: string
                  enum:
                    - google
                code:
                  type: string
                redirectUri:
                  type: string
                loginId:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - data
                properties:
                  ok:
                    type: boolean
                    enum:
                      - true
                  data:
                    type: object
                    required:
                      - ok
                      - isAnonymous
                    properties:
                      ok:
                        type: boolean
                        enum:
                          - true
                      isAnonymous:
                        type: boolean
        '400':
          $ref: '#/components/responses/ErrorResp'
        '409':
          $ref: '#/components/responses/ErrorResp'
  /auth/password/change:
    post:
      operationId: authPasswordChange
      tags:
        - auth
      summary: Change password (requires login; validates old password)
      security:
        - bearerAuth: []
      requestBody:
        required: true
