      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [track, level]
              properties:
                track: { type: string, enum: [free, paid] }
                level: { type: integer, minimum: 1, maximum: 30 }
      responses:
        '200':
          description: 领取成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [battlePass, reward]
                    properties:
                      battlePass: { $ref: '#/components/schemas/BattlePassData' }
                      reward:
                        type: object
                        required: [kind, count]
                        properties:
                          kind: { type: string }
                          count: { type: integer }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
