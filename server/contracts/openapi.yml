                endFrame:
                  type: integer
                  description: Total frame count of the replay (upper bound for re-simulation steps)
                frames:
                  type: array
                  description: Non-empty frames (command bytes base64, structurally identical to the judge pipeline)
                  items:
                    type: object
                    required:
                      - frame
                      - cmds
                    properties:
                      frame:
                        type: integer
                      cmds:
                        type: array
                        items:
                          type: object
                          required:
                            - side
                            - commands
                          properties:
                            side:
                              type: integer
                            commands:
                              type: string
                              description: base64 PlayerCommands
