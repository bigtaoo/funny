                      grantedCards:
                        type: object
                        additionalProperties:
                          type: integer
                        description: Unit cards actually granted after re-simulation passes (cardKey→count, S12-C; empty when rejected or capped)
                      grantedEquipment:
                        $ref: '#/components/schemas/EquipmentInstance'
