openapi: 3.0.3
info:
  title: Notebook Wars metaserver REST API
  version: 0.1.0
  description: >
    REST 契约单一来源（design-first，M15）。metaserver 用 fastify-openapi-glue
    按 operationId 装配路由 + 校验；客户端用 openapi-typescript + openapi-fetch
    生成 typed fetch。统一响应包络 ApiResp<T>。详见 SERVER_API.md。

servers:
  - url: /api

tags:
  - name: auth
    description: 匿名账号（S0-4 / S0-7）
  - name: save
    description: 云存档（save-service，S0-7）
  - name: shop
    description: 商店直购（economy-service，S2-2）
  - name: gacha
    description: 盲盒（economy-service，S2-3）
  - name: ads
    description: 广告奖励（economy-service，S2-4）
  - name: iap
    description: 充值验单（iap-service，S4-1）
  - name: friends
    description: 好友（S6-1，SOCIAL_DESIGN §5.1）
  - name: chat
    description: 私聊（S6-2，SOCIAL_DESIGN §5.2）
  - name: mail
    description: 邮件（S6-3，SOCIAL_DESIGN §5.3）
  - name: ranked
    description: 天梯排行榜（S11，SEASON_DESIGN §5）
  - name: battlepass
    description: 战令（S11，SEASON_DESIGN §9）

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [code, message]
      properties:
        code: { type: string }
        message: { type: string }

    Rarity:
      type: string
      enum: [common, rare, epic, legendary]

    LevelRecord:
      type: object
      properties:
        timeMs: { type: integer }
        leaked: { type: integer }
      additionalProperties: true

    SaveData:
      type: object
      required:
        - version
        - accountId
        - rev
        - updatedAt
        - wallet
        - inventory
        - gacha
        - pvp
        - progress
        - materials
        - pveUpgrades
        - equipped
        - flags
      properties:
        version: { type: integer }
        accountId: { type: string }
        rev: { type: integer }
        updatedAt: { type: integer }
        wallet:
          type: object
          required: [coins]
          properties:
            coins: { type: integer, minimum: 0 }
        inventory:
          type: object
          required: [skins, items]
          properties:
            skins:
              type: array
              items: { type: string }
            items:
              type: object
              additionalProperties: { type: integer }
        gacha:
          type: object
          required: [pity]
          properties:
            pity:
              type: object
              additionalProperties: { type: integer }
        # 已发货消费订单（commercial orderId）；发货幂等账本（S5-5）。legacy 档可缺，故非 required。
        deliveredOrders:
          type: array
          items: { type: string }
        pvp:
          type: object
          required: [elo, rank, wins, losses, streak]
          properties:
            elo: { type: integer }
            rank: { type: string }
            wins: { type: integer }
            losses: { type: integer }
            streak: { type: integer }
            # —— S11 赛季字段（legacy 档可缺） ——
            seasonNo: { type: integer, description: 当前赛季编号 }
            seasonPeakElo: { type: integer, description: 本赛季最高 ELO }
            seasonPeakRank: { type: string, description: 本赛季最高段位 }
            reachedRanks:
              type: array
              items: { type: string }
              description: 历史首达段位列表（终身账本）
        # —— S10 称号（服务器权威，懒创建；PUT /save 不可写）——
        titles:
          type: array
          items: { type: string }
          description: 拥有的称号 id 集合（赛季结算/成就/admin 授予，顺序即获得顺序）
        # —— S11 战令 ——
        battlePass:
          $ref: '#/components/schemas/BattlePassData'
        progress:
          type: object
          required: [cleared, stars, best]
          properties:
            cleared:
              type: array
              items: { type: string }
            stars:
              type: object
              additionalProperties: { type: integer, minimum: 1, maximum: 3 }
            best:
              type: object
              additionalProperties: { $ref: '#/components/schemas/LevelRecord' }
        materials:
          type: object
          additionalProperties: { type: integer }
        # @deprecated S3-2 per-stat 升级；S12 起单位养成改集卡合成（见 unitLevels/cardInventory）。
        pveUpgrades:
          type: object
          additionalProperties: { type: integer }
        # —— 单位养成（S12，ECONOMY_NUMBERS §4）。服务器权威，legacy 档可缺，非 required ——
        unitLevels:
          type: object
          additionalProperties: { type: integer, minimum: 1, maximum: 9 }
          description: 单位强度等级 unitId→1..9，由 cardInventory 派生，引擎读此跑蓝图
        cardInventory:
          type: object
          additionalProperties: { type: integer, minimum: 0 }
          description: 单位卡库存 `${unitId}:${level}`→张数，集卡合成原始来源
        equipped:
          type: object
          additionalProperties: { type: string }
        flags:
          type: object
          additionalProperties: { type: boolean }
        # —— 成就系统（服务器权威，ACHIEVEMENT_DESIGN §3）。懒创建，legacy 档可缺，非 required ——
        stats:
          type: object
          additionalProperties: { type: integer }
          description: 终身累计统计（StatKey→值），单调递增，服务器权威
        achievements:
          type: object
          additionalProperties:
            type: object
            required: [claimedTiers]
            properties:
              claimedTiers:
                type: array
                items: { type: integer, minimum: 1, maximum: 3 }
          description: achId→已领阶号子集，幂等防重领
        # —— 装备系统（服务器权威，EQUIPMENT_DESIGN §3.1）。legacy 档可缺，故非 required ——
        # 仅 /equipment/* 端点写，PUT /save 不可写（不在 SyncPatch）。
        equipmentInv:
          type: object
          additionalProperties: { $ref: '#/components/schemas/EquipmentInstance' }
        gear:
          type: object
          description: 穿戴 loadout（global 全军 / byUnit 按兵种预留），槽位→实例 id。
          properties:
            global:
              type: object
              additionalProperties: { type: string }
            byUnit:
              type: object
              additionalProperties:
                type: object
                additionalProperties: { type: string }

    # 成就定义（硬编码 @nw/shared，GET /achievements 下发；客户端据此 + stats 本地算阶）。
    Achievement:
      type: object
      required: [id, statKey, category, tiers]
      properties:
        id: { type: string }
        statKey: { type: string }
        category: { type: string, enum: [pve, pvp, collection, progression] }
        titleId: { type: string }
        hidden: { type: boolean }
        tiers:
          type: array
          items:
            type: object
            required: [threshold, coins]
            properties:
              threshold: { type: integer }
              coins: { type: integer }

    EquipmentInstance:
      type: object
      required: [id, defId, rarity, level, affixes]
      properties:
        id: { type: string }
        defId: { type: string }
        rarity: { type: string, enum: [common, fine, rare, epic] }
        level: { type: integer, minimum: 0, maximum: 9 }
        affixes:
          type: array
          items:
            type: object
            required: [id, value]
            properties:
              id: { type: string }
              value: { type: number }
        locked: { type: boolean }

    # —— 客户端同步段（PUT /save 仅接受这些字段，§2.2）——
    # PVE_INTEGRITY_PLAN §8 起 progress/materials/pveUpgrades 转服务器权威
    # （只由 /pve/* + ranked 结算写），PUT /save 收窄为仅 equipped/flags。
    SyncPatch:
      type: object
      properties:
        equipped: { $ref: '#/components/schemas/SaveData/properties/equipped' }
        flags: { $ref: '#/components/schemas/SaveData/properties/flags' }

    AuthResult:
      type: object
      required: [token, accountId, isNew, isAnonymous]
      properties:
        token: { type: string }
        accountId: { type: string }
        isNew: { type: boolean }
        # 仅挂 device、无可恢复凭证（password/oauth/wx）→ true。联机/商店/充值要求 false（SA-1）。
        isAnonymous: { type: boolean }
        # 注册时填的展示名（可选）；客户端用于个人资料显示。未设置则缺省。
        displayName: { type: string }
        # 9 位数字公开 id（玩家交流/投诉用；accountId 仅服务器内部）。
        publicId: { type: string }
        # gateway 公开控制面 WS 地址（房间/匹配）。客户端只硬编码 meta 地址，
        # gateway 地址由本回包下发、game 地址由 match_found 下发。未配置则缺省。
        gatewayUrl: { type: string }

    MatchHistoryEntry:
      type: object
      required: [roomId, mode, result, ts]
      properties:
        roomId: { type: string }
        mode: { type: string, description: 'friendly | ranked' }
        result: { type: string, enum: [win, loss, unknown] }
        opponentName: { type: string, description: 归档当刻对手展示名快照 }
        opponentPublicId: { type: string, description: 对手 9 位公开 id }
        eloDelta: { type: integer, description: 'ranked 本局 ELO 变化（带符号）；friendly 缺省' }
        ts: { type: integer, description: 归档时间（epoch ms） }

    MatchReplay:
      type: object
      required: [engineVersion, mode, seed, endFrame, frames]
      description: 服务端持久化的对局录像（非空帧日志）。命令为 game.proto opaque bytes（base64），客户端解码回放。
      properties:
        engineVersion: { type: integer, description: 服务端逻辑无关恒 0；客户端按自身 ENGINE_VERSION 回放校验 }
        mode: { type: string }
        seed: { type: string, description: uint64 十进制字符串 }
        endFrame: { type: integer }
        frames:
          type: array
          items:
            type: object
            required: [frame, cmds]
            properties:
              frame: { type: integer }
              cmds:
                type: array
                items:
                  type: object
                  required: [side, commands]
                  properties:
                    side: { type: integer }
                    commands: { type: string, description: 'PlayerCommands opaque bytes（base64）' }
        meta:
          type: object
          properties:
            recordedAt: { type: integer }
            winner: { type: integer }

    ShopItem:
      type: object
      required: [id, cost, kind]
      properties:
        id: { type: string }
        cost: { type: integer }
        kind: { type: string }
        grants: { type: string }

    GachaPool:
      type: object
      required: [id, costSingle, entries]
      properties:
        id: { type: string }
        costSingle: { type: integer }
        costTen: { type: integer }
        pityThreshold: { type: integer }
        dupePolicy: { type: string, enum: [shards, coins] }
        entries:
          type: array
          items:
            type: object
            required: [itemId, weight, rarity]
            properties:
              itemId: { type: string }
              weight: { type: integer }
              rarity: { $ref: '#/components/schemas/Rarity' }

    GachaResult:
      type: object
      required: [itemId, rarity, duplicate]
      properties:
        itemId: { type: string }
        rarity: { $ref: '#/components/schemas/Rarity' }
        duplicate: { type: boolean }
        converted:
          type: object
          properties:
            kind: { type: string, enum: [shards, coins] }
            amount: { type: integer }

    # —— 社交（S6，SOCIAL_DESIGN §5）——
    ProfileView:
      type: object
      required: [publicId, displayName]
      properties:
        publicId: { type: string }
        displayName: { type: string }
        rank: { type: string }
        equippedTitle: { type: string, description: "当前佩戴称号 id（空=无称号）" }

    FriendView:
      type: object
      required: [publicId, displayName, online]
      properties:
        publicId: { type: string }
        displayName: { type: string }
        online: { type: boolean }
        rank: { type: string }
        alias: { type: string, description: owner 私有备注名 }

    FriendRequestView:
      type: object
      required: [requestId, fromPublicId, fromName, toPublicId, createdAt]
      properties:
        requestId: { type: string }
        fromPublicId: { type: string }
        fromName: { type: string }
        toPublicId: { type: string }
        message: { type: string }
        createdAt: { type: integer }

    SocialBadges:
      type: object
      required: [friendRequests, chat, mail, total]
      properties:
        friendRequests: { type: integer }
        chat: { type: integer }
        mail: { type: integer }
        total: { type: integer }

    ConversationView:
      type: object
      required: [convId, peer, lastTs, unread]
      properties:
        convId: { type: string }
        peer: { $ref: '#/components/schemas/ProfileView' }
        lastBody: { type: string }
        lastFrom: { type: string }
        lastTs: { type: integer }
        unread: { type: integer }

    ChatMessageView:
      type: object
      required: [messageId, convId, fromPublicId, body, kind, ts]
      properties:
        messageId: { type: string }
        convId: { type: string }
        fromPublicId: { type: string }
        body: { type: string }
        kind: { type: string, enum: [text, system] }
        ts: { type: integer }

    MailAttachmentView:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [coins, item, skin, material] }
        id: { type: string }
        count: { type: integer }

    MailView:
      type: object
      required: [mailId, from, subject, body, createdAt, expireAt, read, claimed]
      properties:
        mailId: { type: string }
        from: { type: string, description: "'system' 或发件人 publicId" }
        fromName: { type: string }
        subject: { type: string }
        body: { type: string }
        attachments:
          type: array
          items: { $ref: '#/components/schemas/MailAttachmentView' }
        createdAt: { type: integer }
        expireAt: { type: integer }
        read: { type: boolean }
        claimed: { type: boolean }

    # —— Analytics（A9-0）——
    AnalyticsEventConfig:
      type: object
      properties:
        enabled: { type: boolean }
        sample:  { type: number }

    # —— S11 战令数据（BattlePassData）——
    BattlePassData:
      type: object
      required: [seasonNo, xp, level, hasPass, claimedFree, claimedPaid]
      properties:
        seasonNo: { type: integer }
        xp: { type: integer }
        level: { type: integer, minimum: 0, maximum: 30 }
        hasPass: { type: boolean }
        claimedFree:
          type: array
          items: { type: integer }
        claimedPaid:
          type: array
          items: { type: integer }

    AnalyticsConfig:
      type: object
      properties:
        enabled:       { type: boolean }
        defaultSample: { type: number }
        events:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AnalyticsEventConfig'

    AnalyticsEvent:
      type: object
      required: [event, ts]
      properties:
        event: { type: string }
        ts:    { type: number, description: "客户端 unix ms" }
        props:
          type: object
          additionalProperties: true

    AnalyticsEventBatch:
      type: object
      required: [events]
      properties:
        session_id:   { type: string }
        device_id:    { type: string }
        platform:     { type: string, enum: [web, wechat, crazygames] }
        os:           { type: string }
        game_version: { type: string }
        locale:       { type: string }
        events:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/AnalyticsEvent'

  responses:
    ErrorResp:
      description: 失败包络
      content:
        application/json:
          schema:
            type: object
            required: [ok, error]
            properties:
              ok: { type: boolean, enum: [false] }
              error: { $ref: '#/components/schemas/Error' }

paths:
  /auth/wx:
    post:
      operationId: authWx
      tags: [auth]
      summary: 微信匿名登录（code 换 openid）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }

  /auth/device:
    post:
      operationId: authDevice
      tags: [auth]
      summary: 设备 UUID 匿名登录（Web / CrazyGames）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [deviceId]
              properties:
                deviceId: { type: string, minLength: 8 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }

  /auth/register:
    post:
      operationId: authRegister
      tags: [auth]
      summary: 密码注册（邮箱/用户名 + 密码，新建账号）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId: { type: string, minLength: 3, maxLength: 64 }
                # 密码强度由 handler 校验，返回专属 WEAK_PASSWORD（schema 不设 minLength 以免被通用校验抢先）。
                password: { type: string }
                displayName: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /auth/login:
    post:
      operationId: authLogin
      tags: [auth]
      summary: 密码登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginId, password]
              properties:
                loginId: { type: string }
                password: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /auth/oauth:
    post:
      operationId: authOAuth
      tags: [auth]
      summary: OAuth 第三方登录（授权码流，首期支持 google）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [provider, code, redirectUri]
              properties:
                provider: { type: string, enum: [google] }
                code: { type: string }
                redirectUri: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data: { $ref: '#/components/schemas/AuthResult' }
        '400': { $ref: '#/components/responses/ErrorResp' }

  /auth/bind:
    post:
      operationId: authBind
      tags: [auth]
      summary: 绑定凭证到当前账号（匿名升级转正 / 多凭证绑定）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [method]
              properties:
                method:
                  type: string
                  enum: [oauth, password]
                # OAuth 绑定
                provider: { type: string, enum: [google] }
                code: { type: string }
                redirectUri: { type: string }
                # 密码绑定
                loginId: { type: string }
                password: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [ok, isAnonymous]
                    properties:
                      ok: { type: boolean, enum: [true] }
                      isAnonymous: { type: boolean }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /auth/password/change:
    post:
      operationId: authPasswordChange
      tags: [auth]
      summary: 改密（需登录；校验旧密码）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [oldPassword, newPassword]
              properties:
                oldPassword: { type: string }
                # 强度由 handler 校验（WEAK_PASSWORD）。
                newPassword: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [ok]
                    properties:
                      ok: { type: boolean, enum: [true] }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /profile/rename:
    post:
      operationId: profileRename
      tags: [profile]
      summary: 改展示名（消耗金币；扣币成功后写名并回推存档）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [displayName]
              properties:
                displayName: { type: string, minLength: 1, maxLength: 24 }
      responses:
        '200':
          description: 成功，回推权威存档 + 新展示名
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, displayName]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      displayName: { type: string }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }
        '503': { $ref: '#/components/responses/ErrorResp' }

  /save:
    get:
      operationId: getSave
      tags: [save]
      summary: 拉取当前账号存档
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      # 账号展示名（可选）；token 续登时客户端据此恢复个人资料。
                      displayName: { type: string }
                      # 9 位数字公开 id；token 续登时客户端据此恢复个人资料。
                      publicId: { type: string }
                      # gateway 公开 WS 地址（可选）；token 续登无 auth 回包，从这里取。
                      gatewayUrl: { type: string }
        '401': { $ref: '#/components/responses/ErrorResp' }
    put:
      operationId: putSave
      tags: [save]
      summary: 推送客户端同步段（乐观锁 If-Match rev）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: If-Match
          in: header
          required: true
          schema: { type: string }
          description: 客户端持有的 rev
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [save]
              properties:
                save: { $ref: '#/components/schemas/SyncPatch' }
      responses:
        '200':
          description: 成功，回推规范化存档
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
        '409':
          description: REV_CONFLICT，带当前云端值
          content:
            application/json:
              schema:
                type: object
                required: [ok, error]
                properties:
                  ok: { type: boolean, enum: [false] }
                  error: { $ref: '#/components/schemas/Error' }
                  save: { $ref: '#/components/schemas/SaveData' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /match/history:
    get:
      operationId: getMatchHistory
      tags: [save]
      summary: 当前账号最近对战历史（ranked / friendly，按时间倒序）
      security: [{ bearerAuth: [] }]
      parameters:
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 50, default: 20 }
          description: 返回条数上限（默认 20，最多 50）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [matches]
                    properties:
                      matches:
                        type: array
                        items: { $ref: '#/components/schemas/MatchHistoryEntry' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /match/{roomId}/replay:
    get:
      operationId: getMatchReplay
      tags: [save]
      summary: 取某局录像（仅本人参与的对局）；服务端 opaque 帧，客户端解码回放
      security: [{ bearerAuth: [] }]
      parameters:
        - name: roomId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [replay]
                    properties:
                      replay: { $ref: '#/components/schemas/MatchReplay' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }

  /match/{roomId}/replay/share:
    post:
      operationId: createReplayShare
      tags: [save]
      summary: 创建录像分享链接（S1-RP）；仅本人参与的对局可分享；7 天 TTL
      security: [{ bearerAuth: [] }]
      parameters:
        - name: roomId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [shareId]
                    properties:
                      shareId:
                        type: string
                        description: 分享 id（UUID）；客户端拼 /share/replay/{shareId} 分发
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }

  /share/replay/{shareId}:
    get:
      operationId: getReplayByShare
      tags: [save]
      summary: 通过分享链接取录像（S1-RP）；无需登录；超期返回 404
      parameters:
        - name: shareId
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [replay]
                    properties:
                      replay: { $ref: '#/components/schemas/MatchReplay' }
        '404': { $ref: '#/components/responses/ErrorResp' }

  /pve/clear:
    post:
      operationId: pveClear
      tags: [save]
      summary: PvE 通关结算（服务器权威：校验解锁→发材料[每日上限]→写 progress/stars→回推）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [levelId, stars]
              properties:
                levelId: { type: string }
                stars: { type: integer, minimum: 0, maximum: 3 }
                replayRef: { type: string, description: 可选录像引用（L1 抽检复算用，已弃用） }
                pveUpgrades:
                  type: object
                  additionalProperties: { type: integer }
                  description: 客户端开局蓝图快照（L0 异常判定；与服务器权威不符触发抽检）
                stats:
                  type: object
                  additionalProperties: { type: integer }
                  description: 本局成就计数（kill.archer/kill.guard/cast.meteor；S9-3b，普通通关喂入，过 L1 caps）
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted, capped]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted:
                        type: object
                        additionalProperties: { type: integer }
                        description: 本次实发材料（capped / 抽检暂扣时为空）
                      grantedCards:
                        type: object
                        additionalProperties: { type: integer }
                        description: 本次实发单位卡（cardKey→张数，S12-C；capped / 抽检暂扣时为空）
                      grantedEquipment:
                        $ref: '#/components/schemas/EquipmentInstance'
                        description: 本次关卡掉落的装备实例（E2 §4；未掉落 / 满仓时缺省）
                      capped: { type: boolean, description: 当日发材料通关已达上限 }
                      needsReplay:
                        type: boolean
                        description: 被 L1 抽中——材料暂扣，客户端须补传录像走 /pve/verify 复算入账
                      verifyId:
                        type: string
                        description: 抽检记录 id（needsReplay 时），补传录像时回带
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /pve/verify:
    post:
      operationId: pveVerify
      tags: [save]
      summary: PvE L1 录像抽检复算（补传被抽中通关的录像→第三方无头复算→复算星数≥声称才发材料）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verifyId, frames, endFrame]
              properties:
                verifyId: { type: string, description: /pve/clear 回执的抽检记录 id }
                endFrame: { type: integer, description: 录像总帧数（复算步数上限） }
                frames:
                  type: array
                  description: 非空帧（command bytes base64，与裁判管线同构）
                  items:
                    type: object
                    required: [frame, cmds]
                    properties:
                      frame: { type: integer }
                      cmds:
                        type: array
                        items:
                          type: object
                          required: [side, commands]
                          properties:
                            side: { type: integer }
                            commands: { type: string, description: base64 PlayerCommands }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted, capped, verified]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted:
                        type: object
                        additionalProperties: { type: integer }
                        description: 复算通过后实发材料（rejected / capped 时为空）
                      grantedCards:
                        type: object
                        additionalProperties: { type: integer }
                        description: 复算通过后实发单位卡（cardKey→张数，S12-C；rejected / capped 时为空）
                      grantedEquipment:
                        $ref: '#/components/schemas/EquipmentInstance'
                        description: 复算通过后关卡掉落的装备实例（E2 §4；未掉落 / 满仓时缺省）
                      capped: { type: boolean }
                      verified:
                        type: boolean
                        description: 复算是否通过（false=星数不符判可疑，未发材料）
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }

  /pve/upgrade:
    post:
      operationId: pveUpgrade
      tags: [save]
      summary: PvE 升级（服务器权威：校验材料→扣材料→pveUpgrades+1→回推）；仅在线
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [upgradeId]
              properties:
                upgradeId: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }

  /pve/merge:
    post:
      operationId: pveMerge
      tags: [save]
      summary: 单位养成合成（S12，服务器权威：校验库存→消耗 5 张 N 级卡→+1 张 N+1→重算 unitLevels→回推）；仅在线
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [unitId, level]
              properties:
                unitId: { type: string, description: 兵种 id（infantry/shieldbearer/archer） }
                level: { type: integer, minimum: 1, maximum: 8, description: 被合成的源卡等级 N（产出 N+1） }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }

  /equipment/craft:
    post:
      operationId: craftEquipment
      tags: [save]
      summary: 装备合成（E2，服务器权威：扣文具材料→roll 一件 +0 基础装备→入库[300 上限]）。idempotencyKey 幂等
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [defId, idempotencyKey]
              properties:
                defId: { type: string, description: 装备定义 id（EQUIPMENT_DEFS，决定槽位/稀有度/配方） }
                idempotencyKey: { type: string, description: 客户端生成幂等键；重放返回首次结果（不二次扣料/roll） }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, instance]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      instance: { $ref: '#/components/schemas/EquipmentInstance' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /equipment/enhance:
    post:
      operationId: enhanceEquipment
      tags: [save]
      summary: 装备强化（E3，服务器掷骰：成功率表→扣材料+金币→成功 level+1，失败不掉级）。idempotencyKey 幂等
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceId, idempotencyKey]
              properties:
                instanceId: { type: string, description: 待强化的装备实例 id（equipmentInv 内） }
                idempotencyKey: { type: string, description: 客户端生成幂等键；掷骰/扣料绑定此键，重放返回首次结果 }
                useProtect: { type: boolean, description: 是否使用保护道具（E7）；true 且库存有 protect_enhance 时失败不损材料，消耗 1 个道具 }
      responses:
        '200':
          description: 成功（success=false 表示掷骰失败，已损耗材料/金币、等级不变）
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [success, instance, save]
                    properties:
                      success: { type: boolean, description: 本次强化是否成功（成功则 instance.level+1） }
                      instance: { $ref: '#/components/schemas/EquipmentInstance' }
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /equipment/salvage:
    post:
      operationId: salvageEquipment
      tags: [save]
      summary: 装备分解（E3，+0~4 返 70% 打造材料、移出库存；+5/穿戴中/锁定拒）。批量、idempotencyKey 幂等
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instanceIds, idempotencyKey]
              properties:
                instanceIds:
                  type: array
                  items: { type: string }
                  minItems: 1
                  description: 待分解的装备实例 id 列表（含 +0 冗余件，可批量）
                idempotencyKey: { type: string }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [refunded, save]
                    properties:
                      refunded:
                        type: object
                        additionalProperties: { type: integer }
                        description: 返还的材料合计（材料 id→数量）
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /equipment/equip:
    post:
      operationId: equipEquipment
      tags: [save]
      summary: 装备穿戴/卸下（E4，校验槽位匹配→写 gear.global[slot] 或 byUnit）。instanceId=null 卸下。纯状态
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slot, instanceId]
              properties:
                slot: { type: string, enum: [weapon, armor, trinket], description: 目标槽位 }
                instanceId:
                  type: string
                  nullable: true
                  description: 要穿上的实例 id；null 卸下该槽
                unitType: { type: string, description: '缺省=gear.global 全军共享；给定=gear.byUnit 对应兵种（阶段二）' }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /equipment/reforge:
    post:
      operationId: reforgeEquipment
      tags: [save]
      summary: 装备洗练（E6，保留主词条，重 roll 副词条；消耗同槽低档素材件）。idempotencyKey 幂等
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [targetId, materialId, idempotencyKey]
              properties:
                targetId: { type: string, description: 待洗练的装备实例 id }
                materialId: { type: string, description: 消耗的素材装备实例 id（同槽低一档，如 rare→需fine） }
                idempotencyKey: { type: string, description: 客户端生成幂等键；重 roll 绑定此键，重放返回首次结果 }
      responses:
        '200':
          description: 成功（instance 已含新副词条）
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [instance, save]
                    properties:
                      instance: { $ref: '#/components/schemas/EquipmentInstance' }
                      save: { $ref: '#/components/schemas/SaveData' }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '404': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /achievements:
    get:
      operationId: getAchievements
      tags: [save]
      summary: 成就定义表 + 我的 stats + 已领进度（客户端本地算阶，ACHIEVEMENT_DESIGN §6）
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [defs, stats, achievements]
                    properties:
                      defs:
                        type: array
                        items: { $ref: '#/components/schemas/Achievement' }
                      stats:
                        type: object
                        additionalProperties: { type: integer }
                      achievements:
                        $ref: '#/components/schemas/SaveData/properties/achievements'
        '401': { $ref: '#/components/responses/ErrorResp' }

  /achievements/claim:
    post:
      operationId: claimAchievement
      tags: [save]
      summary: 领取某成就某阶金币（服务器二次校验 stat≥阈值 + $addToSet 幂等发币，§4.3）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [achId, tier]
              properties:
                achId: { type: string }
                tier: { type: integer, minimum: 1, maximum: 3 }
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [save, granted]
                    properties:
                      save: { $ref: '#/components/schemas/SaveData' }
                      granted: { type: integer, description: 本次发放金币 }
        '400': { $ref: '#/components/responses/ErrorResp' }
        '401': { $ref: '#/components/responses/ErrorResp' }
        '402': { $ref: '#/components/responses/ErrorResp' }
        '409': { $ref: '#/components/responses/ErrorResp' }

  /retention:
    get:
      operationId: getRetention
      tags: [save]
      summary: 读留存状态（签到月历 + 每日任务进度 + 定义表，B5 RETENTION_DESIGN）
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                required: [ok, data]
                properties:
                  ok: { type: boolean, enum: [true] }
                  data:
                    type: object
                    required: [defs, claimable]
                    properties:
                      checkin:
                        type: object
                        nullable: true
                        properties:
                          monthKey: { type: string }
                          claimedDays: { type: array, items: { type: integer } }
                      daily:
                        type: object
                        nullable: true
                        properties:
                          dayKey: { type: string }
                          taskPoints: { type: integer }
                          rewardClaimed: { type: boolean }
                          completedTasks:
                            type: object
                            additionalProperties: { type: integer }
                      defs:
                        type: object
                        required: [rewards, tasks, pointsThreshold, dailyCoinsReward]
                        properties:
                          rewards: { type: array, items: { type: object } }
                          tasks: { type: array, items: { type: object } }
                          pointsThreshold: { type: integer }
                          dailyCoinsReward: { type: integer }
                      claimable:
                        type: object
                        required: [checkin, daily]
                        properties:
                          checkin: { type: boolean }
                          daily: { type: boolean }
        '401': { $ref: '#/components/responses/ErrorResp' }

  /retention/checkin:
    post:
