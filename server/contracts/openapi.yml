                        type: string
                      freeRename:
                        type: boolean
                      activeMatch:
                        type: object
                        required:
                          - roomId
                          - gameUrl
                          - ticket
                          - mode
                        properties:
                          roomId:
                            type: string
                          gameUrl:
                            type: string
                          ticket:
                            type: string
