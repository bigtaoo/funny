openapi: 3.1.0
info:
  title: Notebook Wars — worldsvc REST API
  version: "1.0"
  description: >
    SLG world map (worldsvc) REST contract. Separated from the metaserver openapi.yml because worldsvc runs at a different base URL.
    The client generates src/net/openapi-world.ts via gen-openapi.mjs.

servers:
  - url: '{worldBase}'
    variables:
      worldBase:
        default: 'http://localhost:18084'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── World ──────────────────────────────────────────────────────────────────

    WorldTileView:
      type: object
      required: [x, y, type, level]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, bridge, plankway, stronghold]
        level:
          type: integer
        resType:
          type: string
          enum: [ink, paper, graphite, metal, sticker]
        obstacleKind:
          type: string
          enum: [river, mountain]
          description: >-
            For type=obstacle only: river vs mountain art (§24). Carried from the per-world terrain baseline
            (mapBaselines, cloned from the active map template) or proceduralTile, so map-editor-painted rivers/mountains
            render correctly on the client instead of the client re-deriving a possibly-different kind locally.
        occupied:
          type: boolean
        mine:
          type: boolean
        ownerPublicId:
          type: string
          description: Occupier's 9-digit public id (populated when meta service is available)
        ownerName:
          type: string
          description: Occupier's display name (populated when meta service is available)
        familyId:
          type: string
        garrison:
          type: integer
        hp:
          type: integer
          description: >-
            ADR-026 §1: current building HP of this attackable tile (main base anchor / territory / stronghold). Absent = full HP (client falls back to maxHp).
            Populated for occupied/attackable tiles within vision.
        maxHp:
          type: integer
          description: "ADR-026 §1: building max HP = level × SLG_BASE_HP_PER_LEVEL. Client renders the HP bar as hp/maxHp."
        protectedUntil:
          type: number
        contestedUntil:
          type: number
          description: >-
            ADR-037 (§5.4): this tile is mid occupation-hold — an occupy march won its PvE battle against the
            system garrison but the hold countdown has not yet elapsed (no owner yet). ms epoch when the hold
            resolves into ownership, unless expelled first by another attack/occupy march.
        contestedByMe:
          type: boolean
          description: "ADR-037 (§5.4): the pending occupier is the requester themself (\"I'm holding\" vs. \"someone else is holding\")."
        watchtower:
          type: boolean
          description: §18 G5 V2：A watchtower has been built on this tile (large-radius persistent vision source). The client renders the tower marker.
        visible:
          type: boolean
          description: >-
            G5 vision: whether this tile is within the requester's current field of view. true = dynamic layer returned as-is; false = outside vision range, only the procedurally-generated
            base terrain is returned (all dynamic-layer data hidden, including the "occupied" signal). Populated only for /world/map viewport reads.
        ally:
          type: boolean
          description: "G5: this tile is owned by a family ally (within vision, not self). Client renders with friendly colour."
        allySect:
          type: boolean
          description: >-
            G5: this tile is owned by a member of an allied sect of the player's own sect (within vision, not self, not family). Alliances do not share vision;
            only distinguished on the map with a yellow border (§8.2, attacking/capturing between allies is forbidden).
        deskLevel:
          type: integer
          description: >-
            Main-base anchor only: owner's `desk` building level (1-10), mirrored from playerWorld onto the anchor
            tile whenever a desk upgrade completes. Drives the player-base art frame (playerbase_l{n}) on the
            requester's own base tile (see design/product/player-base-image-prompts.md); absent = level 1.

    WorldMapView:
      type: object
      required: [worldId, cx, cy, r, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        tiles:
          type: array
          items:
            $ref: '#/components/schemas/WorldTileView'

    WorldTileSparseView:
      description: >-
        Sparse occupied-tile view (zoom 2/3 bird's-eye layer). Contains only occupied tiles; unoccupied tiles are rendered locally by the client from proceduralTile.
        No profile RPC, no vision calculation.
      type: object
      required: [x, y, type]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, bridge, plankway, stronghold]
        mine:
          type: boolean
        ally:
          type: boolean
          description: "lod=mid: same-family ally"
        allySect:
          type: boolean
          description: "lod=mid: allied sect member (not family)"

    WorldMapSparseView:
      type: object
      required: [worldId, cx, cy, r, lod, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        lod:
          type: string
          enum: [thin, mid]
        tiles:
          type: array
          description: Occupied tiles only, sparse array
          items:
            $ref: '#/components/schemas/WorldTileSparseView'

    ShardTransferTargetView:
      description: A candidate destination shard for mid-season transfer (G6/§27) — same season, open/active, not full.
      type: object
      required: [worldId, shard, population, capacity]
      properties:
        worldId:
          type: string
        shard:
          type: integer
        population:
          type: integer
        capacity:
          type: integer

    PlayerWorldView:
      type: object
      required: [joined]
      properties:
        joined:
          type: boolean
        worldId:
          type: string
          description: "The shard worldId the player belongs to (G6/§20: returned from join-season resolution; the client uses this to enter the world)"
        troops:
          type: integer
        troopCap:
          type: integer
        resources:
          type: object
          additionalProperties:
            type: number
        yieldRate:
          type: object
          additionalProperties:
            type: number
        mainBaseTile:
          type: string
        familyId:
          type: string
        territoryCount:
          type: integer
        trainingQueue:
          type: array
          description: Training queue (S8-2, ordered by completeAt ascending). The client uses this to render the queue countdown (C4).
          items:
            type: object
            required: [qty, startAt, completeAt]
            properties:
              qty:
                type: integer
              startAt:
                type: integer
                format: int64
              completeAt:
                type: integer
                format: int64
        buildings:
          type: object
          description: "Home-city building levels (SLG_CITY_DESIGN P1; desk≥1, others≥0 when present). Keys are BuildingKey values."
          additionalProperties:
            type: integer
        buildQueue:
          type: array
          description: Build queue (SLG_CITY_DESIGN §4, ordered by completeAt ascending). The client CityScene renders countdowns from this.
          items:
            type: object
            required: [key, toLevel, startAt, completeAt]
            properties:
              key:
                $ref: '#/components/schemas/BuildingKey'
              toLevel:
                type: integer
              startAt:
                type: integer
                format: int64
              completeAt:
                type: integer
                format: int64
        # CC-4: per-card SLG run-time state (CHARACTER_CARDS_DESIGN §8.4). Absent when player has no card state yet.
        cardState:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/CardSLGState'
          description: Map of cardInstanceId → CardSLGState (troops, injury, teamId)
        # CC-4: troop pool available for distribution. Absent defaults to 0.
        baseTroopStock:
          type: integer
          description: Troops in the base pool available to distribute to card slots
        # ADR-026 §5: per-team injury state (team granularity, distinct from CC-3 card-level cardState[].injuredUntil).
        # Absent when no team is injured. Client renders an injury countdown in the team menu; injured teams never defend.
        teamState:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/TeamSLGState'
          description: Map of teamId (t1..t5) → TeamSLGState. Present only for teams with active state.
        hp:
          type: integer
          description: >-
            D-CITY-8: own main base's current persistent durability, same field name/semantics as WorldTileView.hp
            (wall-level-derived cap, self-regenerating). Absent when the player has no resolved main base yet.
        maxHp:
          type: integer
          description: "D-CITY-8: own main base's durability cap (= baseDurabilityMax(wall level)). Client renders the durability bar as hp/maxHp."

    BuildingKey:
      type: string
      description: "Home-city building identifier (SLG_CITY_DESIGN). P1 buildable: desk/inkPot/paperTray/graphiteMill/metalForge/stickerShop/cabinet/drillYard; wall/academy are P2."
      enum: [desk, inkPot, paperTray, graphiteMill, metalForge, stickerShop, cabinet, drillYard, wall, academy, satchel]

    MarchView:
      type: object
      required: [marchId, kind, fromTile, toTile, troops, departAt, arriveAt, status]
      properties:
        marchId:
          type: string
        kind:
          type: string
          enum: [attack, reinforce, occupy, sweep, scout, return]
        fromTile:
          type: string
        toTile:
          type: string
        troops:
          type: integer
        departAt:
          type: number
        arriveAt:
          type: number
        status:
          type: string
          enum: [marching, returning, arrived]
        mine:
          type: boolean
          description: "G5: whether this march belongs to the requester (false = enemy march within vision range)"
        teamId:
          type: string
          description: "ADR-026: which team slot ('t1'..'t5') this march deployed, if any. Only present on the requester's own marches; used client-side to grey out busy teams in the team picker."

    OccupationView:
      type: object
      required: [tile, x, y, level, garrison, dueAt]
      properties:
        tile:
          type: string
        x:
          type: integer
        y:
          type: integer
        level:
          type: integer
        garrison:
          type: integer
        dueAt:
          type: number
        teamId:
          type: string
          description: "Which team slot ('t1'..'t5') is tied up holding this tile, if the march was dispatched with one."

    # ── Auction ────────────────────────────────────────────────────────────────

    AuctionView:
      type: object
      required: [auctionId, worldId, sellerId, itemType, item, qty, price, status, expireAt, saleMode]
      properties:
        auctionId:
          type: string
        worldId:
          type: string
        sellerId:
          type: string
        sellerName:
          type: string
        itemType:
          type: string
          enum: [material, equipment, card]
          description: "CC-5: card = character card instance (qty always 1, gear must be empty before listing)"
        item:
          type: object
          additionalProperties: true
        qty:
          type: integer
        price:
          type: number
          description: Current effective unit price (fixed-price = sale unit price; auction = current highest bid unit price, or the starting price if no bids placed)
        totalPrice:
          type: number
          description: Current effective unit price × qty
        currency:
          type: string
          enum: [coins]
        status:
          type: string
          enum: [open, sold, cancelled, expired]
        expireAt:
          type: number
        designatedBuyerId:
          type: string
        taxPaid:
          type: number
        buyerId:
          type: string
        # ── B auction fields (saleMode defaults to 'fixed') ────────────────────────────────
        saleMode:
          type: string
          enum: [fixed, auction]
        startPrice:
          type: number
          description: Auction starting unit price
        buyoutPrice:
          type: number
          description: Auction buyout unit price floor (optional)
        topBid:
          type: object
          description: Current highest bid (unit price; coins are held in escrow)
          required: [bidderId, amount, ts]
          properties:
            bidderId: { type: string }
            amount: { type: number }
            ts: { type: number }

    # ── Sect (S8-4b) ────────────────────────────────────────────────────────────

    SectView:
      type: object
      required: [sectId, worldId, name, tag, leaderFamilyId, leaderId, memberFamilyCount, allySectIds, prosperity]
      properties:
        sectId:
          type: string
        worldId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderFamilyId:
          type: string
        leaderId:
          type: string
        memberFamilyCount:
          type: integer
        allySectIds:
          type: array
          items:
            type: string
        prosperity:
          type: number

    SectMemberFamilyView:
      type: object
      required: [familyId, name, tag, leaderId, memberCount, territoryCount]
      properties:
        familyId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderId:
          type: string
        memberCount:
          type: integer
        territoryCount:
          type: integer

    SectDetailView:
      allOf:
        - $ref: '#/components/schemas/SectView'
        - type: object
          required: [memberFamilies]
          properties:
            memberFamilies:
              type: array
              items:
                $ref: '#/components/schemas/SectMemberFamilyView'
            removalVote:
              type: object
              required: [nomineeFamilyId, voteCount, needed]
              properties:
                nomineeFamilyId:
                  type: string
                voteCount:
                  type: integer
                needed:
                  type: integer

    SectMessageView:
      type: object
      required: [id, senderId, senderName, body, ts]
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        title:
          type: string
          description: Sender's equipped title (称号), if any.
        sectName:
          type: string
          description: Sender's sect name (宗门), if any.
        familyName:
          type: string
          description: Sender's family name (家族), if any.
        body:
          type: string
        ts:
          type: number

    SectVoteResult:
      type: object
      required: [passed, voteCount, needed]
      properties:
        passed:
          type: boolean
        voteCount:
          type: integer
        needed:
          type: integer

    # ── Nation / Season / Shop / Siege (S8-6.5 ~ S8-8) ──────────────────────────

    NationView:
      type: object
      required: [capitalIdx, x, y]
      properties:
        capitalIdx:
          type: integer
          description: 0~9, province index (6 outer + 3 resource + 1 core, ADR-034 angle-sector ring layout)
        x:
          type: integer
        y:
          type: integer
        ownerId:
          type: string
        familyId:
          type: string
        nationName:
          type: string
        foundedAt:
          type: number

    SeasonView:
      type: object
      required: [worldId, season, shard, status, openAt, capacity, population, mapW, mapH]
      properties:
        worldId:
          type: string
        season:
          type: integer
        shard:
          type: integer
        status:
          type: string
          enum: [open, active, settling, closed]
        openAt:
          type: number
        resetAt:
          type: number
        capacity:
          type: integer
        population:
          type: integer
        mapW:
          type: integer
        mapH:
          type: integer

    SlgShopItemView:
      type: object
      required: [id, cost, kind, effect, description]
      properties:
        id:
          type: string
        cost:
          type: integer
          description: Price in coins
        kind:
          type: string
          enum: [troop_speedup, resource_pack, protection, battle_pass]
        effect:
          type: object
          additionalProperties: true
        description:
          type: string

    # Siege defense level that the attacker can play against (C2 post-match review). The level shape matches the client LevelDefinition (loose object);
    # its seed is derived from siegeId; the client must play the level in siege mode with this seed before uploading the recording for re-simulation.
    # Siege spectator replay level (G3-2c): LevelDefinition rebuilt from seed + both sides' formations; client headlessly replays with the same seed.
    SiegeReplayView:
      type: object
      required: [siegeId, seed, outcome, level]
      properties:
        siegeId: { type: string }
        seed: { type: integer }
        outcome: { type: string, enum: [attacker_win, defender_win, draw] }
        level:
          type: object
          additionalProperties: true

    # Compact battle-report row for the recent-sieges replay browser (last-100). role/hasReplay are relative
    # to the requester; only replayable rows (hasReplay=true) can be opened via GET /world/siege/{id}/replay.
    SiegeSummaryView:
      type: object
      required: [siegeId, tile, outcome, role, ts, hasReplay]
      properties:
        siegeId: { type: string }
        tile: { type: string, description: "Target tile id (worldId:x:y)" }
        tileLevel: { type: integer, description: Target tile level (absent for legacy reports) }
        outcome: { type: string, enum: [attacker_win, defender_win, draw] }
        role: { type: string, enum: [attacker, defender], description: Requester's side in this battle }
        ts: { type: integer, description: Unix ms timestamp the battle resolved }
        hasReplay: { type: boolean, description: Whether a headless replay is available for this report }

    # CC-3: per-card SLG run-time state stored in PlayerWorldDoc.cardState (CHARACTER_CARDS_DESIGN §7).
    CardSLGState:
      type: object
      required: [currentTroops]
      properties:
        currentTroops: { type: integer, description: Troops currently allocated to this card }
        injuredUntil: { type: integer, nullable: true, description: Unix ms timestamp when injury ends; null = not injured }
        teamId: { type: string, nullable: true, description: Team this card is assigned to }

    # ADR-026 §5: per-team SLG run-time state stored in PlayerWorldDoc.teamState (team granularity).
    TeamSLGState:
      type: object
      properties:
        injuredUntil: { type: integer, nullable: true, description: Unix ms timestamp when the team's injury lock ends; null/absent = not injured. Injured teams never defend. }

    # Formation unit (mirrors GarrisonEntry + CC-3 cardInstanceId, G3-2c). Validity of unitType/col/row is checked by the engine levelSchema;
    # initialHp = troops allocated to this unit (= HP, §16.1); cardInstanceId = CC-3 primary key (replaces unitType for new armies).
    ArmyEntry:
      type: object
      required: [col, row]
      properties:
        cardInstanceId: { type: string, description: CC-3 primary key (character card instance) }
        unitType: { type: string, description: Legacy unit type (synthesis/replay paths only) }
        col: { type: integer }
        row: { type: integer }
        initialHp: { type: integer, description: Legacy initial HP for replay data }

    # Attack formation template (team, G3-2c, ≤ 5 teams). A march attaches one team → the army snapshot is stored with the march.
    TeamTemplate:
      type: object
      required: [id, name, army]
      properties:
        id: { type: string }
        name: { type: string }
        army:
          type: array
          items: { $ref: '#/components/schemas/ArmyEntry' }

    # Defense config = constrained subset of the engine LevelDefinition (garrison/defenderBuildings/defenderBaseLevel).
    # Shape is constrained by the client's own meta mirror; the contract layer uses a loose object (to avoid duplicating the engine schema).
    DefenseConfig:
      type: object
      additionalProperties: true

    # ── Shared response wrappers ───────────────────────────────────────────────

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MarchIdResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

paths:

  # ── World ──────────────────────────────────────────────────────────────────

  /world/active-season:
    get:
      operationId: getActiveSeason
      summary: "Return the current active SLG season number (§20.8). Public endpoint — no auth required."
      responses:
        '200':
          description: Active season
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [season]
                        properties:
                          season:
                            type: integer
                            description: Current active SLG world season number

  /world/map:
    get:
      operationId: getWorldMap
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - { name: cx,      in: query, required: true, schema: { type: integer } }
        - { name: cy,      in: query, required: true, schema: { type: integer } }
        - { name: r,       in: query, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Map viewport
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapView' }

  /world/map/sparse:
    get:
      operationId: getWorldMapSparse
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true,  schema: { type: string } }
        - { name: cx,      in: query, required: true,  schema: { type: integer } }
        - { name: cy,      in: query, required: true,  schema: { type: integer } }
        - { name: r,       in: query, required: true,  schema: { type: integer } }
        - name: lod
          in: query
          required: false
          schema: { type: string, enum: [thin, mid], default: thin }
          description: "thin = mine marker only (zoom 3); mid = includes ally/allySect (zoom 2)"
      responses:
        '200':
          description: Sparse ownership overlay
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapSparseView' }

  /world/tile/{tileId}:
    get:
      operationId: getWorldTile
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: tileId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Single tile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/me:
    get:
      operationId: getWorldMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Player world state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/season/transfer/targets:
    get:
      operationId: listTransferTargets
      description: >-
        Mid-season shard transfer (G6/§27): list candidate destination shards for the player's current shard —
        same season, open/active, not full, excluding the current shard. Empty if the current world has no
        seeded WorldDoc.
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string }, description: The player's current shard. }
      responses:
        '200':
          description: Candidate shards
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/ShardTransferTargetView' }

  /world/season/transfer:
    post:
      operationId: transferShard
      description: >-
        Mid-season shard transfer (G6/§27): forfeits ALL shard-scoped state in fromWorldId (city/tiles/troops —
        via the same purge used for corrupt-account repair) and re-joins toWorldId fresh, exactly like a
        first-time join. No stat migration. Blocked by: an in-flight march/occupation in fromWorldId
        (TRANSFER_BUSY, recall/wait first), a recent prior transfer (TRANSFER_COOLDOWN,
        SHARD_TRANSFER_COOLDOWN_DAYS=7), or an invalid/full/different-season target (TRANSFER_TARGET_INVALID).
        Family/sect membership is untouched (family is not shard-scoped data).
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fromWorldId, toWorldId]
              properties:
                fromWorldId: { type: string }
                toWorldId: { type: string }
      responses:
        '200':
          description: Transferred; response is the fresh PlayerWorldView in toWorldId
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/join:
    post:
      operationId: joinWorld
      description: "Join the world; the system automatically places the player's base (§3.4: priority order: near family → outer-ring starter area → fallback). The player does not submit coordinates; the spawn location is determined by the server."
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
