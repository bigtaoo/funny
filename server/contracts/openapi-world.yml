openapi: 3.1.0
info:
  title: Notebook Wars — worldsvc REST API
  version: "1.0"
  description: >
    SLG 大世界（worldsvc）REST 契约。与 metaserver openapi.yml 分离，因 worldsvc 跑在不同 base URL。
    客户端经 gen-openapi.mjs 生成 src/net/openapi-world.ts。

servers:
  - url: '{worldBase}'
    variables:
      worldBase:
        default: 'http://localhost:18084'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── World ──────────────────────────────────────────────────────────────────

    WorldTileView:
      type: object
      required: [x, y, type, level]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, gate, stronghold]
        level:
          type: integer
        resType:
          type: string
          enum: [food, iron, wood]
        occupied:
          type: boolean
        mine:
          type: boolean
        ownerPublicId:
          type: string
          description: 占领者 9 位公开 id（meta 服务可用时填充）
        ownerName:
          type: string
          description: 占领者昵称（meta 服务可用时填充）
        familyId:
          type: string
        garrison:
          type: integer
        protectedUntil:
          type: number
        watchtower:
          type: boolean
          description: §18 G5 V2：该格建有瞭望塔（大半径持久视野源）。客户端渲染塔标记。
        visible:
          type: boolean
          description: >-
            G5 视野：该格是否在请求者当前视野内。true=动态层如实返回；false=视野外，仅程序化
            底层地形（动态层全部隐去，含「已被占领」信号）。仅 /world/map 视区读填充。
        ally:
          type: boolean
          description: G5：该格归同家族盟友所有（视野内、非己方）。客户端用友方色渲染。
        allySect:
          type: boolean
          description: >-
            G5：该格归本宗门「联盟宗门」成员所有（视野内、非己方、非家族）。联盟不共享视野，
            仅在地图上用黄描边标记区分（§8.2，盟友间禁止进攻/夺地）。

    WorldMapView:
      type: object
      required: [worldId, cx, cy, r, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        tiles:
          type: array
          items:
            $ref: '#/components/schemas/WorldTileView'

    PlayerWorldView:
      type: object
      required: [joined]
      properties:
        joined:
          type: boolean
        troops:
          type: integer
        troopCap:
          type: integer
        resources:
          type: object
          additionalProperties:
            type: number
        yieldRate:
          type: object
          additionalProperties:
            type: number
        mainBaseTile:
          type: string
        familyId:
          type: string
        territoryCount:
          type: integer
        trainingQueue:
          type: array
          description: 训练队列（S8-2，按 completeAt 升序）。客户端据此渲染队列倒计时（C4）。
          items:
            type: object
            required: [qty, startAt, completeAt]
            properties:
              qty:
                type: integer
              startAt:
                type: integer
                format: int64
              completeAt:
                type: integer
                format: int64

    MarchView:
      type: object
      required: [marchId, kind, fromTile, toTile, troops, departAt, arriveAt, status]
      properties:
        marchId:
          type: string
        kind:
          type: string
          enum: [attack, reinforce, occupy, sweep, scout, return]
        fromTile:
          type: string
        toTile:
          type: string
        troops:
          type: integer
        departAt:
          type: number
        arriveAt:
          type: number
        status:
          type: string
          enum: [marching, returning, arrived]
        mine:
          type: boolean
          description: G5：是否为请求者自己的行军（false = 视野内的敌方行军）

    # ── Family ─────────────────────────────────────────────────────────────────

    FamilyMemberView:
      type: object
      required: [accountId, role, joinedAt]
      properties:
        accountId:
          type: string
        publicId:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [leader, elder, member]
        joinedAt:
          type: number

    FamilyView:
      type: object
      required: [familyId, name, tag, worldId, memberCount, leaderId, createdAt]
      properties:
        familyId:
          type: string
        name:
          type: string
        tag:
          type: string
        worldId:
          type: string
        memberCount:
          type: integer
        leaderId:
          type: string
        createdAt:
          type: number
        sectId:
          type: string
        members:
          type: array
          items:
            $ref: '#/components/schemas/FamilyMemberView'

    FamilyMessageView:
      type: object
      required: [id, from, body, ts]
      properties:
        id:
          type: string
        from:
          type: string
        fromName:
          type: string
        body:
          type: string
        ts:
          type: number

    # ── Auction ────────────────────────────────────────────────────────────────

    AuctionView:
      type: object
      required: [auctionId, worldId, sellerId, itemType, item, qty, price, status, expireAt, saleMode]
      properties:
        auctionId:
          type: string
        worldId:
          type: string
        sellerId:
          type: string
        sellerName:
          type: string
        itemType:
          type: string
        item:
          type: object
          additionalProperties: true
        qty:
          type: integer
        price:
          type: number
          description: 当前有效单价（一口价=成交单价；竞拍=当前最高出价单价，无人出价则起拍价）
        totalPrice:
          type: number
          description: 当前有效单价 × qty
        currency:
          type: string
          enum: [coins]
        status:
          type: string
          enum: [open, sold, cancelled, expired]
        expireAt:
          type: number
        designatedBuyerId:
          type: string
        taxPaid:
          type: number
        buyerId:
          type: string
        # ── B 竞拍字段（saleMode 缺省 'fixed'）────────────────────────────────
        saleMode:
          type: string
          enum: [fixed, auction]
        startPrice:
          type: number
          description: 竞拍起拍单价
        buyoutPrice:
          type: number
          description: 竞拍一口价保底单价（可选）
        topBid:
          type: object
          description: 当前最高出价（单价，金币已托管）
          required: [bidderId, amount, ts]
          properties:
            bidderId: { type: string }
            amount: { type: number }
            ts: { type: number }

    # ── Sect（宗门，S8-4b）───────────────────────────────────────────────────────

    SectView:
      type: object
      required: [sectId, worldId, name, tag, leaderFamilyId, leaderId, memberFamilyCount, allySectIds, prosperity]
      properties:
        sectId:
          type: string
        worldId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderFamilyId:
          type: string
        leaderId:
          type: string
        memberFamilyCount:
          type: integer
        allySectIds:
          type: array
          items:
            type: string
        prosperity:
          type: number

    SectMemberFamilyView:
      type: object
      required: [familyId, name, tag, leaderId, memberCount, territoryCount]
      properties:
        familyId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderId:
          type: string
        memberCount:
          type: integer
        territoryCount:
          type: integer

    SectDetailView:
      allOf:
        - $ref: '#/components/schemas/SectView'
        - type: object
          required: [memberFamilies]
          properties:
            memberFamilies:
              type: array
              items:
                $ref: '#/components/schemas/SectMemberFamilyView'
            removalVote:
              type: object
              required: [nomineeFamilyId, voteCount, needed]
              properties:
                nomineeFamilyId:
                  type: string
                voteCount:
                  type: integer
                needed:
                  type: integer

    SectMessageView:
      type: object
      required: [id, senderId, senderName, body, ts]
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        body:
          type: string
        ts:
          type: number

    SectVoteResult:
      type: object
      required: [passed, voteCount, needed]
      properties:
        passed:
          type: boolean
        voteCount:
          type: integer
        needed:
          type: integer

    # ── Nation / Season / Shop / Siege (S8-6.5 ~ S8-8) ──────────────────────────

    NationView:
      type: object
      required: [capitalIdx, x, y]
      properties:
        capitalIdx:
          type: integer
          description: 0~9，对应 CAPITAL_FRACTIONS 索引
        x:
          type: integer
        y:
          type: integer
        ownerId:
          type: string
        familyId:
          type: string
        nationName:
          type: string
        foundedAt:
          type: number

    SeasonView:
      type: object
      required: [worldId, season, shard, status, openAt, capacity, population, mapW, mapH]
      properties:
        worldId:
          type: string
        season:
          type: integer
        shard:
          type: integer
        status:
          type: string
          enum: [open, active, settling, closed]
        openAt:
          type: number
        resetAt:
          type: number
        capacity:
          type: integer
        population:
          type: integer
        mapW:
          type: integer
        mapH:
          type: integer

    SlgShopItemView:
      type: object
      required: [id, cost, kind, effect, description]
      properties:
        id:
          type: string
        cost:
          type: integer
          description: 金币价格
        kind:
          type: string
          enum: [troop_speedup, resource_pack, protection, battle_pass]
        effect:
          type: object
          additionalProperties: true
        description:
          type: string

    # 攻方可打的围攻防守关卡（C2 复盘）。level 形态对齐客户端 LevelDefinition（loose object），
    # 其 seed 由 siegeId 派生，客户端须以此 seed 在 siege 模式实打后再上传录像复算。
    # 围攻重播观战关卡（G3-2c）：seed + 双方布阵 重建的 LevelDefinition；客户端以同 seed headless 重跑。
    SiegeReplayView:
      type: object
      required: [siegeId, seed, outcome, level]
      properties:
        siegeId: { type: string }
        seed: { type: integer }
        outcome: { type: string, enum: [attacker_win, defender_win, draw] }
        level:
          type: object
          additionalProperties: true

    # 布阵单位（GarrisonEntry 镜像，G3-2c）。unitType/col/row 合法性由引擎 levelSchema 校验；
    # initialHp = 分配给该单位的兵力（= 血量，§16.1）。
    ArmyEntry:
      type: object
      required: [unitType, col, row]
      properties:
        unitType: { type: string }
        col: { type: integer }
        row: { type: integer }
        initialHp: { type: integer }

    # 进攻布阵模板（队伍，G3-2c，≤ 5 支）。出征挂一支队 → army 快照进 march。
    TeamTemplate:
      type: object
      required: [id, name, army]
      properties:
        id: { type: string }
        name: { type: string }
        army:
          type: array
          items: { $ref: '#/components/schemas/ArmyEntry' }

    # 防守 config = 引擎 LevelDefinition 的受限子集（garrison/defenderBuildings/defenderBaseLevel）。
    # 形态由客户端自有 meta 镜像约束，契约层用 loose object（避免重复引擎 schema）。
    DefenseConfig:
      type: object
      additionalProperties: true

    # ── Shared response wrappers ───────────────────────────────────────────────

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MarchIdResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

paths:

  # ── World ──────────────────────────────────────────────────────────────────

  /world/map:
    get:
      operationId: getWorldMap
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - { name: cx,      in: query, required: true, schema: { type: integer } }
        - { name: cy,      in: query, required: true, schema: { type: integer } }
        - { name: r,       in: query, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Map viewport
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapView' }

  /world/tile/{tileId}:
    get:
      operationId: getWorldTile
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: tileId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Single tile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/me:
    get:
      operationId: getWorldMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Player world state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/join:
    post:
      operationId: joinWorld
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/occupy:
    post:
      operationId: occupyTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Occupied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/abandon:
    post:
      operationId: abandonTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Abandoned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/relocate:
    post:
      operationId: relocateBase
      summary: 主动迁城（花 RELOCATE_COST 金币把主城迁到 (x,y)，保留全部领地）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Relocated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/watchtower:
    post:
      operationId: buildWatchtower
      summary: 建瞭望塔（在己方领地花 WATCHTOWER_COST 资源建大半径持久视野源；§18 G5 V2）
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Watchtower built
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/march:
    get:
      operationId: getMarches
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Active marches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/MarchView' }
    post:
      operationId: startMarch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, kind, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                kind: { type: string, enum: [occupy, reinforce, attack, sweep, scout] }
                troops: { type: integer }
                teamId:
                  type: string
                  description: "围攻挂队（G3-2c）：attack 时用此进攻布阵模板；committed 兵力 = 队伍各单位分配之和（覆盖 troops）"
      responses:
        '200':
          description: March started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/march/{marchId}/recall:
    post:
      operationId: recallMarch
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: marchId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Recalled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/sweep:
    post:
      operationId: sweepTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                troops: { type: integer }
      responses:
        '200':
          description: Sweep march started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/troops/train:
    post:
      operationId: trainTroops
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, qty]
              properties:
                worldId: { type: string }
                qty: { type: integer }
      responses:
        '200':
          description: Training queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/troops/speedup:
    post:
      operationId: speedupTraining
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, coins]
              properties:
                worldId: { type: string }
                coins: { type: integer }
      responses:
        '200':
          description: Training sped up
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/defense:
    get:
      operationId: getDefense
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - name: tileKey
          in: query
          required: false
          schema: { type: string }
          description: "'base' 主城（缺省），或 '{x}:{y}' 领地键"
      responses:
        '200':
          description: Current defense config (data null when unset)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DefenseConfig' }
    put:
      operationId: setDefense
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, defenseConfig]
              properties:
                worldId: { type: string }
                tileKey:
                  type: string
                  description: "'base' 主城，或 '{x}:{y}' 领地键；缺省 'base'"
                defenseConfig: { $ref: '#/components/schemas/DefenseConfig' }
      responses:
        '200':
          description: Defense set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/teams:
    get:
      operationId: getTeams
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Attack formation templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/TeamTemplate' }
    put:
      operationId: setTeams
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, teams]
              properties:
                worldId: { type: string }
                teams:
                  type: array
                  items: { $ref: '#/components/schemas/TeamTemplate' }
      responses:
        '200':
          description: Teams saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/siege/{siegeId}/replay:
    get:
      operationId: getSiegeReplay
      security: [{ bearerAuth: [] }]
      parameters:
