  /auction/list:
    get:
      operationId: listAuctions
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId,  in: query, required: true,  schema: { type: string } }
        - { name: itemType, in: query, required: false, schema: { type: string } }
        - { name: limit,    in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Auction list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AuctionView' }

  /auction/mine:
    get:
      operationId: getMyAuctions
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: My listings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/AuctionView' }

  /auction/create:
    post:
      operationId: createAuction
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # fixed → price 必填；auction → startPrice 必填（见 saleMode）
              required: [worldId, itemType, item, qty, durationSec]
              properties:
                worldId: { type: string }
                itemType: { type: string }
                item:
                  type: object
                  additionalProperties: true
                qty: { type: integer }
                durationSec: { type: integer }
                designatedBuyerId: { type: string }
                saleMode:
                  type: string
                  enum: [fixed, auction]
                  description: 缺省 fixed（一口价）
                price:
                  type: number
                  description: fixed 模式一口价单价（fixed 必填）
                startPrice:
                  type: number
                  description: auction 模式起拍单价（auction 必填）
                buyoutPrice:
                  type: number
                  description: auction 模式一口价保底单价（可选）
      responses:
        '200':
          description: Auction created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuctionView' }

  /auction/{auctionId}/buy:
    post:
      operationId: buyAuction
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: auctionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Bought
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /auction/{auctionId}/bid:
    post:
      operationId: placeBid
      summary: 竞拍出价（saleMode='auction'，B）。amount = 出价单价，托管 = amount × qty。
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: auctionId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, amount]
              properties:
                worldId: { type: string }
                amount: { type: number, description: 出价单价（金币/件） }
      responses:
        '200':
          description: Bid placed（达/超 buyoutPrice 则返回已结拍的 AuctionView）
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
