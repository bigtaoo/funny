  /sect/leave:
    post:
      operationId: leaveSect
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Left
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /sect/dissolve:
    post:
      operationId: dissolveSect
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Dissolved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /sect/ally:
    post:
      operationId: allySect
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, targetSectId]
              properties:
                worldId: { type: string }
                targetSectId: { type: string }
      responses:
        '200':
          description: Allied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /sect/unally:
    post:
      operationId: unallySect
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, targetSectId]
              properties:
                worldId: { type: string }
                targetSectId: { type: string }
      responses:
        '200':
          description: Unallied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /sect/vote-remove-leader:
    post:
      operationId: voteRemoveSectLeader
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, nomineeFamilyId]
              properties:
                worldId: { type: string }
                nomineeFamilyId: { type: string }
      responses:
        '200':
          description: Vote tallied
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SectVoteResult' }

  /sect/message:
    post:
      operationId: sendSectMessage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, body]
              properties:
                worldId: { type: string }
                body: { type: string }
                senderName: { type: string }
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SectMessageView' }

  /sect/channel:
    get:
      operationId: getSectChannel
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true,  schema: { type: string } }
        - { name: before,  in: query, required: false, schema: { type: number } }
        - { name: limit,   in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Channel messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SectMessageView' }
