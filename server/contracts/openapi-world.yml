  /auction/create:
    post:
      operationId: createAuction
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              # fixed → price required; auction → startPrice required (see saleMode)
              required: [worldId, itemType, item, qty, durationSec]
              properties:
                worldId: { type: string }
                itemType:
                  type: string
                  enum: [material, equipment, card]
                  description: "card (CC-5): item.instanceId = CardInstance.id; gear must be empty; qty ignored (always 1)"
                item:
                  type: object
                  additionalProperties: true
                qty: { type: integer }
                durationSec: { type: integer }
                designatedBuyerId: { type: string }
                saleMode:
                  type: string
                  enum: [fixed, auction]
                  description: Defaults to fixed (buy-now)
                price:
                  type: number
                  description: Fixed-price buy-now unit price (required for fixed mode)
                startPrice:
                  type: number
                  description: Auction starting unit price (required for auction mode)
                buyoutPrice:
                  type: number
                  description: Auction buyout floor unit price (optional)
      responses:
        '200':
          description: Auction created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/AuctionView' }

