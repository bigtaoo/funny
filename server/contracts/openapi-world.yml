openapi: 3.1.0
info:
  title: Notebook Wars — worldsvc REST API
  version: "1.0"
  description: >
    SLG world map (worldsvc) REST contract. Separated from the metaserver openapi.yml because worldsvc runs at a different base URL.
    The client generates src/net/openapi-world.ts via gen-openapi.mjs.

servers:
  - url: '{worldBase}'
    variables:
      worldBase:
        default: 'http://localhost:18084'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── World ──────────────────────────────────────────────────────────────────

    WorldTileView:
      type: object
      required: [x, y, type, level]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, gate, stronghold]
        level:
          type: integer
        resType:
          type: string
          enum: [food, iron, wood]
        occupied:
          type: boolean
        mine:
          type: boolean
        ownerPublicId:
          type: string
          description: Occupier's 9-digit public id (populated when meta service is available)
        ownerName:
          type: string
          description: Occupier's display name (populated when meta service is available)
        familyId:
          type: string
        garrison:
          type: integer
        protectedUntil:
          type: number
        watchtower:
          type: boolean
          description: §18 G5 V2：A watchtower has been built on this tile (large-radius persistent vision source). The client renders the tower marker.
        visible:
          type: boolean
          description: >-
            G5 vision: whether this tile is within the requester's current field of view. true = dynamic layer returned as-is; false = outside vision range, only the procedurally-generated
            base terrain is returned (all dynamic-layer data hidden, including the "occupied" signal). Populated only for /world/map viewport reads.
        ally:
          type: boolean
          description: "G5: this tile is owned by a family ally (within vision, not self). Client renders with friendly colour."
        allySect:
          type: boolean
          description: >-
            G5: this tile is owned by a member of an allied sect of the player's own sect (within vision, not self, not family). Alliances do not share vision;
            only distinguished on the map with a yellow border (§8.2, attacking/capturing between allies is forbidden).

    WorldMapView:
      type: object
      required: [worldId, cx, cy, r, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        tiles:
          type: array
          items:
            $ref: '#/components/schemas/WorldTileView'

    WorldTileSparseView:
      description: >-
        Sparse occupied-tile view (zoom 2/3 bird's-eye layer). Contains only occupied tiles; unoccupied tiles are rendered locally by the client from proceduralTile.
        No profile RPC, no vision calculation.
      type: object
      required: [x, y, type]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, gate, stronghold]
        mine:
          type: boolean
        ally:
          type: boolean
          description: "lod=mid: same-family ally"
        allySect:
          type: boolean
          description: "lod=mid: allied sect member (not family)"

    WorldMapSparseView:
      type: object
      required: [worldId, cx, cy, r, lod, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        lod:
          type: string
          enum: [thin, mid]
        tiles:
          type: array
          description: Occupied tiles only, sparse array
          items:
            $ref: '#/components/schemas/WorldTileSparseView'

    PlayerWorldView:
      type: object
      required: [joined]
      properties:
        joined:
          type: boolean
        worldId:
          type: string
          description: The shard worldId the player belongs to (G6/§20: returned from join-season resolution; the client uses this to enter the world)
        troops:
          type: integer
        troopCap:
          type: integer
        resources:
          type: object
          additionalProperties:
            type: number
        yieldRate:
          type: object
          additionalProperties:
            type: number
        mainBaseTile:
          type: string
        familyId:
          type: string
        territoryCount:
          type: integer
        trainingQueue:
          type: array
          description: Training queue (S8-2, ordered by completeAt ascending). The client uses this to render the queue countdown (C4).
          items:
            type: object
            required: [qty, startAt, completeAt]
            properties:
              qty:
                type: integer
              startAt:
                type: integer
                format: int64
              completeAt:
                type: integer
                format: int64

    MarchView:
      type: object
      required: [marchId, kind, fromTile, toTile, troops, departAt, arriveAt, status]
      properties:
        marchId:
          type: string
        kind:
          type: string
          enum: [attack, reinforce, occupy, sweep, scout, return]
        fromTile:
          type: string
        toTile:
          type: string
        troops:
          type: integer
        departAt:
          type: number
        arriveAt:
          type: number
        status:
          type: string
          enum: [marching, returning, arrived]
        mine:
          type: boolean
          description: "G5: whether this march belongs to the requester (false = enemy march within vision range)"

    # ── Auction ────────────────────────────────────────────────────────────────

    AuctionView:
      type: object
      required: [auctionId, worldId, sellerId, itemType, item, qty, price, status, expireAt, saleMode]
      properties:
        auctionId:
          type: string
        worldId:
          type: string
        sellerId:
          type: string
        sellerName:
          type: string
        itemType:
          type: string
        item:
          type: object
          additionalProperties: true
        qty:
          type: integer
        price:
          type: number
          description: Current effective unit price (fixed-price = sale unit price; auction = current highest bid unit price, or the starting price if no bids placed)
        totalPrice:
          type: number
          description: Current effective unit price × qty
        currency:
          type: string
          enum: [coins]
        status:
          type: string
          enum: [open, sold, cancelled, expired]
        expireAt:
          type: number
        designatedBuyerId:
          type: string
        taxPaid:
          type: number
        buyerId:
          type: string
        # ── B auction fields (saleMode defaults to 'fixed') ────────────────────────────────
        saleMode:
          type: string
          enum: [fixed, auction]
        startPrice:
          type: number
          description: Auction starting unit price
        buyoutPrice:
          type: number
          description: Auction buyout unit price floor (optional)
        topBid:
          type: object
          description: Current highest bid (unit price; coins are held in escrow)
          required: [bidderId, amount, ts]
          properties:
            bidderId: { type: string }
            amount: { type: number }
            ts: { type: number }

    # ── Sect（宗门，S8-4b）───────────────────────────────────────────────────────

    SectView:
      type: object
      required: [sectId, worldId, name, tag, leaderFamilyId, leaderId, memberFamilyCount, allySectIds, prosperity]
      properties:
        sectId:
          type: string
        worldId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderFamilyId:
          type: string
        leaderId:
          type: string
        memberFamilyCount:
          type: integer
        allySectIds:
          type: array
          items:
            type: string
        prosperity:
          type: number

    SectMemberFamilyView:
      type: object
      required: [familyId, name, tag, leaderId, memberCount, territoryCount]
      properties:
        familyId:
          type: string
        name:
          type: string
        tag:
          type: string
        leaderId:
          type: string
        memberCount:
          type: integer
        territoryCount:
          type: integer

    SectDetailView:
      allOf:
        - $ref: '#/components/schemas/SectView'
        - type: object
          required: [memberFamilies]
          properties:
            memberFamilies:
              type: array
              items:
                $ref: '#/components/schemas/SectMemberFamilyView'
            removalVote:
              type: object
              required: [nomineeFamilyId, voteCount, needed]
              properties:
                nomineeFamilyId:
                  type: string
                voteCount:
                  type: integer
                needed:
                  type: integer

    SectMessageView:
      type: object
      required: [id, senderId, senderName, body, ts]
      properties:
        id:
          type: string
        senderId:
          type: string
        senderName:
          type: string
        body:
          type: string
        ts:
          type: number

    SectVoteResult:
      type: object
      required: [passed, voteCount, needed]
      properties:
        passed:
          type: boolean
        voteCount:
          type: integer
        needed:
          type: integer

    # ── Nation / Season / Shop / Siege (S8-6.5 ~ S8-8) ──────────────────────────

    NationView:
      type: object
      required: [capitalIdx, x, y]
      properties:
        capitalIdx:
          type: integer
          description: 0~9，对应 CAPITAL_FRACTIONS 索引
        x:
          type: integer
        y:
          type: integer
        ownerId:
          type: string
        familyId:
          type: string
        nationName:
          type: string
        foundedAt:
          type: number

    SeasonView:
      type: object
      required: [worldId, season, shard, status, openAt, capacity, population, mapW, mapH]
      properties:
        worldId:
          type: string
        season:
          type: integer
        shard:
          type: integer
        status:
          type: string
          enum: [open, active, settling, closed]
        openAt:
          type: number
        resetAt:
          type: number
        capacity:
          type: integer
        population:
          type: integer
        mapW:
          type: integer
        mapH:
          type: integer

    SlgShopItemView:
      type: object
      required: [id, cost, kind, effect, description]
      properties:
        id:
          type: string
        cost:
          type: integer
          description: 金币价格
        kind:
          type: string
          enum: [troop_speedup, resource_pack, protection, battle_pass]
        effect:
          type: object
          additionalProperties: true
        description:
          type: string

    # Siege defense level that the attacker can play against (C2 post-match review). The level shape matches the client LevelDefinition (loose object);
    # its seed is derived from siegeId; the client must play the level in siege mode with this seed before uploading the recording for re-simulation.
    # Siege spectator replay level (G3-2c): LevelDefinition rebuilt from seed + both sides' formations; client headlessly replays with the same seed.
    SiegeReplayView:
      type: object
      required: [siegeId, seed, outcome, level]
      properties:
        siegeId: { type: string }
        seed: { type: integer }
        outcome: { type: string, enum: [attacker_win, defender_win, draw] }
        level:
          type: object
          additionalProperties: true

    # Formation unit (mirrors GarrisonEntry, G3-2c). Validity of unitType/col/row is checked by the engine levelSchema;
    # initialHp = troops allocated to this unit (= HP, §16.1).
    ArmyEntry:
      type: object
      required: [unitType, col, row]
      properties:
        unitType: { type: string }
        col: { type: integer }
        row: { type: integer }
        initialHp: { type: integer }

    # Attack formation template (team, G3-2c, ≤ 5 teams). A march attaches one team → the army snapshot is stored with the march.
    TeamTemplate:
      type: object
      required: [id, name, army]
      properties:
        id: { type: string }
        name: { type: string }
        army:
          type: array
          items: { $ref: '#/components/schemas/ArmyEntry' }

    # Defense config = constrained subset of the engine LevelDefinition (garrison/defenderBuildings/defenderBaseLevel).
    # Shape is constrained by the client's own meta mirror; the contract layer uses a loose object (to avoid duplicating the engine schema).
    DefenseConfig:
      type: object
      additionalProperties: true

    # ── Shared response wrappers ───────────────────────────────────────────────

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MarchIdResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

paths:

  # ── World ──────────────────────────────────────────────────────────────────

  /world/map:
    get:
      operationId: getWorldMap
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - { name: cx,      in: query, required: true, schema: { type: integer } }
        - { name: cy,      in: query, required: true, schema: { type: integer } }
        - { name: r,       in: query, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Map viewport
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapView' }

  /world/map/sparse:
    get:
      operationId: getWorldMapSparse
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true,  schema: { type: string } }
        - { name: cx,      in: query, required: true,  schema: { type: integer } }
        - { name: cy,      in: query, required: true,  schema: { type: integer } }
        - { name: r,       in: query, required: true,  schema: { type: integer } }
        - name: lod
          in: query
          required: false
          schema: { type: string, enum: [thin, mid], default: thin }
          description: "thin = mine marker only (zoom 3); mid = includes ally/allySect (zoom 2)"
      responses:
        '200':
          description: Sparse ownership overlay
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapSparseView' }

  /world/tile/{tileId}:
    get:
      operationId: getWorldTile
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: tileId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Single tile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/me:
    get:
      operationId: getWorldMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Player world state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/join:
    post:
      operationId: joinWorld
      description: "Join the world; the system automatically places the player's base (§3.4: priority order: near family → outer-ring starter area → fallback). The player does not submit coordinates; the spawn location is determined by the server."
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/occupy:
    post:
      operationId: occupyTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Occupied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/abandon:
    post:
      operationId: abandonTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Abandoned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/relocate:
    post:
      operationId: relocateBase
      summary: Manual base relocation (spend RELOCATE_COST coins to move the main base to (x,y), all territories are retained)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Relocated
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/watchtower:
    post:
      operationId: buildWatchtower
      summary: Build a watchtower (spend WATCHTOWER_COST resources on own territory to create a large-radius persistent vision source; §18 G5 V2)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Watchtower built
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/march:
    get:
      operationId: getMarches
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Active marches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/MarchView' }
    post:
      operationId: startMarch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, kind, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                kind: { type: string, enum: [occupy, reinforce, attack, sweep, scout] }
                troops: { type: integer }
                teamId:
                  type: string
                  description: "围攻挂队（G3-2c）：attack 时用此进攻布阵模板；committed 兵力 = 队伍各单位分配之和（覆盖 troops）"
      responses:
        '200':
          description: March started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/march/{marchId}/recall:
    post:
      operationId: recallMarch
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: marchId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Recalled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/sweep:
    post:
      operationId: sweepTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                troops: { type: integer }
      responses:
        '200':
          description: Sweep march started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/troops/train:
    post:
      operationId: trainTroops
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, qty]
              properties:
                worldId: { type: string }
                qty: { type: integer }
      responses:
        '200':
          description: Training queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/troops/speedup:
    post:
      operationId: speedupTraining
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, coins]
              properties:
                worldId: { type: string }
                coins: { type: integer }
      responses:
        '200':
          description: Training sped up
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/defense:
    get:
      operationId: getDefense
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - name: tileKey
          in: query
          required: false
          schema: { type: string }
          description: "'base' for the main base (default), or '{x}:{y}' for a territory tile key"
      responses:
        '200':
          description: Current defense config (data null when unset)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DefenseConfig' }
    put:
      operationId: setDefense
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, defenseConfig]
              properties:
                worldId: { type: string }
                tileKey:
                  type: string
                  description: "'base' for the main base, or '{x}:{y}' for a territory tile key; defaults to 'base'"
                defenseConfig: { $ref: '#/components/schemas/DefenseConfig' }
      responses:
        '200':
          description: Defense set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/teams:
    get:
      operationId: getTeams
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Attack formation templates
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/TeamTemplate' }
    put:
      operationId: setTeams
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, teams]
              properties:
                worldId: { type: string }
                teams:
                  type: array
                  items: { $ref: '#/components/schemas/TeamTemplate' }
      responses:
        '200':
          description: Teams saved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/siege/{siegeId}/replay:
    get:
      operationId: getSiegeReplay
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: siegeId, in: path, required: true, schema: { type: string } }
