openapi: 3.1.0
info:
  title: Notebook Wars — worldsvc REST API
  version: "1.0"
  description: >
    SLG 大世界（worldsvc）REST 契约。与 metaserver openapi.yml 分离，因 worldsvc 跑在不同 base URL。
    客户端经 gen-openapi.mjs 生成 src/net/openapi-world.ts。

servers:
  - url: '{worldBase}'
    variables:
      worldBase:
        default: 'http://localhost:18084'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    # ── World ──────────────────────────────────────────────────────────────────

    WorldTileView:
      type: object
      required: [x, y, type, level]
      properties:
        x:
          type: integer
        y:
          type: integer
        type:
          type: string
          enum: [neutral, resource, territory, familyKeep, center, base, obstacle, gate]
        level:
          type: integer
        resType:
          type: string
          enum: [food, iron, wood]
        occupied:
          type: boolean
        mine:
          type: boolean
        ownerPublicId:
          type: string
          description: 占领者 9 位公开 id（meta 服务可用时填充）
        ownerName:
          type: string
          description: 占领者昵称（meta 服务可用时填充）
        familyId:
          type: string
        garrison:
          type: integer
        protectedUntil:
          type: number

    WorldMapView:
      type: object
      required: [worldId, cx, cy, r, tiles]
      properties:
        worldId:
          type: string
        cx:
          type: integer
        cy:
          type: integer
        r:
          type: integer
        tiles:
          type: array
          items:
            $ref: '#/components/schemas/WorldTileView'

    PlayerWorldView:
      type: object
      required: [joined]
      properties:
        joined:
          type: boolean
        troops:
          type: integer
        troopCap:
          type: integer
        resources:
          type: object
          additionalProperties:
            type: number
        yieldRate:
          type: object
          additionalProperties:
            type: number
        mainBaseTile:
          type: string
        familyId:
          type: string
        territoryCount:
          type: integer
        trainingQueue:
          type: array
          description: 训练队列（S8-2，按 completeAt 升序）。客户端据此渲染队列倒计时（C4）。
          items:
            type: object
            required: [qty, startAt, completeAt]
            properties:
              qty:
                type: integer
              startAt:
                type: integer
                format: int64
              completeAt:
                type: integer
                format: int64

    MarchView:
      type: object
      required: [marchId, kind, fromTile, toTile, troops, departAt, arriveAt, status]
      properties:
        marchId:
          type: string
        kind:
          type: string
          enum: [attack, reinforce, occupy, sweep, return]
        fromTile:
          type: string
        toTile:
          type: string
        troops:
          type: integer
        departAt:
          type: number
        arriveAt:
          type: number
        status:
          type: string
          enum: [marching, returning, arrived]

    # ── Family ─────────────────────────────────────────────────────────────────

    FamilyMemberView:
      type: object
      required: [accountId, role, joinedAt]
      properties:
        accountId:
          type: string
        publicId:
          type: string
        displayName:
          type: string
        role:
          type: string
          enum: [leader, elder, member]
        joinedAt:
          type: number

    FamilyView:
      type: object
      required: [familyId, name, tag, worldId, memberCount, leaderId, createdAt]
      properties:
        familyId:
          type: string
        name:
          type: string
        tag:
          type: string
        worldId:
          type: string
        memberCount:
          type: integer
        leaderId:
          type: string
        createdAt:
          type: number
        members:
          type: array
          items:
            $ref: '#/components/schemas/FamilyMemberView'

    FamilyMessageView:
      type: object
      required: [id, from, body, ts]
      properties:
        id:
          type: string
        from:
          type: string
        fromName:
          type: string
        body:
          type: string
        ts:
          type: number

    # ── Auction ────────────────────────────────────────────────────────────────

    AuctionView:
      type: object
      required: [auctionId, worldId, sellerId, itemType, item, qty, price, status, expireAt]
      properties:
        auctionId:
          type: string
        worldId:
          type: string
        sellerId:
          type: string
        sellerName:
          type: string
        itemType:
          type: string
        item:
          type: object
          additionalProperties: true
        qty:
          type: integer
        price:
          type: number
        status:
          type: string
          enum: [open, sold, cancelled, expired]
        expireAt:
          type: number
        designatedBuyerId:
          type: string
        taxPaid:
          type: number
        buyerId:
          type: string

    # ── Nation / Season / Shop / Siege (S8-6.5 ~ S8-8) ──────────────────────────

    NationView:
      type: object
      required: [capitalIdx, x, y]
      properties:
        capitalIdx:
          type: integer
          description: 0~9，对应 CAPITAL_FRACTIONS 索引
        x:
          type: integer
        y:
          type: integer
        ownerId:
          type: string
        familyId:
          type: string
        nationName:
          type: string
        foundedAt:
          type: number

    SeasonView:
      type: object
      required: [worldId, season, shard, status, openAt, capacity, population, mapW, mapH]
      properties:
        worldId:
          type: string
        season:
          type: integer
        shard:
          type: integer
        status:
          type: string
          enum: [open, active, settling, closed]
        openAt:
          type: number
        resetAt:
          type: number
        capacity:
          type: integer
        population:
          type: integer
        mapW:
          type: integer
        mapH:
          type: integer

    SlgShopItemView:
      type: object
      required: [id, cost, kind, effect, description]
      properties:
        id:
          type: string
        cost:
          type: integer
          description: 金币价格
        kind:
          type: string
          enum: [troop_speedup, resource_pack, protection, battle_pass]
        effect:
          type: object
          additionalProperties: true
        description:
          type: string

    # 攻方可打的围攻防守关卡（C2 复盘）。level 形态对齐客户端 LevelDefinition（loose object），
    # 其 seed 由 siegeId 派生，客户端须以此 seed 在 siege 模式实打后再上传录像复算。
    SiegeDefenseView:
      type: object
      required: [siegeId, level]
      properties:
        siegeId: { type: string }
        level:
          type: object
          additionalProperties: true

    SiegeResolveResult:
      type: object
      required: [recomputed]
      properties:
        recomputed:
          type: boolean
        judgeOutcome:
          type: string

    # 防守 config = 引擎 LevelDefinition 的受限子集（garrison/defenderBuildings/defenderBaseLevel）。
    # 形态由客户端自有 meta 镜像约束，契约层用 loose object（避免重复引擎 schema）。
    DefenseConfig:
      type: object
      additionalProperties: true

    # ── Shared response wrappers ───────────────────────────────────────────────

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
          enum: [true]

    MarchIdResponse:
      type: object
      required: [id]
      properties:
        id:
          type: string

paths:

  # ── World ──────────────────────────────────────────────────────────────────

  /world/map:
    get:
      operationId: getWorldMap
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - { name: cx,      in: query, required: true, schema: { type: integer } }
        - { name: cy,      in: query, required: true, schema: { type: integer } }
        - { name: r,       in: query, required: true, schema: { type: integer } }
      responses:
        '200':
          description: Map viewport
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldMapView' }

  /world/tile/{tileId}:
    get:
      operationId: getWorldTile
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: tileId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Single tile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/WorldTileView' }

  /world/me:
    get:
      operationId: getWorldMe
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Player world state
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/join:
    post:
      operationId: joinWorld
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/occupy:
    post:
      operationId: occupyTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Occupied
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/abandon:
    post:
      operationId: abandonTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, x, y]
              properties:
                worldId: { type: string }
                x: { type: integer }
                y: { type: integer }
      responses:
        '200':
          description: Abandoned
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/march:
    get:
      operationId: getMarches
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Active marches
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/MarchView' }
    post:
      operationId: startMarch
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, kind, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                kind: { type: string, enum: [occupy, reinforce, attack, sweep] }
                troops: { type: integer }
      responses:
        '200':
          description: March started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/march/{marchId}/recall:
    post:
      operationId: recallMarch
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: marchId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Recalled
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/sweep:
    post:
      operationId: sweepTile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, fromX, fromY, toX, toY, troops]
              properties:
                worldId: { type: string }
                fromX: { type: integer }
                fromY: { type: integer }
                toX: { type: integer }
                toY: { type: integer }
                troops: { type: integer }
      responses:
        '200':
          description: Sweep march started
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/MarchView' }

  /world/troops/train:
    post:
      operationId: trainTroops
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, qty]
              properties:
                worldId: { type: string }
                qty: { type: integer }
      responses:
        '200':
          description: Training queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/troops/speedup:
    post:
      operationId: speedupTraining
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, coins]
              properties:
                worldId: { type: string }
                coins: { type: integer }
      responses:
        '200':
          description: Training sped up
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/PlayerWorldView' }

  /world/defense:
    get:
      operationId: getDefense
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
        - name: tileKey
          in: query
          required: false
          schema: { type: string }
          description: "'base' 主城（缺省），或 '{x}:{y}' 领地键"
      responses:
        '200':
          description: Current defense config (data null when unset)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/DefenseConfig' }
    put:
      operationId: setDefense
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, defenseConfig]
              properties:
                worldId: { type: string }
                tileKey:
                  type: string
                  description: "'base' 主城，或 '{x}:{y}' 领地键；缺省 'base'"
                defenseConfig: { $ref: '#/components/schemas/DefenseConfig' }
      responses:
        '200':
          description: Defense set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/siege/{siegeId}/defense:
    get:
      operationId: getSiegeDefense
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: siegeId, in: path, required: true, schema: { type: string } }
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Playable siege defense level (attacker-only)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SiegeDefenseView' }

  /world/siege/{siegeId}/resolve:
    post:
      operationId: resolveSiege
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: siegeId, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, seed, mode, endFrame, frames]
              properties:
                worldId: { type: string }
                seed: { type: integer }
                mode: { type: integer }
                endFrame: { type: integer }
                frames:
                  type: array
                  items:
                    type: object
                    properties:
                      frame: { type: integer }
                      cmds:
                        type: array
                        items:
                          type: object
                          properties:
                            side: { type: integer }
                            commands: { type: string }
                pveUpgrades:
                  type: object
                  additionalProperties: { type: number }
      responses:
        '200':
          description: Siege recomputed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SiegeResolveResult' }

  /world/nations:
    get:
      operationId: getNations
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Nation list (10 capitals)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/NationView' }

  /world/nations/{capitalIdx}/name:
    post:
      operationId: setNationName
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: capitalIdx, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, name]
              properties:
                worldId: { type: string }
                name: { type: string }
      responses:
        '200':
          description: Nation named
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /world/season:
    get:
      operationId: getSeason
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Season info
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/SeasonView' }

  /world/shop/items:
    get:
      operationId: getSlgShopItems
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: SLG shop items
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/SlgShopItemView' }

  /world/shop/buy:
    post:
      operationId: buySlgShopItem
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, itemId]
              properties:
                worldId: { type: string }
                itemId: { type: string }
      responses:
        '200':
          description: Item bought
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  # ── Family ─────────────────────────────────────────────────────────────────

  /family/list:
    get:
      operationId: listFamilies
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId, in: query, required: true, schema: { type: string } }
      responses:
        '200':
          description: Family list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/FamilyView' }

  /family/{familyId}:
    get:
      operationId: getFamily
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: familyId, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Family detail
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/FamilyView' }

  /family/create:
    post:
      operationId: createFamily
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, name, tag]
              properties:
                worldId: { type: string }
                name: { type: string }
                tag: { type: string }
      responses:
        '200':
          description: Family created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data: { $ref: '#/components/schemas/FamilyView' }

  /family/join:
    post:
      operationId: joinFamily
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, familyId]
              properties:
                worldId: { type: string }
                familyId: { type: string }
      responses:
        '200':
          description: Joined
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /family/leave:
    post:
      operationId: leaveFamily
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Left
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /family/kick:
    post:
      operationId: kickFamilyMember
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, targetId]
              properties:
                worldId: { type: string }
                targetId: { type: string }
      responses:
        '200':
          description: Kicked
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /family/role:
    post:
      operationId: setFamilyRole
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, targetId, role]
              properties:
                worldId: { type: string }
                targetId: { type: string }
                role: { type: string, enum: [leader, elder, member] }
      responses:
        '200':
          description: Role set
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /family/dissolve:
    post:
      operationId: dissolveFamily
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId]
              properties:
                worldId: { type: string }
      responses:
        '200':
          description: Dissolved
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /family/message:
    post:
      operationId: sendFamilyMessage
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [worldId, body]
              properties:
                worldId: { type: string }
                body: { type: string }
                senderName: { type: string }
      responses:
        '200':
          description: Message sent
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [id]
                        properties:
                          id: { type: string }

  /family/channel:
    get:
      operationId: getFamilyChannel
      security: [{ bearerAuth: [] }]
      parameters:
        - { name: worldId,  in: query, required: true,  schema: { type: string } }
        - { name: familyId, in: query, required: true,  schema: { type: string } }
        - { name: before,   in: query, required: false, schema: { type: number } }
        - { name: limit,    in: query, required: false, schema: { type: integer } }
      responses:
        '200':
          description: Channel messages
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/OkResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/FamilyMessageView' }

