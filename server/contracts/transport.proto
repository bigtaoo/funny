syntax = "proto3";

// transport.proto —— WS 房间 / 锁步控制层（M12）。
// 服务器认得这一层；PlayerCommand 作 bytes opaque 转发不解码。
// 双端 codegen（ts-proto），gameserver 仅依赖本文件，不依赖 game.proto。
// 契约单一来源；改动需同步 SERVER_API.md §3。

package nw.transport;

// ── 房间 ──────────────────────────────────────────────
enum RoomPhase {
  WAITING   = 0;
  READY     = 1;
  COUNTDOWN = 2;
  IN_MATCH  = 3;
  OVER      = 4;
}

enum MatchMode {
  FRIENDLY = 0;
  RANKED   = 1;
}

message PlayerSlot {
  uint32 side      = 1;
  string name      = 2;   // 展示昵称（displayName），非 accountId
  bool   ready     = 3;
  bool   connected = 4;
  string public_id = 5;   // 9 位数字公开 id（玩家交流 / 投诉用；accountId 仅服务器内部）
}

// ── 锁步帧（M14：模拟 30Hz，网络 10Hz 批次 = 3 帧）──────
message SideCmd {
  uint32 side     = 1;
  bytes  commands = 2;   // game.proto PlayerCommand[]，对服务器 opaque
}

message FrameCmds {
  uint32             frame = 1;
  repeated SideCmd   cmds  = 2;   // 单个 sim 帧的指令
}

message FrameBatch {
  uint32             to_frame = 1;   // 水位：客户端可推进到的帧
  repeated FrameCmds frames   = 2;   // 仅列非空帧；空窗只有 to_frame
}

// ── 客户端 → 服务器 ──────────────────────────────────
message RoomCreate { MatchMode mode = 1; }
message RoomJoin   { string code = 1; }
message RoomReady  { bool ready = 1; }
message RoomLeave  {}
message RoomStart  {}
message CmdSubmit  { bytes commands = 1; }          // 仅出牌时发
message MatchResult{ string state_hash = 1; uint32 winner_side = 2; }   // winner_side: 客户端模拟权威判定的胜方（ranked 用，双方须一致；friendly 忽略）
message ConnResume { string room_id = 1; uint32 last_frame = 2; }
message Ping {}

// ── 对等裁判反作弊（Phase C，单裁判）─────────────────────
// hash 不一致的 ranked 局，meta 挑一名高配空闲在线玩家做无头复算裁决。
// client_caps：玩家连上 gateway 后上报本机能否承担复算（控制面）。
message ClientCaps  { bool can_judge = 1; }
// judge_verdict：裁判客户端复算完终局后回报（控制面）。
message JudgeVerdict {
  string request_id  = 1;
  string state_hash  = 2;   // 复算得到的终局 hash（PvP：与 match_result.state_hash 同构）
  uint32 winner_side = 3;
  bool   ok          = 4;   // 复算成功（版本匹配 + 跑到终局）
  uint32 stars       = 5;   // PvE 抽检复算（PVE_INTEGRITY §8.6 L1）：复算得到的星数（0=未通关）
}

message ClientMsg {
  oneof body {
    RoomCreate   room_create   = 1;
    RoomJoin     room_join     = 2;
    RoomReady    room_ready    = 3;
    RoomLeave    room_leave     = 4;
    RoomStart    room_start    = 5;
    CmdSubmit    cmd_submit    = 6;
    MatchResult  match_result  = 7;
    ConnResume   conn_resume   = 8;
    Ping         ping          = 9;
    ClientCaps   client_caps   = 10;
    JudgeVerdict judge_verdict = 11;
  }
}

// ── 服务器 → 客户端 ──────────────────────────────────
message RoomState {
  string              code    = 1;
  repeated PlayerSlot players = 2;
  RoomPhase           phase   = 3;
}

message MatchStart {
  string    room_id            = 1;
  MatchMode mode               = 2;
  uint64    seed               = 3;
  uint32    start_frame        = 4;
  uint32    local_side         = 5;
  string    opponent_name      = 6;   // 对手展示名（UI 用，纯展示）
  string    opponent_public_id = 7;   // 对手 9 位数字公开 id（UI 用，纯展示）
}

message ConnResync {
  uint64             seed        = 1;
  uint32             start_frame = 2;
  repeated FrameCmds log         = 3;   // 非空帧日志
  uint32             cur_frame   = 4;
}

// 配对 / 房主开局成功（gateway 控制面推，M18/M20）。客户端据此连 game 数据面 WS：
// wss://<game_url>?ticket=<ticket>。ticket 对客户端 opaque（HMAC-JWT，仅 game 验签）。
message MatchFound {
  string game_url = 1;   // 分配到的 gameserver 公开 WS 地址
  string ticket   = 2;   // matchsvc 签名票据（含 room_id/seed/side/mode/opponent）
}

message PeerDc { uint32 side = 1; uint32 grace_ms = 2; }

message EloDelta { int32 delta = 1; int32 after = 2; string rank_after = 3; }

message MatchOver {
  uint32   winner_side = 1;
  string   reason      = 2;   // base | disconnect | mismatch
  bool     mismatch    = 3;
  EloDelta elo         = 4;   // 仅 ranked
}

message RoomError { string code = 1; string message = 2; }
message Pong {}

// 裁判请求（gateway 控制面推给被选中的裁判客户端，Phase C）。客户端用 frames + seed
// 无头复算整局，得到终局 hash + winner_side，经 judge_verdict 回报。frames 与
// conn_resync.log 同构（仅非空帧；command bytes 仍 game.proto opaque）。
message JudgeRequest {
  string             request_id = 1;
  uint64             seed       = 2;
  MatchMode          mode       = 3;
  uint32             end_frame  = 4;
  repeated FrameCmds frames     = 5;
  // PvE 抽检复算（PVE_INTEGRITY §8.6 L1）：level_id 非空 → 裁判按战役模式无头复算该关，
  // 用 seed（由 level 派生，裁判本地查 levels JSON）+ pve_upgrades（服务器权威蓝图快照，
  // 保证复算确定性）+ frames（玩家指令）跑到终局算星数，经 judge_verdict.stars 回报。
  string                 level_id     = 6;
  map<string, uint32>    pve_upgrades = 7;
  // SLG 围攻复算（S8-3，SLG_DESIGN §5.3）：defense_json 非空 → 裁判按 siege 模式无头复算。
  // 防守 config 是一份 LevelDefinition 的 JSON（worldsvc 为被攻击格即时构造，对 worldsvc opaque，
  // 仅客户端引擎解释）；裁判用 seed + 该 config + pve_upgrades（攻方服务器权威养成快照）+ frames
  // （攻方指令）跑到终局，winner_side=0 → 攻方破城（attacker_win），经 judge_verdict 回报。
  string                 defense_json = 8;
}

// ── 社交实时推送（S6，SOCIAL_DESIGN §4.2）─────────────────
// 发送动作走 REST 到 meta（单一写者，SOC3）；这些仅 server→client 推送（来消息 / 好友
// 上下线 / 申请 / 新邮件红点）。meta 经 gateway /gw/push 据 account→socket 定向下发，
// 离线则丢弃（数据已落库，下次登录拉取）。多 gateway 实例时 push 经 Redis 路由（SOC9）。
message FriendPresence { string public_id = 1; bool online = 2; }
message FriendRequestPush {
  string request_id = 1;
  string from_public_id = 2;
  string from_name = 3;
  string message = 4;
}
enum FriendUpdateKind { ADDED = 0; REMOVED = 1; }
message FriendUpdate { string public_id = 1; FriendUpdateKind kind = 2; }
message ChatMessagePush {
  string conv_id = 1;
  string from_public_id = 2;
  string from_name = 3;
  string body = 4;
  uint64 ts = 5;
}
message MailNew { string mail_id = 1; bool has_attachment = 2; }

// ── SLG 大世界（S8）：仅 server→client 推送 ──────────────────
// 与 social 同原则（SOC3 / §14.5）：SLG 玩家动作走 REST 到 worldsvc（单一写者），
// 实时事件走 WS push（worldsvc → gateway /gw/push → 据 account→socket 定向下发）。
// tile 字段一律用 tileId 字符串（`{worldId}:{x}:{y}`），客户端自解析坐标。
message MarchUpdate {
  string march_id = 1;
  string kind      = 2;   // attack | reinforce | occupy | sweep | return
  string from_tile = 3;
  string to_tile   = 4;
  uint64 arrive_at = 5;   // ms
  string status    = 6;
}
message TileUpdate {
  string tile_id         = 1;
  string type            = 2;   // TileType
  uint32 level           = 3;
  string owner_id        = 4;   // 占领者 publicId（空=中立）
  string family_id       = 5;
  uint64 protected_until = 6;   // ms（0=无保护）
}
message UnderAttack {
  string tile               = 1;
  string attacker_name      = 2;
  string attacker_public_id = 3;
  uint64 arrive_at          = 4;   // ms
  uint32 troops_hint        = 5;
}
message SiegeResult {
  string siege_id     = 1;
  string tile         = 2;
  string outcome      = 3;   // attacker_win | defender_win | draw
  string loot_summary = 4;
  string replay_ref   = 5;
}
message FamilyMsg {
  string family_id      = 1;
  string from_public_id = 2;
  string from_name      = 3;
  string text           = 4;
  uint64 ts             = 5;
}
// 宗门频道消息（S8-4b，§8.2 宗门频道）。worldsvc 经 Redis pub/sub（GW_PUSH_REDIS_CHANNEL）
// 把消息扇给各 gateway，gateway 据宗门在线成员定向下发。结构对齐 FamilyMsg。
message SectMsg {
  string sect_id        = 1;
  string from_public_id = 2;
  string from_name      = 3;
  string text           = 4;
  uint64 ts             = 5;
}
message WorldEvent {
  string kind    = 1;   // season_open | season_settle | grand_tourney | …
  string payload = 2;   // JSON（DRAFT，结构随事件类型）
}

message ServerMsg {
  oneof body {
    RoomState    room_state    = 1;
    MatchStart   match_start   = 2;
    FrameBatch   frame_batch   = 3;
    ConnResync   conn_resync   = 4;
    PeerDc       peer_dc       = 5;
    MatchOver    match_over    = 6;
    RoomError    room_error    = 7;
    Pong         pong          = 8;
    MatchFound   match_found   = 9;
    JudgeRequest judge_request = 10;
    FriendPresence    friend_presence = 11;
    FriendRequestPush friend_request  = 12;
    FriendUpdate      friend_update   = 13;
    ChatMessagePush   chat_message    = 14;
    MailNew           mail_new        = 15;
    MarchUpdate       march_update    = 16;
    TileUpdate        tile_update     = 17;
    UnderAttack       under_attack    = 18;
    SiegeResult       siege_result    = 19;
    FamilyMsg         family_msg      = 20;
    SectMsg           sect_msg        = 21;
    WorldEvent        world_event     = 22;
  }
}

// 线上每帧一个 Envelope
message Envelope {
  oneof msg {
    ClientMsg client = 1;
    ServerMsg server = 2;
  }
}
