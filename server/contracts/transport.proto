syntax = "proto3";

// transport.proto —— WS room / lockstep control layer (M12).
// The server understands this layer; PlayerCommand is forwarded as opaque bytes without decoding.
// Both ends codegen (ts-proto); gameserver only depends on this file, not on game.proto.
// Single source of truth for the contract; changes must be synced to SERVER_API.md §3.

package nw.transport;

// ── Room ──────────────────────────────────────────────
enum RoomPhase {
  WAITING   = 0;
  READY     = 1;
  COUNTDOWN = 2;
  IN_MATCH  = 3;
  OVER      = 4;
}

enum MatchMode {
  FRIENDLY = 0;
  RANKED   = 1;
}

message PlayerSlot {
  uint32 side      = 1;
  string name      = 2;   // display name (displayName), not accountId
  bool   ready     = 3;
  bool   connected = 4;
  string public_id = 5;   // 9-digit numeric public id (for player communication / reports; accountId is server-internal only)
}

// ── Lockstep frames (M14: simulation 30Hz, network 10Hz batch = 3 frames) ──────
message SideCmd {
  uint32 side     = 1;
  bytes  commands = 2;   // game.proto PlayerCommand[], opaque to the server
}

message FrameCmds {
  uint32             frame = 1;
  repeated SideCmd   cmds  = 2;   // commands for a single sim frame
}

message FrameBatch {
  uint32             to_frame = 1;   // watermark: the frame up to which the client may advance
  repeated FrameCmds frames   = 2;   // only non-empty frames are listed; an empty window carries only to_frame
}

// ── Client → Server ──────────────────────────────────
message RoomCreate {
  MatchMode       mode = 1;
  repeated string deck = 2;   // PvP loadout: card ids in the player's chosen deck (PVP_LOADOUT §4); empty = server assigns defaultPvpDeck
}
message RoomJoin   {
  string          code = 1;
  repeated string deck = 2;   // PvP loadout: joiner's chosen deck (PVP_LOADOUT §4); empty = server assigns defaultPvpDeck
}
message RoomReady  { bool ready = 1; }
message RoomLeave  {}
message RoomStart  {}
message CmdSubmit  { bytes commands = 1; }          // sent only when playing a card
message MatchResult{ string state_hash = 1; uint32 winner_side = 2; string stats_json = 3; }   // winner_side: the winning side as determined by the authoritative client simulation (used for ranked; both sides must agree; ignored for friendly). stats_json: per-match achievement counter JSON for the local player (S9-6, {"kill.archer":n,…}; only fed for ranked, accumulated by meta after L1 validation; ignored for friendly)
message ConnResume { string room_id = 1; uint32 last_frame = 2; }
message Ping {}

// ── Peer-judge anti-cheat (Phase C, single judge) ─────────────────────
// For ranked matches with a hash mismatch, meta selects a high-spec idle online player to perform a headless re-simulation verdict.
// client_caps: reported by the client after connecting to the gateway, indicating whether the local device can serve as a judge (control plane).
message ClientCaps  { bool can_judge = 1; }
// judge_verdict: sent back by the judge client after completing the headless re-simulation of the final state (control plane).
message JudgeVerdict {
  string request_id  = 1;
  string state_hash  = 2;   // final-state hash from re-simulation (PvP: structurally equivalent to match_result.state_hash)
  uint32 winner_side = 3;
  bool   ok          = 4;   // re-simulation succeeded (version matched and ran to final state)
  uint32 stars       = 5;   // PvE spot-check re-simulation (PVE_INTEGRITY §8.6 L1): star count from re-simulation (0 = not cleared)
  string stats_json  = 6;   // PvE feed (S9-3b): per-match achievement counter JSON for the player (owner 0) from re-simulation ({"kill.archer":n,…}); judge is authoritative; accumulated by meta after L1 validation when verified. Always empty for PvP/siege
}

message ClientMsg {
  oneof body {
    RoomCreate   room_create   = 1;
    RoomJoin     room_join     = 2;
    RoomReady    room_ready    = 3;
    RoomLeave    room_leave     = 4;
    RoomStart    room_start    = 5;
    CmdSubmit    cmd_submit    = 6;
    MatchResult  match_result  = 7;
    ConnResume   conn_resume   = 8;
    Ping         ping          = 9;
    ClientCaps   client_caps   = 10;
    JudgeVerdict judge_verdict = 11;
  }
}

// ── Server → Client ──────────────────────────────────
message RoomState {
  string              code    = 1;
  repeated PlayerSlot players = 2;
  RoomPhase           phase   = 3;
}

message MatchStart {
  string          room_id            = 1;
  MatchMode       mode               = 2;
  uint64          seed               = 3;
  uint32          start_frame        = 4;
  uint32          local_side         = 5;
  string          opponent_name      = 6;   // opponent display name (UI use, display only)
  string          opponent_public_id = 7;   // opponent 9-digit numeric public id (UI use, display only)
  string          opponent_title     = 8;   // opponent's equipped title id (UI use, display only; empty string = no title)
  repeated string top_deck           = 9;   // side-0 player's deck (PVP_LOADOUT §6.2); both sides receive both decks for deterministic engine construction
  repeated string bottom_deck        = 10;  // side-1 player's deck
}

message ConnResync {
  uint64             seed        = 1;
  uint32             start_frame = 2;
  repeated FrameCmds log         = 3;   // non-empty frame log
  uint32             cur_frame   = 4;
}

// Match found / host started the game (pushed by gateway control plane, M18/M20). The client uses this to connect to the game data-plane WS:
// wss://<game_url>?ticket=<ticket>. ticket is opaque to the client (HMAC-JWT, verified only by game).
message MatchFound {
  string game_url = 1;   // the assigned gameserver public WS address
  string ticket   = 2;   // matchsvc-signed ticket (contains room_id/seed/side/mode/opponent)
}

// Matchmaking timeout fallback to AI (when feature flag match_bot_fallback is enabled and ranked queue wait exceeds the threshold with no real opponent found → local AI match).
// The client uses this to start a local AI match directly (no gameserver connection; engine runs AISystem on the client), no ticket.
message MatchBot {
  uint64 seed         = 1;   // in-match RNG seed (used by the client-side local engine)
  string opponent_name = 2;  // AI opponent display name
  uint32 elo          = 3;   // player ELO (AI difficulty / display reference)
  string difficulty   = 4;   // AI level 1-10 (engine AISystem.ts), decimal string (e.g. "7"); rolled by pickBotDifficulty(elo)
}

message PeerDc { uint32 side = 1; uint32 grace_ms = 2; }

message EloDelta { int32 delta = 1; int32 after = 2; string rank_after = 3; }

message MatchOver {
  uint32   winner_side = 1;
  string   reason      = 2;   // base | disconnect | mismatch
  bool     mismatch    = 3;
  EloDelta elo         = 4;   // ranked only
}

message RoomError { string code = 1; string message = 2; }
message Pong {}

// Judge request (pushed by gateway control plane to the selected judge client, Phase C). The client uses frames + seed
// to headlessly re-simulate the entire match, obtains the final state hash + winner_side, and reports back via judge_verdict. frames are
// structurally identical to conn_resync.log (non-empty frames only; command bytes remain game.proto opaque).
message JudgeRequest {
  string             request_id = 1;
  uint64             seed       = 2;
  MatchMode          mode       = 3;
  uint32             end_frame  = 4;
  repeated FrameCmds frames     = 5;
  // PvE spot-check re-simulation (PVE_INTEGRITY §8.6 L1): non-empty level_id → judge re-simulates the level headlessly in campaign mode,
  // using seed (derived from the level, judge looks up the levels JSON locally) + pve_upgrades (server-authoritative blueprint snapshot,
  // ensures deterministic re-simulation) + frames (player commands) to run to the final state and compute stars, reported back via judge_verdict.stars.
  string                 level_id     = 6;
  map<string, uint32>    pve_upgrades = 7;
  // SLG siege re-simulation (S8-3, SLG_DESIGN §5.3): non-empty defense_json → judge re-simulates headlessly in siege mode.
  // The defense config is a LevelDefinition JSON (constructed on-the-fly by worldsvc for the attacked tile, opaque to worldsvc,
  // interpreted only by the client engine); judge uses seed + this config + pve_upgrades (server-authoritative attacker progression snapshot) + frames
  // (attacker commands) to run to the final state; winner_side=0 → attacker breached (attacker_win), reported back via judge_verdict.
  string                 defense_json = 8;
  // S12 unit progression re-simulation: non-empty unit_levels → judge uses this level map to rebuild the blueprint (replaces pve_upgrades, ensures
  // that spot-check re-simulations for highly-progressed players use the exact same blueprint as the original match, preventing false verdicts from a weaker blueprint).
  map<string, uint32>    unit_levels  = 9;
  // Ranked PvP deck restriction (PVP_LOADOUT §6.2): same decks the two real match clients drew from via match_start.top_deck/bottom_deck.
  // Required for a deterministic re-simulation when the original match applied deck-restricted draw filtering; empty on PvE/siege requests.
  repeated string        top_deck     = 10;
  repeated string        bottom_deck  = 11;
}

// ── Social real-time push (S6, SOCIAL_DESIGN §4.2) ─────────────────
// Write actions go via REST to meta (single writer, SOC3); these are server→client push only (incoming message / friend online/offline / request / new-mail badge).
// meta delivers them via gateway /gw/push targeting account→socket; dropped if offline (data is persisted and fetched on next login).
// With multiple gateway instances, pushes are routed via Redis (SOC9).
message FriendPresence { string public_id = 1; bool online = 2; }
message FriendRequestPush {
  string request_id = 1;
  string from_public_id = 2;
  string from_name = 3;
  string message = 4;
}
enum FriendUpdateKind { ADDED = 0; REMOVED = 1; }
message FriendUpdate { string public_id = 1; FriendUpdateKind kind = 2; }
message ChatMessagePush {
  string conv_id = 1;
  string from_public_id = 2;
  string from_name = 3;
  string body = 4;
  uint64 ts = 5;
}
message MailNew { string mail_id = 1; bool has_attachment = 2; }

// ── SLG world map (S8): server→client push only ──────────────────
// Same principle as social (SOC3 / §14.5): SLG player actions go via REST to worldsvc (single writer),
// real-time events go via WS push (worldsvc → gateway /gw/push → targeted delivery per account→socket).
// All tile fields use the tileId string (`{worldId}:{x}:{y}`); the client parses the coordinates itself.
message MarchUpdate {
  string march_id = 1;
  string kind      = 2;   // attack | reinforce | occupy | sweep | scout | return
  string from_tile = 3;
  string to_tile   = 4;
  uint64 arrive_at = 5;   // ms
  string status    = 6;
}
message TileUpdate {
  string tile_id          = 1;
  string type             = 2;   // TileType
  uint32 level            = 3;
  string owner_public_id  = 4;   // occupier's 9-digit public id (empty = neutral)
  string family_id        = 5;
  uint64 protected_until  = 6;   // ms (0 = no protection)
  string owner_name       = 7;   // occupier's display name (empty when meta is unavailable)
}
message UnderAttack {
  string tile               = 1;
  string attacker_name      = 2;
  string attacker_public_id = 3;
  uint64 arrive_at          = 4;   // ms
  uint32 troops_hint        = 5;
}
message SiegeResult {
  string siege_id     = 1;
  string tile         = 2;
  string outcome      = 3;   // attacker_win | defender_win | draw
  string loot_summary = 4;
  string replay_ref   = 5;
}
message FamilyMsg {
  string family_id      = 1;
  string from_public_id = 2;
  string from_name      = 3;
  string text           = 4;
  uint64 ts             = 5;
}
// Sect channel message (S8-4b, §8.2 sect channel). worldsvc fans messages out to all gateways via Redis pub/sub (GW_PUSH_REDIS_CHANNEL);
// each gateway delivers to online sect members individually. Structure mirrors FamilyMsg.
message SectMsg {
  string sect_id        = 1;
  string from_public_id = 2;
  string from_name      = 3;
  string text           = 4;
  uint64 ts             = 5;
}
// Nation / world public channel message (B7, §6.4 social channels). worldsvc fans messages via Redis pub/sub to all online players within the same worldId;
// falls back to O(n) HTTP push when Redis is unavailable. Offline members fetch history via REST (TTL 7 days).
message NationMsg {
  string world_id       = 1;
  string from_public_id = 2;
  string from_name      = 3;
  string text           = 4;
  uint64 ts             = 5;
}
message WorldEvent {
  string kind    = 1;   // season_open | season_settle | grand_tourney | …
  string payload = 2;   // JSON (DRAFT; structure varies by event kind)
}

message ServerMsg {
  oneof body {
    RoomState    room_state    = 1;
    MatchStart   match_start   = 2;
    FrameBatch   frame_batch   = 3;
    ConnResync   conn_resync   = 4;
    PeerDc       peer_dc       = 5;
    MatchOver    match_over    = 6;
    RoomError    room_error    = 7;
    Pong         pong          = 8;
    MatchFound   match_found   = 9;
    JudgeRequest judge_request = 10;
    FriendPresence    friend_presence = 11;
    FriendRequestPush friend_request  = 12;
    FriendUpdate      friend_update   = 13;
    ChatMessagePush   chat_message    = 14;
    MailNew           mail_new        = 15;
    MarchUpdate       march_update    = 16;
    TileUpdate        tile_update     = 17;
    UnderAttack       under_attack    = 18;
    SiegeResult       siege_result    = 19;
    FamilyMsg         family_msg      = 20;
    SectMsg           sect_msg        = 21;
    WorldEvent        world_event     = 22;
    NationMsg         nation_msg      = 23;
    MatchBot          match_bot       = 24;
  }
}

// One Envelope per frame on the wire
message Envelope {
  oneof msg {
    ClientMsg client = 1;
    ServerMsg server = 2;
  }
}
