/equipment/craft:
  post:
    operationId: craftEquipment
    tags: [save]
    summary: "Equipment crafting (E2, server-authoritative: deducts stationery materials → rolls one +0 base equipment → adds to inventory [300 cap]). idempotencyKey for idempotency"
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [defId, idempotencyKey]
            properties:
              defId: { type: string, description: 'Equipment definition id (EQUIPMENT_DEFS, determines slot/rarity/recipe)' }
              idempotencyKey: { type: string, description: Client-generated idempotency key; replay returns the first result (no second deduction or roll) }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [save, instance]
                  properties:
                    save: { $ref: '#/components/schemas/SaveData' }
                    instance: { $ref: '#/components/schemas/EquipmentInstance' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '402': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/equipment/enhance:
  post:
    operationId: enhanceEquipment
    tags: [save]
    summary: "Equipment enhancement (E3, server rolls dice: success rate table → deducts materials + coins → success: level+1, failure: level unchanged). idempotencyKey for idempotency"
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [instanceId, idempotencyKey]
            properties:
              instanceId: { type: string, description: Id of the equipment instance to enhance (within equipmentInv) }
              idempotencyKey: { type: string, description: Client-generated idempotency key; die roll and deduction are bound to this key; replay returns the first result }
              useProtect: { type: boolean, description: 'Whether to use a protection item (E7); when true and protect_enhance is in inventory, failure does not consume materials, uses 1 protection item' }
    responses:
      '200':
        description: Success (success=false means the die roll failed; materials/coins consumed, level unchanged)
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [success, instance, save]
                  properties:
                    success: { type: boolean, description: Whether this enhancement succeeded (success → instance.level+1) }
                    instance: { $ref: '#/components/schemas/EquipmentInstance' }
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '402': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/equipment/salvage:
  post:
    operationId: salvageEquipment
    tags: [save]
    summary: Equipment salvage (E3, +0~4 returns 70% crafting materials and removes from inventory; +5/equipped/locked are rejected). Batch, idempotencyKey for idempotency
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [instanceIds, idempotencyKey]
            properties:
              instanceIds:
                type: array
                items: { type: string }
                minItems: 1
                description: List of equipment instance ids to salvage (including +0 duplicates, supports batch)
              idempotencyKey: { type: string }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [refunded, save]
                  properties:
                    refunded:
                      type: object
                      additionalProperties: { type: integer }
                      description: Total materials refunded (material id→quantity)
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/equipment/equip:
  post:
    operationId: equipEquipment
    tags: [save]
    summary: Equip/unequip (E4, validates slot match → writes CardInstance.gear[slot]). instanceId=null to unequip. Pure state mutation
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [slot, instanceId, cardInstanceId]
            properties:
              slot: { type: string, enum: [weapon, armor, trinket], description: Target slot }
              instanceId:
                type: string
                nullable: true
                description: Equipment instance id to equip; null to unequip the slot
              cardInstanceId: { type: string, description: 'CardInstance id that owns the gear slot (Hero Roster, CC-2)' }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [save]
                  properties:
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/equipment/reforge:
  post:
    operationId: reforgeEquipment
    tags: [save]
    summary: Equipment reforging (E6, keeps the primary affix, re-rolls secondary affixes; consumes a same-slot lower-tier material piece). idempotencyKey for idempotency
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [targetId, materialId, idempotencyKey]
            properties:
              targetId: { type: string, description: Id of the equipment instance to reforge }
              materialId: { type: string, description: 'Id of the material equipment instance to consume (same slot, one tier lower, e.g. rare → requires fine)' }
              idempotencyKey: { type: string, description: Client-generated idempotency key; re-roll is bound to this key; replay returns the first result }
    responses:
      '200':
        description: Success (instance now contains the new secondary affixes)
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [instance, save]
                  properties:
                    instance: { $ref: '#/components/schemas/EquipmentInstance' }
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

# —— CC-2 Hero Roster ————————————————————————————————————————————————————————

/cards/feed:
  post:
    operationId: cardsFeed
    tags: [save]
    summary: Feed material cards into a target card to gain XP and level up (CHARACTER_CARDS_DESIGN §3.3, CC-2). Same-faction required; locked materials rejected. idempotencyKey prevents double-consumption
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [targetId, materialIds, idempotencyKey]
            properties:
              targetId: { type: string, description: CardInstance id of the card to level up }
              materialIds:
                type: array
                items: { type: string }
                description: CardInstance ids to consume as feed material (same faction; must not be locked)
              idempotencyKey: { type: string, description: Client-generated idempotency key; prevents double-consumption on retry }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [card, levelsGained, save]
                  properties:
                    card: { $ref: '#/components/schemas/CardInstance' }
                    levelsGained: { type: integer, minimum: 0 }
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/cards/lock:
  post:
    operationId: cardsLock
    tags: [save]
    summary: "Lock a character card (CC-4). Locked cards cannot be consumed as feed material. Idempotent: locking an already-locked card succeeds"
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [cardInstanceId]
            properties:
              cardInstanceId: { type: string, description: CardInstance id to lock }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [save]
                  properties:
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

/cards/unlock:
  post:
    operationId: cardsUnlock
    tags: [save]
    summary: "Unlock a character card (CC-4). Unlocked cards may again be consumed as feed material. Idempotent: unlocking an already-unlocked card succeeds"
    security: [{ bearerAuth: [] }]
    requestBody:
      required: true
      content:
        application/json:
          schema:
            type: object
            required: [cardInstanceId]
            properties:
              cardInstanceId: { type: string, description: CardInstance id to unlock }
    responses:
      '200':
        description: Success
        content:
          application/json:
            schema:
              type: object
              required: [ok, data]
              properties:
                ok: { type: boolean, enum: [true] }
                data:
                  type: object
                  required: [save]
                  properties:
                    save: { $ref: '#/components/schemas/SaveData' }
      '400': { $ref: '#/components/responses/ErrorResp' }
      '401': { $ref: '#/components/responses/ErrorResp' }
      '404': { $ref: '#/components/responses/ErrorResp' }
      '409': { $ref: '#/components/responses/ErrorResp' }

