syntax = "proto3";

// replay.proto —— 录像格式（M13 / META_DESIGN §6.6 / SERVER_API §6）。
//
// 录像 = seed + 配置 + 输入流，从不存状态：同 seed 起新引擎按 tick 喂 frames
// 即可逐 tick 完全还原。复用 transport.proto 的 FrameCmds（commands 仍是
// game.proto PlayerCommand[] 的 opaque bytes，对服务器不解码，M12）。
//
// 落地（S1-RP）：
//  • PvP — gameserver 为重连保留的非空帧日志即录像，局末持久化进 matches.replay
//    （小局直接内嵌；当前 gameserver 以等价 BSON 子文档内嵌——见 Room.ts/RoomManager.ts）。
//  • PvE — 客户端本地录制（只记玩家指令，敌方 WaveDirector 回放时由 seed+level 重算），
//    客户端 Replay TS 类型（code/src/game/types.ts）字段与本 proto 对齐。
//
// 契约单一来源；改动需同步 SERVER_API.md §6 + 客户端 Replay 类型。

package nw.replay;

import "transport.proto";

message ReplayMeta {
  int64  recorded_at = 1;   // Unix ms
  string level_id    = 2;   // 战役关卡 id（PvE）
  int32  winner      = 3;   // 0/1；-1 = 平局/未知
}

message Replay {
  uint32 engine_version = 1;  // 绑引擎逻辑版本（回放前校验，跨版本可能发散）
                              //   注：gameserver 逻辑无关（M12），无法自证版本，
                              //   服务端录制此字段为 0（保留给客户端回放时自校验 / 未来客户端上报）。
  string mode           = 2;  // campaign | pvp | netplay
  uint64 seed           = 3;
  string config_ref     = 4;  // PvE=levelId+version；PvP=rosterVer
  repeated nw.transport.FrameCmds frames = 5;  // 只存非空帧
  uint32 end_frame      = 6;  // 总帧数（空帧不存，靠它界定终点）
  ReplayMeta meta       = 7;
}
