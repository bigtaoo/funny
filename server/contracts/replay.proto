syntax = "proto3";

// replay.proto —— Replay format (M13 / META_DESIGN §6.6 / SERVER_API §6).
//
// A replay = seed + config + input stream; state is never stored. Feeding frames
// tick-by-tick into a fresh engine started with the same seed reproduces the match
// exactly. Reuses transport.proto FrameCmds (commands remain opaque
// game.proto PlayerCommand[] bytes; the server never decodes them, M12).
//
// Landing (S1-RP):
//  • PvP — the non-empty frame log the gameserver keeps for reconnection IS the replay;
//    it is persisted into matches.replay at match end
//    (short matches embed directly; the current gameserver embeds as an equivalent BSON
//    sub-document — see Room.ts / RoomManager.ts).
//  • PvE — recorded locally on the client (only player commands are stored; enemy
//    WaveDirector is re-derived from seed+level at replay time);
//    the client Replay TS type (client/src/game/types.ts) is aligned with this proto.
//
// Single source of truth for the contract; changes must be synced to SERVER_API.md §6
// and the client Replay type.

package nw.replay;

import "transport.proto";

message ReplayMeta {
  int64  recorded_at = 1;   // Unix ms
  string level_id    = 2;   // campaign level id (PvE)
  int32  winner      = 3;   // 0/1; -1 = draw / unknown
}

message Replay {
  uint32 engine_version = 1;  // engine logic version (validated before replay; cross-version replays may diverge)
                              //   Note: gameserver is logic-agnostic (M12) and cannot self-certify its version;
                              //   server-side recordings set this field to 0 (reserved for client self-validation
                              //   at replay time / future client-reported uploads).
  string mode           = 2;  // campaign | pvp | netplay
  uint64 seed           = 3;
  string config_ref     = 4;  // PvE=levelId+version; PvP=rosterVer
  repeated nw.transport.FrameCmds frames = 5;  // non-empty frames only
  uint32 end_frame      = 6;  // total frame count (empty frames are not stored; this field marks the end boundary)
  ReplayMeta meta       = 7;
}
