# CI overlay (merged with docker-compose.prod.yml). For running full end-to-end link in GitHub Actions:
#   docker compose -f docker-compose.prod.yml -f docker-compose.ci.yml up -d --wait \
#       mongo metaserver commercial gateway matchsvc gameserver
#
# Differences from prod (solely to serve "E2E running as Node process directly on the runner host"):
#   • No caddy (explicit service list in up command skips the reverse proxy; E2E connects directly to each service's host-mapped port).
#   • Exposes meta REST / gateway public WS / game data-plane WS to host ports, matching the defaults expected by
#     client/test/e2e/full-link.e2e.ts (meta 18080 / gateway 8086 / game 8081).
#   • The gateway address sent by meta + the game address in tickets both use localhost:<host-port>,
#     so E2E processes on the runner can connect using the server-provided address (validates the core assertion "client connects to the right port").
#   • Adds Node-based healthchecks to all services (image has node, not curl), compatible with `--wait` for deterministic readiness.
services:
  redis:
    # CI uses in-memory mode, no volume; healthcheck lets --wait wait deterministically.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  metaserver:
    environment:
      # Client connects to this address for room/matchmaking; E2E asserts gateway socket uses this, not meta base.
      NW_GATEWAY_PUBLIC_WS_URL: ws://localhost:8086/gw
      # CI: all requests come from the same IP; disable rate limiting to prevent E2E + load smoke tests consuming each other's auth quota.
      NW_AUTH_RATE_LIMIT: '0'
    ports:
      - "18080:8080"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  commercial:
    environment:
      # CI stack runs the prod image (Dockerfile hard-codes NODE_ENV=production), but CI has no real payment credentials.
      # Full-link E2E recharge assertions rely on the `tier:` dev stub. The L2-3 hardening under NODE_ENV=production
      # force-disables the dev stub (iap.ts) and refuses startup with NW_IAP_DEV=true (index.ts), so the only option is
      # to opt commercial out of production mode: NODE_ENV != production → missing credentials auto-fall back to dev stub,
      # without changing any line of the prod hardening itself.
      NODE_ENV: development
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8092/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  gateway:
    ports:
      - "8086:8082"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8090/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  matchsvc:
    environment:
      # Data-plane fallback address changed to runner host-reachable (used before gameserver registers + written into ticket fallback).
      NW_GAME_PUBLIC_WS_URL: ws://localhost:8081/ws
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8091/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  gameserver:
    environment:
      # Data-plane address written into ticket for client → runner host-reachable.
      NW_GAME_PUBLIC_WS_URL: ws://localhost:8081/ws
    ports:
      - "8081:8081"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8081/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  worldsvc:
    # SLG public REST fourth face: mapped to host, directly reachable by E2E/curl (meta/gateway don't proxy world).
    ports:
      - "18084:18084"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:18084/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  analyticsvc:
    ports:
      - "18085:18085"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:18085/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20

  socialsvc:
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8085/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      start_period: 5s
      retries: 20
