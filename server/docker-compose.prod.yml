# Production/integration full stack (C-3 / S1-M / S5): mongo(single-node replica set) + metaserver + gateway + matchsvc + gameserver + commercial + caddy reverse proxy.
# Start the full stack with one command (see deploy/up.sh):
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# Endpoints: https://{NW_DOMAIN}/api/...(REST), wss://{NW_DOMAIN}/gw (control-plane: room/matchmaking), wss://{NW_DOMAIN}/ws (data-plane: lockstep),
#            https://{NW_DOMAIN}/world (SLG overworld REST, S8), https://{NW_DOMAIN}/auction (auction house, independent service auctionsvc, auction task5).
# Internal routing (S1-M5, matchsvc as standalone process; matchsvc not exposed to public):
#           gateway fetches ELO via NW_META_BASE_URL=http://metaserver:8080;
#           gateway → matchsvc commands: NW_MATCHSVC_INTERNAL_URL=http://matchsvc:8091;
#           matchsvc → gateway push: NW_GATEWAY_INTERNAL_URL=http://gateway:8090;
#           gameserver registers/heartbeats via NW_MATCHSVC_INTERNAL_URL=http://matchsvc:8091, reports to meta at game end; shares NW_INTERNAL_KEY.
#           NW_GAME_PUBLIC_WS_URL = client-reachable data-plane address (e.g. wss://domain/ws), written into ticket + allocation fallback.
# Default NW_DOMAIN=:80 → HTTP/WS (local testing); set a real domain and Caddy auto-provisions HTTPS/WSS.
#
# Differences from dev docker-compose.yml: this file starts all processes (not just mongo), mongo uses named volume for persistence,
# replica set member host uses container name mongo (for inter-service DNS resolution), so services connect via mongodb://mongo:27017/?replicaSet=rs0.

services:
  redis:
    image: redis:7-alpine
    container_name: nw-redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: nw-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      # Auto rs.initiate on first start (member host=mongo:27017, resolvable within container network); skips if already initialized, idempotent.
      test: >
        mongosh --quiet --eval "try { rs.status().ok } catch (e) {
        rs.initiate({_id:'rs0',members:[{_id:0,host:'mongo:27017'}]}) }"
      interval: 10s
      timeout: 10s
      start_period: 5s
      retries: 10
    restart: unless-stopped

  metaserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "metaserver/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_MONGO_DB: ${NW_MONGO_DB:-notebook_wars}
      NW_META_PORT: "8080"
      NW_META_HOST: 0.0.0.0
      NW_WX_APPID: ${NW_WX_APPID:-}
      NW_WX_SECRET: ${NW_WX_SECRET:-}
      # Economy orchestration calls commercial (internal network, not exposed to public, S5).
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
      # Peer judge (Phase C): calls gateway for third-party re-evaluation when ranked hash mismatch. No depends_on
      # to avoid a cycle with gateway→metaserver; judge is only called at game end, gracefully dropped if gateway is unreachable.
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      # Feature flag delivery + client log targeted collection (FEATURE_FLAGS_DESIGN §9).
      # ⚠ Critical gotcha (same as matchsvc): missing NW_ADMIN_INTERNAL_URL → flag polling disabled → /bootstrap always returns empty map → targeted collection never works.
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      # Loki push URL (client crash full reporting + targeted log collection both depend on it). obs stack's loki is
      # connected to the main stack network (server_default, alias nw-loki) via observability/docker-compose.obs.yml, so
      # use container name directly. Safe if obs is down: pushToLoki fails to resolve → silently drops, never affects players. Can override via .env.
      NW_LOKI_PUSH_URL: ${NW_LOKI_PUSH_URL:-http://nw-loki:3100/loki/api/v1/push}
    depends_on:
      mongo:
        condition: service_healthy
      commercial:
        condition: service_started
    restart: unless-stopped

  # Commercial service (wallet/recharge/spend/gacha RNG/ledger, S5). Not player-reachable; only meta can reach it via internal network; uses dedicated DB.
  commercial:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "commercial/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_COMM_PORT: "8092"
      NW_COMM_HOST: 0.0.0.0
      # Dedicated DB (defaults to same Mongo instance with a different DB name; scaling to a separate instance only requires changing these two).
      NW_COMM_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_COMM_MONGO_DB: ${NW_COMM_MONGO_DB:-notebook_wars_commercial}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # Control-plane WS (room/matchmaking, S1-M1). Thin connection layer, no Mongo; fetches ELO from meta, forwards commands to matchsvc.
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gateway/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GW_PORT: "8082"
      NW_GW_HOST: 0.0.0.0
      NW_GW_INTERNAL_PORT: "8090"
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      # Clan channel real-time fan-out (S8-4b): subscribes to the same Redis as worldsvc; override NW_GW_REDIS_URL='' to degrade.
      NW_GW_REDIS_URL: ${NW_GW_REDIS_URL:-redis://redis:6379}
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
    depends_on:
      - metaserver
      - matchsvc
      - redis
      - socialsvc
    restart: unless-stopped

  # Private matchmaking brain (S1-M5, standalone process, not exposed to public). Matchmaking/room/game registry/ticket signing; no DB.
  matchsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "matchsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_MM_INTERNAL_PORT: "8091"
      NW_MM_HOST: 0.0.0.0
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      # Data-plane fallback address (used before gameserver registers): client-reachable game WS. Change to wss://domain/ws when using a real domain.
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
      # Feature flag polling source (if not configured = disabled → match_bot_fallback and other flags always default to false, never take effect).
      NW_ADMIN_INTERNAL_URL: http://admin:8083
      NW_REGION: ${NW_REGION:-}
      NW_MM_BOT_FALLBACK_MS: ${NW_MM_BOT_FALLBACK_MS:-30000}
    restart: unless-stopped

  # Data-plane WS (thin lockstep relay, S1-M2). Validates ?ticket=, never connects to DB; reports to meta at game end.
  gameserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "gameserver/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_GAME_PORT: "8081"
      NW_GAME_HOST: 0.0.0.0
      NW_META_BASE_URL: http://metaserver:8080
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_GAME_PUBLIC_WS_URL: ${NW_GAME_PUBLIC_WS_URL:-ws://localhost/ws}
    depends_on:
      - metaserver
      - matchsvc
    restart: unless-stopped

  # SLG overworld (S8, seventh process, public REST fourth face). Reverse-proxied /world,/family,/auction → this process;
  # reuses meta JWT for signature verification only (no accounts DB connection); uses dedicated DB notebook_wars_world. Redis optional (needed for S8-2/S8-4).
  worldsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "worldsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_WORLD_PORT: "18084"
      NW_WORLD_HOST: 0.0.0.0
      NW_WORLD_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_WORLD_MONGO_DB: ${NW_WORLD_MONGO_DB:-notebook_wars_world}
      # Redis: defaults to the redis service in the same stack; override NW_WORLD_REDIS_URL='' to degrade (march falls back to Mongo).
      NW_WORLD_REDIS_URL: ${NW_WORLD_REDIS_URL:-redis://redis:6379}
      # Real-time event push back to clients (S8-1+ via gateway /gw/push).
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_SOCIALSVC_INTERNAL_URL: http://socialsvc:8085
      # Auction coin trading + world-chat 50-coin fee (nationChannelService) both go through commercial; missing this
      # → commercial.available=false → both silently skip coin deduction instead of erroring.
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      socialsvc:
        condition: service_started
      commercial:
        condition: service_started
    restart: unless-stopped

  # Auction house (auction task5, AUCTION_DESIGN §9): independent service, decoupled from worldId; public REST /auction/*.
  # Uses dedicated DB notebook_wars_auction; calls meta (material/equipment/card/skin escrow + system mail) + commercial (coin spend/grant).
  auctionsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "auctionsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_AUCTION_PORT: "18086"
      NW_AUCTION_HOST: 0.0.0.0
      NW_AUCTION_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_AUCTION_MONGO_DB: ${NW_AUCTION_MONGO_DB:-notebook_wars_auction}
      NW_META_INTERNAL_URL: http://metaserver:8080
      NW_COMMERCIAL_INTERNAL_URL: http://commercial:8092
    depends_on:
      mongo:
        condition: service_healthy
      commercial:
        condition: service_started
    restart: unless-stopped

  # Ops admin backend (S7, OPS_DESIGN). Not player-reachable; caddy does not route to it (internal network/VPN/IP allowlist only);
  # uses dedicated DB notebook_wars_admin; calls meta(player/mail) + gateway/matchsvc(/internal/stats).
  admin:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "admin/dist/index.js"]
    environment:
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ADMIN_JWT_SECRET: ${NW_ADMIN_JWT_SECRET:?set NW_ADMIN_JWT_SECRET in .env}
      NW_ADMIN_PORT: "8083"
      NW_ADMIN_HOST: 0.0.0.0
      NW_ADMIN_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ADMIN_MONGO_DB: ${NW_ADMIN_MONGO_DB:-notebook_wars_admin}
      # Bootstrap seed super-admin (recommend clearing env after first deployment, manage accounts via admin panel).
      NW_ADMIN_SEED_USER: ${NW_ADMIN_SEED_USER:-}
      NW_ADMIN_SEED_PASS: ${NW_ADMIN_SEED_PASS:-}
      NW_META_BASE_URL: http://metaserver:8080
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_MATCHSVC_INTERNAL_URL: http://matchsvc:8091
      NW_AUCTION_INTERNAL_URL: http://auctionsvc:18086
      NW_WORLD_INTERNAL_URL: http://worldsvc:18084
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # Event collection service (A9, ninth process, not player-reachable, not routed by reverse proxy). Uses dedicated DB notebook_wars_analytics.
  analyticsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "analyticsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_ANALYTICS_PORT: "18085"
      NW_ANALYTICS_HOST: 0.0.0.0
      NW_ANALYTICS_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_ANALYTICS_MONGO_DB: ${NW_ANALYTICS_MONGO_DB:-notebook_wars_analytics}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  # Social service (S6, fifth public face /social/*). Friends/DMs/mail/clan; uses dedicated DB nw_social.
  socialsvc:
    build:
      context: .
      dockerfile: Dockerfile
    image: nw-server:latest
    command: ["node", "socialsvc/dist/index.js"]
    environment:
      NW_JWT_SECRET: ${NW_JWT_SECRET:?set NW_JWT_SECRET in .env}
      NW_INTERNAL_KEY: ${NW_INTERNAL_KEY:?set NW_INTERNAL_KEY in .env}
      NW_SOCIAL_PORT: "8085"
      NW_SOCIAL_HOST: 0.0.0.0
      NW_SOCIAL_MONGO_URI: mongodb://mongo:27017/?replicaSet=rs0
      NW_SOCIAL_MONGO_DB: ${NW_SOCIAL_MONGO_DB:-nw_social}
      NW_GATEWAY_INTERNAL_URL: http://gateway:8090
      NW_META_INTERNAL_URL: http://metaserver:8080
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: nw-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3
    environment:
      NW_DOMAIN: ${NW_DOMAIN:-:80}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - metaserver
      - gateway
      - gameserver
      - worldsvc
      - auctionsvc
      - socialsvc
    restart: unless-stopped

volumes:
  mongo-data:
  redis-data:
  caddy-data:
  caddy-config:
